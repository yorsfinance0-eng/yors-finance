    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ─── Constants ────────────────────────────────────────
        const BOTTLE_TYPES = ["200ml", "500ml", "1L"];

        const C = { dark: "#0f172a", mid: "#1e293b", border: "#334155", text: "#e2e8f0", muted: "#64748b", purple: "#a855f7", green: "#22c55e", red: "#ef4444", blue: "#38bdf8", amber: "#f59e0b", violet: "#8b5cf6", teal: "#14b8a6" };
        const INIT = { stockIn: [], stockOut: [], creditors: [], debtors: [], clients: [], plEntries: [], balanceSheet: { assets: {}, liabilities: {} }, cashEntries: [], tradingEntries: [], depreciationAssets: [], openingStock: {} };
        const INP = { width: "100%", padding: "8px 11px", borderRadius: 7, border: "1.5px solid #334155", background: "#1e293b", color: "#e2e8f0", fontSize: 13, marginBottom: 9, boxSizing: "border-box" };
        const BTNP = (bg) => ({ background: bg || "linear-gradient(90deg,#6366f1,#8b5cf6)", color: "#fff", border: "none", borderRadius: 7, padding: "8px 18px", cursor: "pointer", fontWeight: 700, fontSize: 12 });

        const TBL = { width: "100%", borderCollapse: "collapse", fontSize: 12 };
        const THS = { background: "#1e293b", color: "#94a3b8", padding: "8px 9px", textAlign: "left", borderBottom: "1px solid #334155", whiteSpace: "nowrap", fontSize: 11 };
        const TDS = { padding: "7px 9px", borderBottom: "1px solid #1e293b", color: "#e2e8f0", verticalAlign: "middle" };
        const CARD = (c) => ({ background: "linear-gradient(135deg," + c + ")", borderRadius: 12, padding: "13px 15px", color: "#fff", flex: 1, minWidth: 115, boxShadow: "0 4px 18px rgba(0,0,0,0.18)" });

        // ─── Helpers ──────────────────────────────────────────
        const gid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
        const fc = n => "₹" + Number(n || 0).toLocaleString("en-IN", { minimumFractionDigits: 2 });
        const fabs = n => fc(Math.abs(n));
        const today = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); };

        function computeFIFO(stockIn, stockOut) {
            const results = {};
            BOTTLE_TYPES.forEach(bt => {
                ["normal", "customized"].forEach(cat => {
                    const key = bt + "_" + cat;
                    const batches = stockIn.filter(x => x.bottleType === bt && x.category === cat).sort((a, b) => new Date(a.date) - new Date(b.date)).map(x => ({ ...x, origQty: Number(x.qty), remQty: Number(x.qty), rate: Number(x.ratePerUnit) }));
                    const outs = stockOut.filter(x => x.bottleType === bt && x.category === cat).sort((a, b) => new Date(a.date) - new Date(b.date));
                    let cogs = 0;
                    outs.forEach(out => { let needed = Number(out.qty); for (let i = 0; i < batches.length && needed > 0; i++) { if (batches[i].godown !== out.godown) continue; const take = Math.min(batches[i].remQty, needed); if (take > 0) { cogs += take * batches[i].rate; batches[i].remQty -= take; needed -= take; } } });
                    const inQty = batches.reduce((a, b) => a + b.origQty, 0), outQty = outs.reduce((a, b) => a + Number(b.qty), 0);
                    let closingValue = 0; batches.forEach(b => { closingValue += b.remQty * b.rate; });
                    results[key] = { batches, cogs, closingValue, inQty, outQty, balQty: inQty - outQty };
                });
            });
            return results;
        }

        function calcDepreciation(asset) {
            const cost = Number(asset.cost || 0), rate = Number(asset.depRate || 0) / 100;
            const startDate = new Date(asset.startDate || today()), now = new Date();
            let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            if (mo < 0) mo = 0;
            let totalDepr = 0;
            if (asset.method === "Straight Line (SLM)") { const annual = cost * rate, md = annual / 12; if (asset.period === "Monthly") totalDepr = md * Math.max(1, Math.min(mo, 1)); else if (asset.period === "Half-Yearly") totalDepr = md * Math.max(1, Math.min(mo, 6)); else totalDepr = md * Math.max(1, Math.min(mo, 12)); }
            else { totalDepr = cost - cost * Math.pow(1 - rate, Math.max(mo / 12, 0)); }
            return { totalDepr: Math.min(Math.max(totalDepr, 0), cost), wdv: Math.max(0, cost - Math.min(Math.max(totalDepr, 0), cost)) };
        }

        // ─── Components ───────────────────────────────────────
        function Badge({ label, color }) { return <span style={{ background: color + "25", color, borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{label}</span>; }
        function DateInput({ value, onChange }) { return <input type="date" style={INP} value={value || ""} max="2099-12-31" onChange={e => onChange(e.target.value)} />; }

        function MiniChart({ data, color, height = 60 }) {
            if (!data || data.length < 2) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 10 }}>Not enough data</div>;
            const vals = data.map(d => d.v), max = Math.max(...vals, 0.01), min = Math.min(...vals), range = max - min || 1, w = 280, pad = 4;
            const pts = data.map((d, i) => `${pad + (i / (data.length - 1)) * (w - pad * 2)},${height - pad - ((d.v - min) / range) * (height - pad * 2)}`);
            const gId = "g" + color.replace("#", "");
            return (<div><svg width="100%" viewBox={`0 0 ${w} ${height}`} style={{ display: "block" }}>
                <defs><linearGradient id={gId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3" /><stop offset="100%" stopColor={color} stopOpacity="0" /></linearGradient></defs>
                <polygon points={`${pad},${height} ${pts.join(" ")} ${w - pad},${height}`} fill={`url(#${gId})`} />
                <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="2" />
                {data.map((d, i) => { const x = pad + (i / (data.length - 1)) * (w - pad * 2), y = height - pad - ((d.v - min) / range) * (height - pad * 2); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}
            </svg>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#64748b", marginTop: 2 }}><span>{data[0].l}</span><span style={{ color, fontWeight: 700 }}>{fc(data[data.length - 1].v)}</span><span>{data[data.length - 1].l}</span></div></div>);
        }

        function BarChart({ data, color, height = 160 }) {
            if (!data || data.length === 0) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 11 }}>No data yet</div>;
            const vals = data.map(d => d.v), max = Math.max(...vals, 1);
            const w = 400, pad = 30, barGap = 4, bw = Math.min(36, (w - pad * 2 - barGap * data.length) / data.length);
            const chartH = height - 30;
            return (<svg width="100%" viewBox={`0 0 ${w} ${height}`} style={{ display: "block" }}>
                {/* Grid lines */}
                {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                    const y = pad / 2 + (1 - f) * (chartH - pad); return <g key={i}><line x1={pad} y1={y} x2={w - 10} y2={y} stroke="#1e293b" strokeWidth="1" /><text x={pad - 4} y={y + 3} fill="#64748b" fontSize="8" textAnchor="end">{Math.round(max * f / 1000)}k</text></g>;
                })}
                {/* Bars */}
                {data.map((d, i) => {
                    const x = pad + i * (bw + barGap) + barGap, bh = (d.v / max) * (chartH - pad), y = pad / 2 + (chartH - pad) - bh;
                    return <g key={i}>
                        <defs><linearGradient id={`bar${i}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.95" /><stop offset="100%" stopColor={color} stopOpacity="0.5" /></linearGradient></defs>
                        <rect x={x} y={y} width={bw} height={bh} rx={3} fill={`url(#bar${i})`} />
                        <text x={x + bw / 2} y={y - 4} fill={color} fontSize="7" fontWeight="700" textAnchor="middle">{d.v >= 1000 ? Math.round(d.v / 1000) + "k" : d.v}</text>
                        <text x={x + bw / 2} y={height - 4} fill="#94a3b8" fontSize="7" textAnchor="middle">{d.l}</text>
                    </g>;
                })}
            </svg>);
        }

        function SettlePanel({ form, setForm, creds, debs }) {
            const mode = form._settleContext; if (!mode) return null;
            const isIn = ["sale", "trading_cr", "bs_liability_reduce", "pl_income"].includes(mode);
            const canCreditor = ["purchase", "trading_dr", "bs_asset_increase", "pl_expense"].includes(mode);
            const canDebtor = ["sale", "trading_cr", "bs_liability_reduce", "pl_income"].includes(mode);
            const canNone = ["bs_asset_increase", "bs_liability_reduce", "trading_dr", "trading_cr"].includes(mode);
            const options = ["cash", canCreditor && "creditor", canDebtor && "debtor", canNone && "none"].filter(Boolean);
            const mColors = { cash: C.green, creditor: C.amber, debtor: C.violet, none: C.muted };
            const mLabels = { cash: isIn ? "💵 Cash In" : "💵 Cash Out", creditor: "🏦 Creditor", debtor: "📋 Debtor", none: "📝 Journal Only" };
            return (<div style={{ background: "#0a0f1e", borderRadius: 8, padding: 12, marginBottom: 9, border: "1px solid #334155" }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, marginBottom: 7 }}>💳 Settlement Mode</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
                    {options.map(opt => <button key={opt} onClick={() => setForm(f => ({ ...f, settleMode: opt, linkedPartyId: "", newPartyName: "", newPartyCredit: "" }))} style={{ flex: 1, minWidth: 70, padding: "7px 4px", border: "2px solid " + (form.settleMode === opt ? mColors[opt] : C.border), borderRadius: 7, background: form.settleMode === opt ? mColors[opt] + "18" : C.mid, color: form.settleMode === opt ? mColors[opt] : C.muted, fontWeight: 700, fontSize: 11, cursor: "pointer" }}>{mLabels[opt]}</button>)}
                </div>
                {(form.settleMode === "creditor" || form.settleMode === "debtor") && (<div>
                    <select style={INP} value={form.linkedPartyId || ""} onChange={e => setForm(f => ({ ...f, linkedPartyId: e.target.value, newPartyName: "", newPartyCredit: "" }))}>
                        <option value="">{form.settleMode === "creditor" ? "Select Creditor" : "Select Debtor"}</option>
                        {(form.settleMode === "creditor" ? creds : debs).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        <option value="__new__">+ Create New</option>

                    {form.linkedPartyId === "__new__" && <div>
                        <input style={INP} placeholder="Name *" value={form.newPartyName || ""} onChange={e => setForm(f => ({ ...f, newPartyName: e.target.value }))} />
                        <input type="number" style={INP} placeholder="Credit Period (days) *" value={form.newPartyCredit || ""} onChange={e => setForm(f => ({ ...f, newPartyCredit: e.target.value }))} />
                    </div>}
                </div>)}
            </div>);
        }

        // ─── Auth Screen ──────────────────────────────────────
        function AuthScreen() {
            const [mode, setMode] = useState("login");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirm, setConfirm] = useState("");
            const [error, setError] = useState("");
            const [info, setInfo] = useState("");
            const [loading, setLoading] = useState(false);
            const INP2 = { ...INP, marginBottom: 10, background: "#0f172a" };
            const BTN = (bg) => ({ ...BTNP(bg), width: "100%", padding: 12, fontSize: 14, marginBottom: 8 });

            const handle = async () => {
                setError(""); setInfo(""); setLoading(true);
                try {
                    if (mode === "login") { await auth.signInWithEmailAndPassword(email, password); }
                    else if (mode === "register") {
                        if (password !== confirm) { setError("Passwords do not match"); setLoading(false); return; }
                        if (password.length < 6) { setError("Password must be at least 6 characters"); setLoading(false); return; }
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else { await auth.sendPasswordResetEmail(email); setInfo("Reset email sent! Check your inbox."); }
                } catch (e) { setError(e.message.replace("Firebase: ", "").replace(/\(auth\/.*\)/, "").trim()); }
                setLoading(false);
            };

            return (<div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0f172a 60%,#1e1b4b)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ background: "#1e293b", borderRadius: 20, padding: 36, width: 360, border: "1.5px solid #334155", boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}>
                    <div style={{ textAlign: "center", marginBottom: 28 }}>
                        <div style={{ fontSize: 40, marginBottom: 6 }}>💧</div>
                        <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>YORS WATER</div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>Accounting Suite</div>
                    </div>
                    {error && <div style={{ background: "#450a0a", border: "1px solid #ef4444", borderRadius: 8, padding: "9px 13px", marginBottom: 12, color: "#fca5a5", fontSize: 12 }}>{error}</div>}
                    {info && <div style={{ background: "#052e16", border: "1px solid #22c55e", borderRadius: 8, padding: "9px 13px", marginBottom: 12, color: "#86efac", fontSize: 12 }}>{info}</div>}
                    <input style={INP2} type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />
                    {mode !== "reset" && <input style={INP2} type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />}
                    {mode === "register" && <input style={INP2} type="password" placeholder="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />}
                    <button style={BTN()} onClick={handle} disabled={loading}>{loading ? "Please wait…" : mode === "login" ? "Sign In" : mode === "register" ? "Create Account" : "Send Reset Link"}</button>
                    <div style={{ textAlign: "center", fontSize: 12, color: "#64748b", display: "flex", flexDirection: "column", gap: 6, marginTop: 4 }}>
                        {mode === "login" && <><span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("register")}>Don't have an account? Register</span><span style={{ color: "#64748b", cursor: "pointer" }} onClick={() => setMode("reset")}>Forgot password?</span></>}
                        {mode === "register" && <span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("login")}>Already have an account? Sign In</span>}
                        {mode === "reset" && <span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("login")}>← Back to Sign In</span>}
                    </div>
                </div>
            </div>);
        }

        // ─── Firestore Hook ───────────────────────────────────
        function useFirestore(uid) {
            const [state, setState] = useState(INIT);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const timer = useRef(null);

            useEffect(() => {
                if (!uid) return;
                setLoading(true);
                db.collection("companies").doc(uid).get()
                    .then(snap => { if (snap.exists) setState({ ...INIT, ...snap.data() }); else setState(INIT); })
                    .catch(console.error).finally(() => setLoading(false));
            }, [uid]);

            useEffect(() => {
                if (!uid || loading) return;
                setSaving(true);
                clearTimeout(timer.current);
                timer.current = setTimeout(() => {
                    db.collection("companies").doc(uid).set(state, { merge: true })
                        .catch(console.error).finally(() => setSaving(false));
                }, 1000);
                return () => clearTimeout(timer.current);
            }, [state, uid, loading]);

            return { state, setState, loading, saving };
        }

        // ─── Main App ─────────────────────────────────────────
        function App() {
            const [user, setUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            useEffect(() => { const unsub = auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); }); return unsub; }, []);
            if (authLoading) return <div style={{ minHeight: "100vh", background: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", color: "#a855f7", fontSize: 16, fontWeight: 700 }}>💧 Loading…</div>;
            if (!user) return <AuthScreen />;
            return <AccountingApp user={user} />;
        }

        // ─── Accounting App ───────────────────────────────────
        function AccountingApp({ user }) {
            const { state, setState, loading, saving } = useFirestore(user.uid);
            const [tab, setTab] = useState("Dashboard");
            const [modal, setModal] = useState(null);
            const [form, setForm] = useState({});
            const [invFilter, setInvFilter] = useState({ bt: "All", cat: "All", godown: "All", dateFrom: "", dateTo: "", status: "All", search: "" });
            const [selectedClient, setSelectedClient] = useState(null);
            const [clSearch, setClSearch] = useState("");
            const [partyGodownF, setPartyGodownF] = useState("All");
            const [clTypeF, setClTypeF] = useState("All");
            const [clSort, setClSort] = useState("name");
            const [clSortDir, setClSortDir] = useState(1);
            const [clCatView, setClCatView] = useState("normal");
            const [clDetailCat, setClDetailCat] = useState("all");
            const toggleSort = (col) => { if (clSort === col) setClSortDir(d => d * -1); else { setClSort(col); setClSortDir(1); } };
            const sortArrow = (col) => clSort === col ? (clSortDir === 1 ? " ▲" : " ▼") : "";

            const si = state.stockIn || [], so = state.stockOut || [], creds = state.creditors || [], debs = state.debtors || [];
            const cash = state.cashEntries || [], ple = state.plEntries || [], te = state.tradingEntries || [], da = state.depreciationAssets || [];
            const clients = state.clients || [];
            const fifo = useMemo(() => computeFIFO(si, so), [si, so]);

            const totalPurchases = si.reduce((a, b) => a + Number(b.totalAmount), 0);
            const totalSales = so.reduce((a, b) => a + Number(b.totalAmount), 0);
            const fifoCOGS = Object.values(fifo).reduce((a, b) => a + b.cogs, 0);
            const fifoClosing = Object.values(fifo).reduce((a, b) => a + b.closingValue, 0);
            const openingStockAmt = Number(state.openingStock?.amount || 0);
            const tradingDr = totalPurchases + openingStockAmt + te.filter(e => e.side === "dr").reduce((a, b) => a + Number(b.amount), 0);
            const tradingCr = totalSales + fifoClosing + te.filter(e => e.side === "cr").reduce((a, b) => a + Number(b.amount), 0);
            const grossProfit = tradingCr - tradingDr;
            const cashIn = cash.filter(e => e.dir === "in").reduce((a, b) => a + Number(b.amount), 0);
            const cashOut = cash.filter(e => e.dir === "out").reduce((a, b) => a + Number(b.amount), 0);
            const cashBal = cashIn - cashOut;
            const manualExpense = ple.filter(e => e.side === "expense").reduce((a, b) => a + Number(b.amount), 0);

                            return { key: k, bt, cat, f, fb, filteredInQty, filteredOutQty, filteredClosing, filteredCogs, filteredPurchased };

                                {totalDepreciation > 0 && <div style={{ marginBottom: 6 }}><div style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, marginBottom: 2 }}>Depreciation (auto)</div>{da.map(a => { const d = calcDepreciation(a); return d.totalDepr > 0 ? <div key={a.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 8, color: C.amber, marginBottom: 2 }}><span>{a.name}</span><span>{fc(d.totalDepr)}</span></div> : null; })}</div>}

                            <DateInput value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} />
                            <input type="number" style={INP} placeholder="Opening Balance (₹)" value={form.amount || "0"} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
                            <input type="number" style={INP} placeholder="Credit Period (days) *" value={form.creditPeriod || ""} onChange={e => setForm(f => ({ ...f, creditPeriod: e.target.value }))} />
                            <button style={{ ...BTNP(), width: "100%" }} onClick={() => applyCredDeb("debtor")}>Save</button>
                        </div>}

                        {modal === "cash" && <div>
                            <div style={{ fontWeight: 800, fontSize: 15, color: form.dir === "in" ? C.green : C.red, marginBottom: 12 }}>{form.dir === "in" ? "💵 Cash In" : "💸 Cash Out"}</div>
                            <DateInput value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} />
                            <select style={INP} value={form.payType || ""} onChange={e => setForm(f => ({ ...f, payType: e.target.value, description: e.target.value, linkedId: "" }))}>
                                <option value="">{form.dir === "in" ? "Receipt Type" : "Payment Type"} *</option>
                                {(form.dir === "in" ? CASH_IN_TYPES : CASH_OUT_TYPES).map(t => <option key={t}>{t}</option>)}
                            </select>
                            {form.dir === "in" && form.payType === "Debtor Payment" && <select style={INP} value={form.linkedId || ""} onChange={e => { const d = debs.find(x => x.id === e.target.value); setForm(f => ({ ...f, linkedId: e.target.value, description: "Receipt from " + (d ? d.name : ""), amount: d ? String(debtorBal(d)) : f.amount })); }}>
                                <option value="">Select Debtor</option>{debs.filter(d => !d.checked).map(d => <option key={d.id} value={d.id}>{d.name} — {fc(debtorBal(d))}</option>)}
                            </select>}
                            {form.dir === "out" && form.payType === "Creditor Payment" && <select style={INP} value={form.linkedId || ""} onChange={e => { const c = creds.find(x => x.id === e.target.value); setForm(f => ({ ...f, linkedId: e.target.value, description: "Payment to " + (c ? c.name : ""), amount: c ? String(creditorBal(c)) : f.amount })); }}>
                                <option value="">Select Creditor</option>{creds.filter(c => !c.checked).map(c => <option key={c.id} value={c.id}>{c.name} — {fc(creditorBal(c))}</option>)}
                            </select>}
                            <input style={INP} placeholder="Description *" value={form.description || ""} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
                            <input type="number" style={INP} placeholder="Amount (₹) *" value={form.amount || ""} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
                            <button style={{ ...BTNP(form.dir === "in" ? "linear-gradient(90deg,#22c55e,#16a34a)" : "linear-gradient(90deg,#ef4444,#dc2626)"), width: "100%" }} onClick={applyCash}>Save</button>
                        </div>}

                        {modal === "depr" && <div>
                            <div style={{ fontWeight: 800, fontSize: 15, color: C.amber, marginBottom: 4 }}>📉 Add Depreciation</div>
                            {Object.values(state.balanceSheet?.assets || {}).filter(a => a.subCategory === "Fixed Assets" && !a.linkedDeprId).length === 0
                                ? <div style={{ background: "#1e293b", borderRadius: 8, padding: 14, marginBottom: 12, color: C.amber, fontSize: 12, textAlign: "center" }}>No Fixed Assets found. Add one in Balance Sheet first.</div>
                                : <div>
                                    <select style={INP} value={form.bsAssetId || ""} onChange={e => setForm(f => ({ ...f, bsAssetId: e.target.value }))}>
                                        <option value="">Select Fixed Asset *</option>
                                        {Object.values(state.balanceSheet?.assets || {}).filter(a => a.subCategory === "Fixed Assets" && !a.linkedDeprId).map(a => <option key={a.id} value={a.id}>{a.description} — {fc(a.amount)}</option>)}
                                    </select>
                                    <select style={INP} value={form.method || ""} onChange={e => setForm(f => ({ ...f, method: e.target.value }))}><option value="">Method *</option>{DEPR_METHODS.map(m => <option key={m}>{m}</option>)}</select>
                                    <select style={INP} value={form.period || ""} onChange={e => setForm(f => ({ ...f, period: e.target.value }))}><option value="">Period *</option>{DEPR_PERIODS.map(p => <option key={p}>{p}</option>)}</select>
                                    <input type="number" style={INP} placeholder="Annual Depreciation Rate (%) *" value={form.depRate || ""} onChange={e => setForm(f => ({ ...f, depRate: e.target.value }))} />
                                    <button style={{ ...BTNP("linear-gradient(90deg,#f59e0b,#d97706)"), width: "100%" }} onClick={applyDepr}>Save Depreciation</button>
                                </div>}
                        </div>}

                        {modal === "addClient" && <div>
                            <div style={{ fontWeight: 800, fontSize: 15, color: C.teal, marginBottom: 12 }}>👤 Add Client</div>
                            <input style={INP} placeholder="Client Name *" value={form.name || ""} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} />
                            <select style={INP} value={form.clientType || ""} onChange={e => setForm(f => ({ ...f, clientType: e.target.value }))}>
                                <option value="">Client Type *</option>
                                {CLIENT_TYPES.map(t => <option key={t}>{t}</option>)}
                            </select>
                            <DateInput value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} />
                            <input style={INP} placeholder="Phone" value={form.phone || ""} onChange={e => setForm(f => ({ ...f, phone: e.target.value }))} />
                            <input style={INP} placeholder="Address" value={form.address || ""} onChange={e => setForm(f => ({ ...f, address: e.target.value }))} />
                            <button style={{ ...BTNP("linear-gradient(90deg,#14b8a6,#0d9488)"), width: "100%" }} onClick={() => {
                                if (!form.name || !form.clientType) { alert("Fill name and type"); return; }
                                upd(p => ({ ...p, clients: [...(p.clients || []), { id: gid(), name: form.name, type: form.clientType, date: form.date || today(), phone: form.phone || "", address: form.address || "" }] })); closeM();
                            }}>Save Client</button>
                        </div>}

                        <button onClick={closeM} style={{ width: "100%", marginTop: 8, background: C.mid, color: "#94a3b8", border: "none", borderRadius: 7, padding: "7px 0", cursor: "pointer", fontSize: 12 }}>Cancel</button>
                    </div>
                </div>}
            </div>);
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
