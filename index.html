        * {

            width: 6px;

        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }

        input[type=date]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: .5;
        }

        /* Prevent accidental scroll-wheel changes on number inputs */
        input[type=number] {
            -moz-appearance: textfield;
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* ─── PRINT: Show only the invoice, hide the entire app shell ─── */
        @media print {
            body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
            }

            /* Step 1: Make everything invisible (visibility can be overridden by children, unlike display:none) */
            body * {
                visibility: hidden !important;
            }

            /* Step 2: Make only the invoice and all its children visible */
            #print-area,
            #print-area * {
                visibility: visible !important;
            }

            /* Step 3: Pull the invoice to the top-left of the page */
            #print-area {
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 20px 30px !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                border-radius: 0 !important;
            }

            #print-area * {
                color: black !important;
                border-color: #000 !important;
                background: white !important;
                box-shadow: none !important;
            }

            #print-area table th {
                background-color: #f1f5f9 !important;
                color: black !important;
                border: 1px solid #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            #print-area table td {
                border: 1px solid #000 !important;
                color: black !important;
            }
        }

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ─── Constants ────────────────────────────────────────
        const BOTTLE_TYPES = ["200ml", "500ml", "1L"];
        const GODOWNS = ["Hazra", "Dunlop", "Bhawanipur", "Alipore", "Gariahat"];
        const TABS = ["Dashboard", "Inventory", "Stock In", "Stock Out", "GST Invoice", "Raw Materials", "Debtors", "Creditors", "Clients", "Cash Book", "Trading A/C", "P&L Account", "Balance Sheet", "Trial Balance", "Cash Flow", "Journal", "Audit Trail", "Depreciation", "Charts"];
        const RAW_MAT_TYPES = ["Label", "Cap", "Conversion Cost", "Preform", "Shrink"];
        const CLIENT_TYPES = ["Retailer", "Distributor"];
        const CASH_IN_TYPES = ["Sales Receipt", "Debtor Payment", "Capital Introduced", "Loan Received", "Purchase Return Receipt", "Other Income Receipt"];
        const CASH_OUT_TYPES = ["Expense Payment", "Creditor Payment", "Stock Purchase Payment", "Raw Material Payment", "Asset Down Payment", "Loan Repayment", "Interest on Loan Repayment", "Sales Return Refund", "GST Tax Payment", "Other Payment"];

        const SCHEDULE3 = {
            assets: { "Non-Current Assets": ["Fixed Assets", "Capital Work in Progress", "Long Term Investments", "Deferred Tax Assets"], "Current Assets": ["Inventories", "Trade Receivables", "Cash and Cash Equivalents", "Short Term Loans", "Other Current Assets"] },

        };
        const DEPR_METHODS = ["Straight Line (SLM)", "Written Down Value (WDV)"];
        const DEPR_PERIODS = ["Monthly", "Half-Yearly", "Yearly"];
        const C = { dark: "#0f172a", mid: "#1e293b", border: "#334155", text: "#e2e8f0", muted: "#64748b", purple: "#a855f7", green: "#22c55e", red: "#ef4444", blue: "#38bdf8", amber: "#f59e0b", violet: "#8b5cf6", teal: "#14b8a6" };
        const INIT = { stockIn: [], stockOut: [], gstInvoices: [], creditors: [], debtors: [], clients: [], plEntries: [], balanceSheet: { assets: {}, liabilities: {} }, cashEntries: [], tradingEntries: [], depreciationAssets: [], rawMaterialPayments: [], openingStock: {}, auditLog: [], settings: { adminPin: "0000", companyProfile: { name: "YORS WATER", gstin: "19AAACY1234A1Z1", stateCode: "19", address: "12, Water Supply Rd, Kolkata, West Bengal", phone: "9876543210" } } };
        const INP = { width: "100%", padding: "8px 11px", borderRadius: 7, border: "1.5px solid #334155", background: "#1e293b", color: "#e2e8f0", fontSize: 13, marginBottom: 9, boxSizing: "border-box" };
        const BTNP = (bg) => ({ background: bg || "linear-gradient(90deg,#6366f1,#8b5cf6)", color: "#fff", border: "none", borderRadius: 7, padding: "8px 18px", cursor: "pointer", fontWeight: 700, fontSize: 12 });
        const BTND = { background: "#ef4444", color: "#fff", border: "none", borderRadius: 5, padding: "3px 9px", cursor: "pointer", fontWeight: 600, fontSize: 11 };
        const TBL = { width: "100%", borderCollapse: "collapse", fontSize: 12 };
        const THS = { background: "#1e293b", color: "#94a3b8", padding: "8px 9px", textAlign: "left", borderBottom: "1px solid #334155", whiteSpace: "nowrap", fontSize: 11 };
        const TDS = { padding: "7px 9px", borderBottom: "1px solid #1e293b", color: "#e2e8f0", verticalAlign: "middle" };
        const CARD = (c) => ({ background: "linear-gradient(135deg," + c + ")", borderRadius: 12, padding: "13px 15px", color: "#fff", flex: 1, minWidth: 115, boxShadow: "0 4px 18px rgba(0,0,0,0.18)" });

        // ─── Helpers ──────────────────────────────────────────
        const gid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
        const fc = n => "₹" + Number(n || 0).toLocaleString("en-IN", { minimumFractionDigits: 2 });
        const fabs = n => fc(Math.abs(n));
        const today = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); };

        function computeFIFO(stockIn, stockOut) {
            const results = {};
            BOTTLE_TYPES.forEach(bt => {
                ["normal", "customized"].forEach(cat => {
                    const key = bt + "_" + cat;
                    const batches = stockIn.filter(x => x.bottleType === bt && x.category === cat && !x.isReturn).sort((a, b) => new Date(a.date) - new Date(b.date)).map(x => ({ ...x, origQty: Number(x.qty), remQty: Number(x.qty), rate: Number(x.ratePerUnit), batchNo: x.batchNo, godown: x.godown }));
                    const returns = stockIn.filter(x => x.bottleType === bt && x.category === cat && x.isReturn);
                    returns.forEach(r => {
                        let b = batches.find(x => x.batchNo === r.batchNo && x.godown === r.godown);
                        if (!b) {
                            b = batches.find(x => x.godown === r.godown && x.remQty >= Number(r.qty));
                            if (!b) {
                                b = batches.find(x => x.godown === r.godown && x.remQty > 0);
                                if (!b) {
                                    b = batches.find(x => x.godown === r.godown);
                                }
                            }
                        }
                        if (b) {
                            b.origQty -= Number(r.qty);
                            b.remQty -= Number(r.qty);
                        }
                    });
                    const outs = stockOut.filter(x => x.bottleType === bt && x.category === cat && !x.isReturn).sort((a, b) => new Date(a.date) - new Date(b.date));
                    const salesReturns = stockOut.filter(x => x.bottleType === bt && x.category === cat && x.isReturn);
                    let cogs = 0;
                    outs.forEach(out => { let needed = Number(out.qty); for (let i = 0; i < batches.length && needed > 0; i++) { if (batches[i].godown !== out.godown) continue; const take = Math.min(batches[i].remQty, needed); if (take > 0) { cogs += take * batches[i].rate; batches[i].remQty -= take; needed -= take; } } });
                    salesReturns.forEach(sr => { batches.push({ origQty: Number(sr.qty), remQty: Number(sr.qty), rate: Number(sr.ratePerUnit), godown: sr.godown, batchNo: "SR" }); });
                    const inQty = batches.reduce((a, b) => a + b.origQty, 0), outQty = outs.reduce((a, b) => a + Number(b.qty), 0);
                    let closingValue = 0; batches.forEach(b => { closingValue += b.remQty * b.rate; });
                    results[key] = { batches, cogs, closingValue, inQty, outQty, balQty: inQty - outQty };
                });
            });
            return results;
        }

        function calcDepreciation(asset) {
            const cost = Number(asset.cost || 0), rate = Number(asset.depRate || 0) / 100;
            const startDate = new Date(asset.startDate || today()), now = new Date();
            let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            if (mo < 0) mo = 0;
            let totalDepr = 0;
            if (asset.method === "Straight Line (SLM)") { const annual = cost * rate, md = annual / 12; if (asset.period === "Monthly") totalDepr = md * Math.max(1, Math.min(mo, 1)); else if (asset.period === "Half-Yearly") totalDepr = md * Math.max(1, Math.min(mo, 6)); else totalDepr = md * Math.max(1, Math.min(mo, 12)); }
            else { totalDepr = cost - cost * Math.pow(1 - rate, Math.max(mo / 12, 0)); }
            return { totalDepr: Math.min(Math.max(totalDepr, 0), cost), wdv: Math.max(0, cost - Math.min(Math.max(totalDepr, 0), cost)) };
        }

        // ─── Components ───────────────────────────────────────
        function Badge({ label, color }) { return <span style={{ background: color + "25", color, borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{label}</span>; }
        function DateInput({ value, onChange }) { return <input type="date" style={INP} value={value || ""} max="2099-12-31" onChange={e => onChange(e.target.value)} />; }

        function MiniChart({ data, color, height = 60 }) {
            if (!data || data.length < 2) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 10 }}>Not enough data</div>;
            const vals = data.map(d => d.v), max = Math.max(...vals, 0.01), min = Math.min(...vals), range = max - min || 1, w = 280, pad = 4;
            const pts = data.map((d, i) => `${pad + (i / (data.length - 1)) * (w - pad * 2)},${height - pad - ((d.v - min) / range) * (height - pad * 2)}`);
            const gId = "g" + color.replace("#", "");
            return (<div><svg width="100%" viewBox={`0 0 ${w} ${height}`} style={{ display: "block" }}>
                <defs><linearGradient id={gId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3" /><stop offset="100%" stopColor={color} stopOpacity="0" /></linearGradient></defs>
                <polygon points={`${pad},${height} ${pts.join(" ")} ${w - pad},${height}`} fill={`url(#${gId})`} />
                <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="2" />
                {data.map((d, i) => { const x = pad + (i / (data.length - 1)) * (w - pad * 2), y = height - pad - ((d.v - min) / range) * (height - pad * 2); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}
            </svg>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#64748b", marginTop: 2 }}><span>{data[0].l}</span><span style={{ color, fontWeight: 700 }}>{fc(data[data.length - 1].v)}</span><span>{data[data.length - 1].l}</span></div></div>);
        }

        function BarChart({ data, color, height = 160 }) {
            if (!data || data.length === 0) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 11 }}>No data yet</div>;
            const vals = data.map(d => d.v), max = Math.max(...vals, 1);
            const w = 400, pad = 30, barGap = 4, bw = Math.min(36, (w - pad * 2 - barGap * data.length) / data.length);
            const chartH = height - 30;
            return (<svg width="100%" viewBox={`0 0 ${w} ${height}`} style={{ display: "block" }}>
                {/* Grid lines */}
                {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                    const y = pad / 2 + (1 - f) * (chartH - pad); return <g key={i}><line x1={pad} y1={y} x2={w - 10} y2={y} stroke="#1e293b" strokeWidth="1" /><text x={pad - 4} y={y + 3} fill="#64748b" fontSize="8" textAnchor="end">{Math.round(max * f / 1000)}k</text></g>;
                })}
                {/* Bars */}
                {data.map((d, i) => {
                    const x = pad + i * (bw + barGap) + barGap, bh = (d.v / max) * (chartH - pad), y = pad / 2 + (chartH - pad) - bh;
                    return <g key={i}>
                        <defs><linearGradient id={`bar${i}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.95" /><stop offset="100%" stopColor={color} stopOpacity="0.5" /></linearGradient></defs>
                        <rect x={x} y={y} width={bw} height={bh} rx={3} fill={`url(#bar${i})`} />
                        <text x={x + bw / 2} y={y - 4} fill={color} fontSize="7" fontWeight="700" textAnchor="middle">{d.v >= 1000 ? Math.round(d.v / 1000) + "k" : d.v}</text>
                        <text x={x + bw / 2} y={height - 4} fill="#94a3b8" fontSize="7" textAnchor="middle">{d.l}</text>
                    </g>;
                })}
            </svg>);
        }

        function SettlePanel({ form, setForm, creds, debs, rawMats }) {
            const mode = form._settleContext; if (!mode) return null;
            const isIn = ["sale", "trading_cr", "bs_liability_reduce", "pl_income"].includes(mode);
            const canCreditor = ["purchase", "trading_dr", "bs_asset_increase", "pl_expense", "bs_liability_reduce"].includes(mode);
            const canDebtor = ["sale", "trading_cr", "pl_income", "pl_expense"].includes(mode);
            const canNone = ["bs_asset_increase", "bs_liability_reduce", "trading_dr", "trading_cr", "pl_expense", "pl_income"].includes(mode);
            const canRawMat = mode === "purchase"; // Only for Stock In (purchase) — total-based pool
            const options = ["cash", canCreditor && "creditor", canDebtor && "debtor", canRawMat && "rawMaterial", canNone && "none"].filter(Boolean);
            const mColors = { cash: C.green, creditor: C.amber, debtor: C.violet, none: C.muted, rawMaterial: C.teal };
            const mLabels = { cash: isIn ? "💵 Cash In" : "💵 Cash Out", creditor: "🏦 Creditor", debtor: "📋 Debtor", none: "📝 Journal Only", rawMaterial: "🏭 Raw Material" };

            const getTransactionTotal = () => {
                const qty = Number(form.qty || 0);
                const rate = Number(form.ratePerUnit || 0);
                const hasGst = form.enableGst === "yes";
                const gstRate = hasGst ? Number(form.gstRate || 18) : 0;
                if (["purchase", "sale"].includes(mode)) {
                    if (qty === 0 && rate === 0 && form.amount) {
                        const base = Number(form.amount || 0);
                        const gstAmount = hasGst ? Math.round(base * gstRate) / 100 : 0;
                        return base + gstAmount;
                    }
                    const taxable = qty * rate;
                    const gstAmount = hasGst ? Math.round(taxable * gstRate) / 100 : 0;
                    return taxable + gstAmount;
                } else if (["trading_dr", "trading_cr", "pl_expense", "pl_income"].includes(mode)) {
                    const base = Number(form.amount || 0);
                    const gstAmount = hasGst ? Math.round(base * gstRate) / 100 : 0;
                    return base + gstAmount;
                } else {
                    return Number(form.amount || 0);
                }
            };
            const totalVal = getTransactionTotal();
            const getTransactionBase = () => {
                const qty = Number(form.qty || 0);
                const rate = Number(form.ratePerUnit || 0);
                if (["purchase", "sale"].includes(mode)) {
                    if (qty === 0 && rate === 0 && form.amount) {
                        return Number(form.amount || 0);
                    }
                    return qty * rate;
                }
                return Number(form.amount || 0);
            };
            const baseVal = getTransactionBase();
            const paidVal = Number(form.paidAmount || 0);
            const availableRawMats = (rawMats || []).filter(r => (Number(r.amount) - (r.usedForStockIn || 0)) > 0.001);

            return (<div style={{ background: "#0a0f1e", borderRadius: 8, padding: 12, marginBottom: 9, border: "1px solid #334155" }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, marginBottom: 7 }}>💳 Settlement Mode</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
                    {options.map(opt => <button key={opt} onClick={() => setForm(f => ({ ...f, settleMode: opt, linkedPartyId: "", newPartyName: "", newPartyCredit: "", paidAmount: "", linkedRawMaterialId: "" }))} style={{ flex: 1, minWidth: 70, padding: "7px 4px", border: "2px solid " + (form.settleMode === opt ? mColors[opt] : C.border), borderRadius: 7, background: form.settleMode === opt ? mColors[opt] + "18" : C.mid, color: form.settleMode === opt ? mColors[opt] : C.muted, fontWeight: 700, fontSize: 11, cursor: "pointer" }}>{mLabels[opt]}</button>)}
                </div>
                {form.settleMode === "rawMaterial" && (() => {
                    const totalRmAvail = availableRawMats.reduce((sum, r) => sum + (Number(r.amount) - (r.usedForStockIn || 0)), 0);
                    return (<div style={{ marginTop: 4 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: baseVal > totalRmAvail ? C.red : C.teal }}>
                            Total Available Raw Material Pool (excl. GST): <strong>{fc(totalRmAvail)}</strong>
                        </div>
                        {baseVal > 0 && (baseVal <= totalRmAvail ? (
                            <div style={{ fontSize: 10, color: C.teal, marginTop: 2 }}>
                                Deduction: <strong>{fc(baseVal)}</strong> | Remaining after deduction: <strong>{fc(totalRmAvail - baseVal)}</strong>
                            </div>
                        ) : (
                            <div style={{ fontSize: 10, color: C.red, marginTop: 2 }}>
                                ⚠️ Insufficient balance! Need {fc(baseVal)} but only {fc(totalRmAvail)} available.
                            </div>
                        ))}
                    </div>);
                })()}
                {(form.settleMode === "creditor" || form.settleMode === "debtor") && (<div>
                    <select style={INP} value={form.linkedPartyId || ""} onChange={e => setForm(f => ({ ...f, linkedPartyId: e.target.value, newPartyName: "", newPartyCredit: "" }))}>
                        <option value="">{form.settleMode === "creditor" ? "Select Creditor" : "Select Debtor"}</option>
                        {(form.settleMode === "creditor" ? creds : debs).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        <option value="__new__">+ Create New</option>
                    </select>
                    {form.linkedPartyId === "__new__" && <div>
                        <input style={INP} placeholder="Name *" value={form.newPartyName || ""} onChange={e => setForm(f => ({ ...f, newPartyName: e.target.value }))} />
                        <input type="number" style={INP} placeholder="Credit Period (days) *" value={form.newPartyCredit || ""} onChange={e => setForm(f => ({ ...f, newPartyCredit: e.target.value }))} />
                    </div>}
                    <div style={{ marginTop: 8 }}>
                        <label style={{ fontSize: 10, color: "#94a3b8", fontWeight: 700, display: "block", marginBottom: 3 }}>
                            {isIn ? "Immediate Cash Received (₹)" : "Immediate Cash Paid (₹)"}
                        </label>
                        <input
                            type="number"
                            style={INP}
                            placeholder="e.g. 0 for full credit"
                            value={form.paidAmount || ""}
                            onChange={e => setForm(f => ({ ...f, paidAmount: e.target.value }))}
                        />
                        {form.paidAmount && paidVal > 0 && paidVal <= totalVal && (
                            <div style={{ fontSize: 10, color: C.amber, marginTop: 4 }}>
                                Remaining <strong>{fc(totalVal - paidVal)}</strong> will be added on credit.
                            </div>
                        )}
                        {form.paidAmount && paidVal > totalVal && (
                            <div style={{ fontSize: 10, color: C.red, marginTop: 4 }}>
                                ⚠️ Paid/Received amount cannot exceed total amount of {fc(totalVal)}.
                            </div>
                        )}
                    </div>
                </div>)}
            </div>);
        }

        // ─── Auth Screen ──────────────────────────────────────
        function AuthScreen() {
            const [mode, setMode] = useState("login");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirm, setConfirm] = useState("");
            const [error, setError] = useState("");
            const [info, setInfo] = useState("");
            const [loading, setLoading] = useState(false);
            const INP2 = { ...INP, marginBottom: 10, background: "#0f172a" };

                        {mode === "register" && <span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("login")}>Already have an account? Sign In</span>}

        // ─── Firestore Hook ───────────────────────────────────
        function useFirestore(uid) {
            const [state, setState] = useState(INIT);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const timer = useRef(null);

            useEffect(() => {
                if (!uid) return;
                setLoading(true);
                db.collection("companies").doc(uid).get()
                    .then(snap => { if (snap.exists) setState({ ...INIT, ...snap.data() }); else setState(INIT); })
                    .catch(console.error).finally(() => setLoading(false));
            }, [uid]);

            useEffect(() => {
                if (!uid || loading) return;
                setSaving(true);
                clearTimeout(timer.current);
                timer.current = setTimeout(() => {
                    db.collection("companies").doc(uid).set(state)
                        .catch(console.error).finally(() => setSaving(false));
                }, 1000);
                return () => clearTimeout(timer.current);
            }, [state, uid, loading]);

            return { state, setState, loading, saving };
        }

            const si = state.stockIn || [], so = state.stockOut || [], creds = state.creditors || [], debs = state.debtors || [];
            const cash = state.cashEntries || [], ple = state.plEntries || [], te = state.tradingEntries || [], da = state.depreciationAssets || [];
            const clients = state.clients || [];
            const fifo = useMemo(() => computeFIFO(si, so), [si, so]);

            const totalPurchases = si.reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)) * (b.isReturn ? -1 : 1), 0);
            const totalSales = so.reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)) * (b.isReturn ? -1 : 1), 0);
            const getCGST = e => e.cgstAmount !== undefined ? Number(e.cgstAmount) : (e.igstAmount !== undefined ? 0 : Number(e.gstAmount || 0) / 2);
            const getSGST = e => e.sgstAmount !== undefined ? Number(e.sgstAmount) : (e.igstAmount !== undefined ? 0 : Number(e.gstAmount || 0) / 2);

            const cgstOutput =
                (state.gstInvoices || []).reduce((a, b) => a + Number(b.cgstTotal || 0), 0) +
                so.filter(e => !e.gstInvoiceId).reduce((a, b) => a + getCGST(b) * (b.isReturn ? -1 : 1), 0) +
                te.filter(e => e.side === "cr").reduce((a, b) => a + getCGST(b), 0) +
                ple.filter(e => e.side === "income").reduce((a, b) => a + getCGST(b), 0) +

            const sgstOutput =
                (state.gstInvoices || []).reduce((a, b) => a + Number(b.sgstTotal || 0), 0) +
                so.filter(e => !e.gstInvoiceId).reduce((a, b) => a + getSGST(b) * (b.isReturn ? -1 : 1), 0) +
                te.filter(e => e.side === "cr").reduce((a, b) => a + getSGST(b), 0) +
                ple.filter(e => e.side === "income").reduce((a, b) => a + getSGST(b), 0) +
                cash.filter(e => e.dir === "in" && !e.sourceId).reduce((a, b) => a + getSGST(b), 0);
            const igstOutput =
                (state.gstInvoices || []).reduce((a, b) => a + Number(b.igstTotal || 0), 0) +
                so.filter(e => !e.gstInvoiceId).reduce((a, b) => a + getIGST(b) * (b.isReturn ? -1 : 1), 0) +
                te.filter(e => e.side === "cr").reduce((a, b) => a + getIGST(b), 0) +
                ple.filter(e => e.side === "income").reduce((a, b) => a + getIGST(b), 0) +
                cash.filter(e => e.dir === "in" && !e.sourceId).reduce((a, b) => a + getIGST(b), 0);

            const totalGstOutput = cgstOutput + sgstOutput + igstOutput;

            // GST Input: exclude stockIn entries settled via rawMaterial (their GST is already captured
            // through rawMaterialPayments below, to prevent double-claiming ITC)
            const cgstInput =
                si.filter(e => e.settleMode !== "rawMaterial").reduce((a, b) => a + getCGST(b) * (b.isReturn ? -1 : 1), 0) +
                te.filter(e => e.side === "dr").reduce((a, b) => a + getCGST(b), 0) +
                ple.filter(e => e.side === "expense").reduce((a, b) => a + getCGST(b), 0) +
                (state.rawMaterialPayments || []).reduce((a, b) => a + getCGST(b), 0) +
                cash.filter(e => e.dir === "out" && !e.sourceId).reduce((a, b) => a + getCGST(b), 0);
            const sgstInput =
                si.filter(e => e.settleMode !== "rawMaterial").reduce((a, b) => a + getSGST(b) * (b.isReturn ? -1 : 1), 0) +
                te.filter(e => e.side === "dr").reduce((a, b) => a + getSGST(b), 0) +
                ple.filter(e => e.side === "expense").reduce((a, b) => a + getSGST(b), 0) +
                (state.rawMaterialPayments || []).reduce((a, b) => a + getSGST(b), 0) +
                cash.filter(e => e.dir === "out" && !e.sourceId).reduce((a, b) => a + getSGST(b), 0);
            const igstInput =
                si.filter(e => e.settleMode !== "rawMaterial").reduce((a, b) => a + getIGST(b) * (b.isReturn ? -1 : 1), 0) +
                te.filter(e => e.side === "dr").reduce((a, b) => a + getIGST(b), 0) +
                ple.filter(e => e.side === "expense").reduce((a, b) => a + getIGST(b), 0) +
                (state.rawMaterialPayments || []).reduce((a, b) => a + getIGST(b), 0) +
                cash.filter(e => e.dir === "out" && !e.sourceId).reduce((a, b) => a + getIGST(b), 0);

            const totalGstInput = cgstInput + sgstInput + igstInput;

            const getPaidSplit = (e, key) => {
                if (e.cgstAmount !== undefined && key === "cgst") return Number(e.cgstAmount);
                if (e.sgstAmount !== undefined && key === "sgst") return Number(e.sgstAmount);
                if (e.igstAmount !== undefined && key === "igst") return Number(e.igstAmount);
                if (e.cgstAmount === undefined && e.sgstAmount === undefined && e.igstAmount === undefined) {
                    if (key === "cgst" || key === "sgst") return Number(e.amount || 0) / 2;
                }
                return 0;
            };

            const cgstPaid = cash.filter(e => e.payType === "GST Tax Payment").reduce((a, b) => a + getPaidSplit(b, "cgst"), 0);
            const sgstPaid = cash.filter(e => e.payType === "GST Tax Payment").reduce((a, b) => a + getPaidSplit(b, "sgst"), 0);
            const igstPaid = cash.filter(e => e.payType === "GST Tax Payment").reduce((a, b) => a + getPaidSplit(b, "igst"), 0);

            const totalGstPaidToGovt = cgstPaid + sgstPaid + igstPaid;
            const totalGstPayable = totalGstOutput - totalGstInput - totalGstPaidToGovt;

            const cgstPayable = cgstOutput - cgstInput - cgstPaid;
            const sgstPayable = sgstOutput - sgstInput - sgstPaid;
            const igstPayable = igstOutput - igstInput - igstPaid;
            const grossPurchases = si.filter(x => !x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const purchaseReturnsAmt = si.filter(x => x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const grossSales = so.filter(x => !x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const salesReturnsAmt = so.filter(x => x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const fifoCOGS = Object.values(fifo).reduce((a, b) => a + b.cogs, 0);
            const fifoClosing = Object.values(fifo).reduce((a, b) => a + b.closingValue, 0);
            const openingStockAmt = Number(state.openingStock?.amount || 0);
            // rawMaterialCosts: remaining RM base cost (excl. GST) not yet allocated to stock-in.
            // Using r.amount (base excl. GST) prevents double-counting because GST is already
            // claimed separately as GST ITC Receivable on the asset side of the Balance Sheet.
            const rawMaterialCosts = (state.rawMaterialPayments || []).reduce((sum, r) => sum + Math.max(0, Number(r.amount) - (r.usedForStockIn || 0)), 0);
            const tradingDr = totalPurchases + openingStockAmt + rawMaterialCosts + te.filter(e => e.side === "dr" && e.sourceType !== "rawMaterial").reduce((a, b) => a + Number(b.amount), 0);
            const tradingCr = totalSales + fifoClosing + te.filter(e => e.side === "cr").reduce((a, b) => a + Number(b.amount), 0);
            const grossProfit = tradingCr - tradingDr;
            const cashIn = cash.filter(e => e.dir === "in" && !e.isPending).reduce((a, b) => a + Number(b.amount), 0);
            const cashOut = cash.filter(e => e.dir === "out" && !e.isPending).reduce((a, b) => a + Number(b.amount), 0);
            const cashBal = cashIn - cashOut;
            const manualExpense = ple.filter(e => e.side === "expense").reduce((a, b) => a + Number(b.amount), 0);
            const manualIncome = ple.filter(e => e.side === "income").reduce((a, b) => a + Number(b.amount), 0);
            const totalDepreciation = da.reduce((a, b) => a + calcDepreciation(b).totalDepr, 0);
            const deprWDVTotal = da.reduce((a, b) => a + calcDepreciation(b).wdv, 0);
            const deprCostTotal = da.reduce((a, b) => a + Number(b.cost), 0);
            const calcInterestForEntry = (e) => {
                if (!e.interestRate || !e.amount) return { monthly: 0, total: 0, months: 0 };
                const principal = Number(e.amount);
                const rate = Number(e.interestRate) / 100;
                const startDate = new Date(e.date || today());
                const now = new Date();
                let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
                if (mo < 0) mo = 0;
                const monthly = (principal * rate) / 12;
                const total = monthly * mo;
                return { monthly, total, months: mo };
            };
            const totalLoanInterest = Object.values(state.balanceSheet?.liabilities || {})
                .filter(e => e.subCategory === "Long Term Borrowings" && e.interestRate)
                .reduce((sum, e) => sum + calcInterestForEntry(e).total, 0);
            const loanInterestPaid = (loanId) => {
                return cash.filter(e => e.dir === "out" && e.payType === "Interest on Loan Repayment" && e.linkedId === loanId)
                    .reduce((sum, e) => sum + Number(e.amount || 0), 0);
            };
            const loanInterestOutstanding = (loan) => {
                const accrued = calcInterestForEntry(loan).total;
                const paid = loanInterestPaid(loan.id);
                return Math.max(0, accrued - paid);
            };
            const totalInterestPaid = cash
                .filter(e => e.dir === "out" && e.payType === "Interest on Loan Repayment")
                .reduce((sum, e) => sum + Number(e.amount || 0), 0);
            const outstandingInterestLiab = Math.max(0, totalLoanInterest - totalInterestPaid);
            const loanPrincipalPaid = (loanId) => {
                return cash.filter(e => e.dir === "out" && e.payType === "Loan Repayment" && e.linkedId === loanId)
                    .reduce((sum, e) => sum + Number(e.amount || 0), 0);
            };
            const loanPrincipalOutstanding = (loan) => {
                const original = Number(loan.amount || 0);
                const paid = loanPrincipalPaid(loan.id);
                return Math.max(0, original - paid);
            };
            // P&L is derived ONLY from Trading Account (gross profit) + manual P&L entries + depreciation + loan interest.
            // Cash Book is a receipts/payments register — it does NOT feed P&L to avoid double entry.
            const plIncome = (grossProfit > 0 ? grossProfit : 0) + manualIncome;
            const plExpense = manualExpense + totalDepreciation + totalLoanInterest + (grossProfit < 0 ? Math.abs(grossProfit) : 0);
            const netPL = plIncome - plExpense;

            const creditorFromStock = id => si.filter(x => x.settleMode === "creditor" && x.linkedPartyId === id).reduce((a, b) => a + Number(b.totalAmount) * (b.isReturn ? -1 : 1), 0);
            const creditorFromOther = id => {
                let sum = 0;
                te.forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) {
                        const xAmt = Number(x.totalAmount || x.amount || 0);
                        if (x.side === "dr") sum += xAmt;
                        else if (x.side === "cr") sum -= xAmt;
                    }
                });
                ple.forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) {
                        const xAmt = Number(x.totalAmount || x.amount || 0);
                        if (x.side === "expense") sum += xAmt;
                        else if (x.side === "income") sum -= xAmt;
                    }
                });
                Object.values(state.balanceSheet?.assets || {}).forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) sum += Number(x.amount || 0);
                });
                Object.values(state.balanceSheet?.liabilities || {}).forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) sum += Number(x.amount || 0);
                });
                (state.rawMaterialPayments || []).forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) sum += Number(x.totalAmount || x.amount || 0);
                });
                return sum;
            };
            const creditorCashPaid = id => cash.filter(e => e.dir === "out" && e.linkedId === id && !e.isPending).reduce((a, b) => a + Number(b.amount), 0);
            const creditorBal = c => Math.max(0, Number(c.amount) + creditorFromStock(c.id) + creditorFromOther(c.id) - creditorCashPaid(c.id));
            const debtorFromStock = id => so.filter(x => x.settleMode === "debtor" && x.linkedPartyId === id).reduce((a, b) => a + Number(b.totalAmount) * (b.isReturn ? -1 : 1), 0);
            const debtorFromOther = id => {
                let sum = 0;
                te.forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) {
                        const xAmt = Number(x.totalAmount || x.amount || 0);
                        if (x.side === "cr") sum += xAmt;
                        else if (x.side === "dr") sum -= xAmt;
                    }
                });
                ple.forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) {
                        const xAmt = Number(x.totalAmount || x.amount || 0);
                        if (x.side === "income") sum += xAmt;
                        else if (x.side === "expense") sum -= xAmt;
                    }
                });
                Object.values(state.balanceSheet?.assets || {}).forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) sum += Number(x.amount || 0);
                });
                Object.values(state.balanceSheet?.liabilities || {}).forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) sum -= Number(x.amount || 0);
                });
                return sum;
            };
            const debtorCashRcvd = id => cash.filter(e => e.dir === "in" && e.linkedId === id && !e.isPending).reduce((a, b) => a + Number(b.amount), 0);
            const debtorBal = d => Math.max(0, Number(d.amount) + debtorFromStock(d.id) + debtorFromOther(d.id) - debtorCashRcvd(d.id));
            const totalCreditors = creds.reduce((a, b) => a + creditorBal(b), 0);
            const totalDebtors = debs.reduce((a, b) => a + debtorBal(b), 0);
            // Balance Sheet manual entries: exclude Fixed Assets that have depreciation linked
            // (their WDV is shown via the auto depreciation line to avoid double-counting).
            const bsManualAssetsRaw = Object.values(state.balanceSheet?.assets || {});
            const bsManualLiabRaw = Object.values(state.balanceSheet?.liabilities || {}).map(e => {
                if (e.subCategory === "Long Term Borrowings") {
                    return { ...e, amount: loanPrincipalOutstanding(e) };
                }
                return e;
            });
            // IDs of BS entries that sourced cash (to exclude from P&L cash flows)
            const bsEntryIds = new Set([...bsManualAssetsRaw, ...bsManualLiabRaw].map(e => e.id));
            const bsManualAssets = bsManualAssetsRaw.reduce((a, b) => a + Number(b.amount), 0);
            const bsManualLiab = bsManualLiabRaw.reduce((a, b) => a + Number(b.amount), 0);
            // Auto assets: cash balance + closing stock + debtors - accumulated depreciation
            // Cash balance is from cash book (receipts & payments), kept separate from BS manual entries.
            // When GST ITC > Output GST (totalGstPayable < 0), the excess ITC is an asset (receivable from govt), not a negative liability.
            const gstItcReceivable = totalGstPayable < 0 ? Math.abs(totalGstPayable) : 0;
            const bsAutoAssets = cashBal + (fifoClosing > 0 ? fifoClosing : 0) + (totalDebtors > 0 ? totalDebtors : 0) - totalDepreciation + gstItcReceivable;
            // Auto liabilities: creditors + net P&L (net profit is carried to retained earnings / equity) + outstanding interest + GST payable (only when positive)
            const bsAutoLiab = (totalCreditors > 0 ? totalCreditors : 0) + netPL + (outstandingInterestLiab > 0 ? outstandingInterestLiab : 0) + (totalGstPayable > 0 ? totalGstPayable : 0);
            const bsTotalAssets = bsManualAssets + bsAutoAssets, bsTotalLiab = bsManualLiab + bsAutoLiab, bsDiff = bsTotalAssets - bsTotalLiab;

            const upd = fn => setState(p => fn(p));

            const buildTSD = (entries, amtField) => { const m = {}; entries.forEach(e => { const d = new Date(e.date), k = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); m[k] = (m[k] || 0) + Number(e[amtField] || 0); }); return Object.entries(m).sort((a, b) => a[0].localeCompare(b[0])).map(([l, v]) => ({ l, v })); };

            const resolveSettle = (frm, amount, date, description, entryId, direction) => {

                const paidVal = Number(form.paidAmount || 0);
                if (paidVal < 0 || (form.settleMode !== "cash" && paidVal > total)) {
                    alert(`Immediate cash paid must be between 0 and ₹${total.toFixed(2)}`);
                    return;
                }
                const id = gid();
                const desc = form.description || ("Raw Material: " + form.rawMatType);
                const direction = "out";
                const res = resolveSettle(form, total, form.date, desc, id, direction);

                upd(p => {
                    let np = { ...p };
                    // Add raw material entry
                    np.rawMaterialPayments = [...(np.rawMaterialPayments || []), {
                        id, date: form.date, rawMatType: form.rawMatType,
                        description: desc, amount: baseAmt, gstRate, gstAmount, totalAmount: total,
                        settleMode: form.settleMode, linkedPartyId: res.partyId, linkedPartyName: res.partyName,
                        createdCreditorId: res.createdCreditorId, paidAmount: paidVal, usedForStockIn: 0, usedForStockInBase: 0,
                        gstType, cgstAmount, sgstAmount, igstAmount
                    }];
                    // Creditor creation
                    if (res.createdCreditorId) np.creditors = [...np.creditors, { id: res.createdCreditorId, name: form.newPartyName, date: form.date, amount: 0, creditPeriod: form.newPartyCredit || "", notified: false, checked: false }];
                    // Cash effects from resolveSettle
                    res.cashEffects.forEach(e => { np.cashEntries = [...np.cashEntries, { ...e, payType: "Raw Material Payment" }]; });
                    np = withLog(np, "CREATE", "rawMaterialPayments", id, `Added Raw Material Payment: ${form.rawMatType} — Base: ₹${baseAmt}, GST: ₹${gstAmount}`);
                    return np;
                }); closeM();
            };
            const applyCredDeb = side => {
                if (!form.name || !form.date || !form.creditPeriod) { alert("Fill all required fields"); return; }
                const key = side === "creditor" ? "creditors" : "debtors";
                const id = gid();
                upd(p => {
                    let np = { ...p, [key]: [...p[key], { id, name: form.name, date: form.date, amount: Number(form.amount || 0), creditPeriod: form.creditPeriod, notified: false, checked: false }] };
                    return withLog(np, "CREATE", key, id, `Added ${side} ${form.name}`);
                }); closeM();
            };
            const triggerBadDebt = debtor => {
                const bal = debtorBal(debtor);
                openM("badDebt", {
                    debtorId: debtor.id,
                    debtorName: debtor.name,
                    amount: bal > 0 ? String(bal) : "",
                    description: `Bad Debt Write-off — ${debtor.name}`
                });
            };
            const applyBadDebtWriteOff = () => {
                const { date, amount, description, debtorId, debtorName } = form;
                if (!date || !amount || !description || !debtorId) { alert("Fill all fields"); return; }
                const amt = Number(amount);
                if (amt <= 0) { alert("Amount must be > 0"); return; }

                const debtor = state.debtors.find(d => d.id === debtorId);
                if (!debtor) { alert("Debtor not found"); return; }
                const bal = debtorBal(debtor);
                if (amt > bal) {
                    if (!window.confirm(`Warning: The write-off amount (₹${amt}) is greater than the debtor's outstanding balance (₹${bal}). Proceed anyway?`)) return;
                }

                const id = gid();
                upd(p => {
                    const badDebtEntry = {
                        id,
                        date,
                        side: "expense",
                        category: "Bad Debts",
                        description,
                        amount: amt,
                        settleMode: "debtor",
                        linkedPartyId: debtorId,
                        linkedPartyName: debtorName
                    };
                    let np = {
                        ...p,
                        plEntries: [...p.plEntries, badDebtEntry]
                    };
                    np = withLog(np, "CREATE", "plEntries", id, `Written off Bad Debt for debtor ${debtorName}: ₹${amt}`);
                    return np;
                });
                closeM();
            };
            const applyCash = () => {
                if (!form.date || !form.payType || !form.amount || !form.description) { alert("Fill all fields"); return; }
                if (Number(form.amount) <= 0) { alert("Amount must be > 0"); return; }
                const baseAmt = Number(form.amount);

                const isGstPayment = form.payType === "GST Tax Payment";
                const hasGst = form.enableGst === "yes";
                const gstRateV = hasGst ? Number(form.gstRate || 18) : 0;
                const gstAmtV = hasGst ? Math.round(baseAmt * gstRateV) / 100 : 0;
                const totalAmtV = baseAmt + gstAmtV;

                let gstType = "";
                let cgstAmount = 0;
                let sgstAmount = 0;
                let igstAmount = 0;

                if (isGstPayment) {
                    cgstAmount = Number(form.cgstPaid || 0);
                    sgstAmount = Number(form.sgstPaid || 0);
                    igstAmount = Number(form.igstPaid || 0);
                } else if (hasGst) {
                    gstType = form.gstType || "cgst_sgst";
                    cgstAmount = gstType === "cgst_sgst" ? Math.round(gstAmtV / 2 * 100) / 100 : 0;
                    sgstAmount = gstType === "cgst_sgst" ? Math.round(gstAmtV / 2 * 100) / 100 : 0;
                    igstAmount = gstType === "igst" ? gstAmtV : 0;
                }

                const isDup = (state.cashEntries || []).some(e => !e.isPending && e.date === form.date && e.amount === baseAmt && e.linkedId === (form.linkedId || null) && e.payType === form.payType);
                if (isDup && !window.confirm("Possible duplicate entry detected (same amount and party on this date). Save anyway?")) return;

                const id = gid();
                const noAggTypes = ["Creditor Payment", "Debtor Payment", "Loan Repayment", "Interest on Loan Repayment", "Sales Return Refund", "Purchase Return Receipt", "GST Tax Payment", "Asset Down Payment", "Expense Payment", "Other Payment", "Other Income Receipt", "Stock Purchase Payment", "Sales Receipt"];
                upd(p => {
                    const descLower = form.description.toLowerCase().trim();
                    const canAgg = !noAggTypes.includes(form.payType);
                    const existing = canAgg ? p.cashEntries.find(e => !e.isPending && e.description.toLowerCase().trim() === descLower && e.payType === form.payType && e.dir === form.dir) : null;
                    let np = { ...p };

                    // ── P&L / Trading mirror logic ────────────────────────────────────────
                    // For Expense/Income/Stock/Sales cash entries, maintain a corresponding
                    // P&L or Trading entry so the accounting books stay complete.
                    // We aggregate into an EXISTING P&L/Trading entry with the same description
                    // to avoid creating duplicate line items on repeat payments.
                    let relId = null;
                    const isExpPmt = form.payType === "Expense Payment" || form.payType === "Other Payment";
                    const isIncPmt = form.payType === "Other Income Receipt";
                    const isStockPmt = form.payType === "Stock Purchase Payment";
                    const isSaleRct = form.payType === "Sales Receipt";

                    if (!existing) {
                        if (isExpPmt) {
                            const plSide = "expense";
                            const plCat = form.payType === "Expense Payment" ? "Other Expenses" : "Admin Expenses";
                            const existPL = (np.plEntries || []).find(e =>
                                e.side === plSide && e.description.toLowerCase().trim() === descLower && e.sourceId
                            );
                            if (existPL) {
                                // Aggregate into existing P&L entry
                                relId = existPL.id;
                                np.plEntries = np.plEntries.map(e => e.id === existPL.id
                                    ? { ...e, amount: e.amount + baseAmt, gstAmount: (e.gstAmount || 0) + gstAmtV, totalAmount: (e.totalAmount || e.amount) + totalAmtV, cgstAmount: (e.cgstAmount || 0) + cgstAmount, sgstAmount: (e.sgstAmount || 0) + sgstAmount, igstAmount: (e.igstAmount || 0) + igstAmount }
                                    : e);
                            } else {
                                relId = gid();
                                np.plEntries = [...(np.plEntries || []), {
                                    id: relId, date: form.date, side: plSide, category: plCat,
                                    description: form.description, amount: baseAmt,
                                    gstRate: gstRateV, gstAmount: gstAmtV, totalAmount: totalAmtV,
                                    settleMode: "cash", linkedPartyId: null, linkedPartyName: "Cash", sourceId: id,
                                    gstType, cgstAmount, sgstAmount, igstAmount
                                }];
                            }
                        } else if (isIncPmt) {
                            const existPL = (np.plEntries || []).find(e =>
                                e.side === "income" && e.description.toLowerCase().trim() === descLower && e.sourceId
                            );
                            if (existPL) {
                                relId = existPL.id;
                                np.plEntries = np.plEntries.map(e => e.id === existPL.id
                                    ? { ...e, amount: e.amount + baseAmt, gstAmount: (e.gstAmount || 0) + gstAmtV, totalAmount: (e.totalAmount || e.amount) + totalAmtV, cgstAmount: (e.cgstAmount || 0) + cgstAmount, sgstAmount: (e.sgstAmount || 0) + sgstAmount, igstAmount: (e.igstAmount || 0) + igstAmount }
                                    : e);
                            } else {
                                relId = gid();
                                np.plEntries = [...(np.plEntries || []), {
                                    id: relId, date: form.date, side: "income", category: "Other Income",
                                    description: form.description, amount: baseAmt,
                                    gstRate: gstRateV, gstAmount: gstAmtV, totalAmount: totalAmtV,
                                    settleMode: "cash", linkedPartyId: null, linkedPartyName: "Cash", sourceId: id,
                                    gstType, cgstAmount, sgstAmount, igstAmount
                                }];
                            }
                        } else if (isStockPmt) {
                            const existTE = (np.tradingEntries || []).find(e =>
                                e.side === "dr" && e.description.toLowerCase().trim() === descLower && e.sourceId
                            );
                            if (existTE) {
                                relId = existTE.id;
                                np.tradingEntries = np.tradingEntries.map(e => e.id === existTE.id
                                    ? { ...e, amount: e.amount + baseAmt, gstAmount: (e.gstAmount || 0) + gstAmtV, totalAmount: (e.totalAmount || e.amount) + totalAmtV, cgstAmount: (e.cgstAmount || 0) + cgstAmount, sgstAmount: (e.sgstAmount || 0) + sgstAmount, igstAmount: (e.igstAmount || 0) + igstAmount }
                                    : e);
                            } else {
                                relId = gid();
                                np.tradingEntries = [...(np.tradingEntries || []), {
                                    id: relId, date: form.date, side: "dr",
                                    description: form.description, amount: baseAmt,
                                    gstRate: gstRateV, gstAmount: gstAmtV, totalAmount: totalAmtV,
                                    settleMode: "cash", linkedPartyId: null, linkedPartyName: "Cash", sourceId: id,
                                    gstType, cgstAmount, sgstAmount, igstAmount
                                }];
                            }
                        } else if (isSaleRct) {
                            const existTE = (np.tradingEntries || []).find(e =>
                                e.side === "cr" && e.description.toLowerCase().trim() === descLower && e.sourceId
                            );
                            if (existTE) {
                                relId = existTE.id;
                                np.tradingEntries = np.tradingEntries.map(e => e.id === existTE.id
                                    ? { ...e, amount: e.amount + baseAmt, gstAmount: (e.gstAmount || 0) + gstAmtV, totalAmount: (e.totalAmount || e.amount) + totalAmtV, cgstAmount: (e.cgstAmount || 0) + cgstAmount, sgstAmount: (e.sgstAmount || 0) + sgstAmount, igstAmount: (e.igstAmount || 0) + igstAmount }
                                    : e);
                            } else {
                                relId = gid();
                                np.tradingEntries = [...(np.tradingEntries || []), {
                                    id: relId, date: form.date, side: "cr",
                                    description: form.description, amount: baseAmt,
                                    gstRate: gstRateV, gstAmount: gstAmtV, totalAmount: totalAmtV,
                                    settleMode: "cash", linkedPartyId: null, linkedPartyName: "Cash", sourceId: id,
                                    gstType, cgstAmount, sgstAmount, igstAmount
                                }];
                            }
                        }
                    }

                    if (existing) {
                        np.cashEntries = np.cashEntries.map(e => e.id === existing.id ? { ...e, amount: e.amount + baseAmt } : e);
                    } else {
                        np.cashEntries = [...np.cashEntries, { id, date: form.date, dir: form.dir, payType: form.payType, description: form.description, amount: baseAmt, gstRate: gstRateV, gstAmount: isGstPayment ? (cgstAmount + sgstAmount + igstAmount) : gstAmtV, linkedId: form.linkedId || null, sourceId: relId, billNo: form.billNo, gstType, cgstAmount, sgstAmount, igstAmount }];
                    }
                    // Remove pending entries when actual payment clears creditor/debtor
                    if (form.dir === "out" && form.payType === "Creditor Payment" && form.linkedId) {
                        np.cashEntries = np.cashEntries.filter(e => !(e.isPending && e.dir === "out" && e.linkedId === form.linkedId));
                    }
                    if (form.dir === "in" && form.payType === "Debtor Payment" && form.linkedId) {
                        np.cashEntries = np.cashEntries.filter(e => !(e.isPending && e.dir === "in" && e.linkedId === form.linkedId));
                    }
                    return withLog(np, existing ? "UPDATE" : "CREATE", "cashEntries", existing ? existing.id : id, `${existing ? "Aggregated" : "Added"} Cash ${form.dir === "in" ? "In" : "Out"}: ${form.payType}`);
                }); closeM();
            };
            const applyDepr = () => {
                if (!form.bsAssetId || !form.depRate || !form.method || !form.period) { alert("Select a Balance Sheet asset and fill all fields"); return; }
                if (Number(form.depRate) <= 0 || Number(form.depRate) > 100) { alert("Depreciation Rate must be between 0 and 100"); return; }
                const bsAsset = Object.values(state.balanceSheet?.assets || {}).find(a => a.id === form.bsAssetId);
                if (!bsAsset) { alert("Asset not found"); return; }
                const id = gid();
                upd(p => {
                    let np = { ...p, depreciationAssets: [...p.depreciationAssets, { id, bsAssetId: form.bsAssetId, name: bsAsset.description, cost: Number(bsAsset.amount), startDate: bsAsset.date, method: form.method, period: form.period, depRate: Number(form.depRate) }], balanceSheet: { ...p.balanceSheet, assets: { ...p.balanceSheet.assets, [bsAsset.id]: { ...bsAsset, linkedDeprId: id, autoFromDepr: true } } } };
                    return withLog(np, "CREATE", "depreciationAssets", id, `Added Depreciation for ${bsAsset.description}`);
                }); closeM();
            };
            const applyOpeningStock = () => {
                upd(p => {
                    let np = { ...p, openingStock: { amount: Number(form.amount || 0), date: form.date || today() } };
                    return withLog(np, "UPDATE", "openingStock", null, `Set Opening Stock to ${form.amount}`);
                }); closeM();
            };
            const deleteOpeningStock = () => {
                if (!isAdmin) { alert("Locked 🔒: Switch to Admin Mode to delete entries."); return; }
                if (!window.confirm("Delete Opening Stock entry? This will reset it to ₹0.")) return;
                upd(p => {
                    let np = { ...p, openingStock: { amount: 0, date: "" } };
                    return withLog(np, "DELETE", "openingStock", null, "Deleted Opening Stock");
                });
            };

            const sp = { form, setForm, creds, debs, rawMats: state.rawMaterialPayments || [] };

            if (loading) return <div style={{ minHeight: "100vh", background: "#0f172a", display: "flex", alignItems: "center", justifyContent: "center", color: "#a855f7", fontSize: 16, fontWeight: 700 }}>💧 Loading your data…</div>;

            return (<div id="app-root" style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0f172a 60%,#1e1b4b)", color: C.text }}>
                {/* Header */}
                <div id="app-header" style={{ background: "linear-gradient(90deg,#4f46e5,#7c3aed,#9333ea)", position: "sticky", top: 0, zIndex: 50 }}>
                    <div style={{ maxWidth: 1400, margin: "0 auto", padding: "10px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div><div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>💧 YORS WATER</div><div style={{ fontSize: 10, color: "#c4b5fd" }}>Accounting Suite</div></div>
                        <div style={{ textAlign: "right", fontSize: 11 }}>
                            <div style={{ color: "#c4b5fd" }}>{user.email} {saving ? "⟳" : "✓"}</div>
                            <div style={{ color: netPL >= 0 ? "#86efac" : "#fca5a5", fontWeight: 800 }}>Net P&L: {fabs(netPL)} {netPL >= 0 ? "▲" : "▼"}</div>
                            <div style={{ display: "flex", gap: 6, justifyContent: "flex-end", marginTop: 4 }}>
                                <button onClick={toggleAdmin} style={{ background: isAdmin ? "#16a34a" : "transparent", border: "1px solid " + (isAdmin ? "#16a34a" : "#7c3aed"), color: isAdmin ? "#fff" : "#c4b5fd", borderRadius: 5, padding: "2px 8px", cursor: "pointer", fontSize: 10 }}>{isAdmin ? "🔓 Admin" : "🔒 View Only"}</button>
                                {isAdmin && <button onClick={() => openM("settings", {
                                    adminPin: state.settings?.adminPin || "",
                                    compName: state.settings?.companyProfile?.name || "",
                                    compGstin: state.settings?.companyProfile?.gstin || "",
                                    compStateCode: state.settings?.companyProfile?.stateCode || "",
                                    compAddress: state.settings?.companyProfile?.address || "",
                                    compPhone: state.settings?.companyProfile?.phone || ""
                                })} style={{ background: "transparent", border: "1px solid #7c3aed", color: "#c4b5fd", borderRadius: 5, padding: "2px 8px", cursor: "pointer", fontSize: 10 }}>⚙️</button>}
                                <button onClick={() => auth.signOut()} style={{ background: "transparent", border: "1px solid #7c3aed", color: "#c4b5fd", borderRadius: 5, padding: "2px 8px", cursor: "pointer", fontSize: 10 }}>Sign Out</button>
                            </div>
                        </div>
                    </div>
                    <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", padding: "0 20px", overflowX: "auto", gap: 2 }}>
                        {TABS.map(t => <button key={t} onClick={() => setTab(t)} style={{ padding: "8px 11px", border: "none", cursor: "pointer", fontWeight: 600, fontSize: 11, borderRadius: "6px 6px 0 0", background: tab === t ? C.dark : "transparent", color: tab === t ? C.purple : "#e2e8f0", borderBottom: tab === t ? "3px solid #a855f7" : "3px solid transparent", whiteSpace: "nowrap" }}>{t}</button>)}
                    </div>
                </div>

                <div id="app-body" style={{ maxWidth: 1400, margin: "0 auto", padding: "20px" }}>

                    {/* View-Only Mode Banner */}
                    {!isAdmin && (
                        <div style={{ background: "#1e293b", border: "1.5px solid #334155", borderRadius: 12, padding: "12px 18px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                                <span style={{ fontSize: 18 }}>🔒</span>
                                <div>
                                    <div style={{ fontWeight: 800, color: "#94a3b8", fontSize: 12 }}>View-Only Mode</div>
                                    <div style={{ fontSize: 10, color: C.muted }}>You are viewing the dashboard. To make additions or changes, switch to Admin Mode using the lock icon in the header.</div>
                                </div>
                            </div>
                            <button onClick={toggleAdmin} style={{ ...BTNP("linear-gradient(90deg,#6366f1,#8b5cf6)"), padding: "6px 14px" }}>🔓 Enter Admin PIN</button>
                        </div>
                    )}

                    {tab === "Dashboard" && <div>
                        <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.purple }}>📊 Dashboard</div>

                        {/* Company / GSTIN Info Banner */}
                        {(() => {
                            const cp = state.settings?.companyProfile;
                            if (!cp?.gstin) return (
                                <div style={{ background: "linear-gradient(90deg,#1e293b,#0f172a)", border: "1.5px dashed #7c3aed", borderRadius: 12, padding: "12px 18px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                                        <span style={{ fontSize: 22 }}>🏛️</span>
                                        <div>
                                            <div style={{ fontWeight: 800, color: C.amber, fontSize: 12 }}>Company GSTIN Not Set</div>
                                            <div style={{ fontSize: 10, color: C.muted }}>Your GSTIN will appear on all GST Tax Invoices. Set it via Admin Settings (⚙️ icon in the header).</div>
                                        </div>
                                    </div>
                                    {isAdmin && <button onClick={() => openM("settings", { adminPin: state.settings?.adminPin || "", compName: state.settings?.companyProfile?.name || "", compGstin: "", compStateCode: state.settings?.companyProfile?.stateCode || "19", compAddress: state.settings?.companyProfile?.address || "", compPhone: state.settings?.companyProfile?.phone || "" })} style={{ ...BTNP("linear-gradient(90deg,#7c3aed,#6366f1)"), padding: "6px 14px", whiteSpace: "nowrap" }}>⚙️ Set GSTIN</button>}
                                </div>
                            );
                            return (
                                <div style={{ background: "linear-gradient(90deg,#042f2e,#0f172a)", border: "1.5px solid #0d9488", borderRadius: 12, padding: "12px 18px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                                        <span style={{ fontSize: 22 }}>🏛️</span>
                                        <div>
                                            <div style={{ fontWeight: 900, color: C.teal, fontSize: 13, letterSpacing: 0.5 }}>{cp.name || "Company"}</div>
                                            <div style={{ display: "flex", gap: 14, flexWrap: "wrap", marginTop: 4 }}>
                                                <span style={{ fontSize: 11, color: "#94a3b8" }}>GSTIN: <strong style={{ color: C.text, fontFamily: "monospace", letterSpacing: 1 }}>{cp.gstin}</strong></span>
                                                <span style={{ fontSize: 11, color: "#94a3b8" }}>State Code: <strong style={{ color: C.text }}>{cp.stateCode}</strong></span>
                                                {cp.phone && <span style={{ fontSize: 11, color: "#94a3b8" }}>📞 {cp.phone}</span>}
                                                {cp.address && <span style={{ fontSize: 11, color: "#94a3b8" }}>📍 {cp.address}</span>}
                                            </div>
                                        </div>
                                    </div>
                                    {isAdmin && <button onClick={() => openM("settings", { adminPin: state.settings?.adminPin || "", compName: cp.name || "", compGstin: cp.gstin || "", compStateCode: cp.stateCode || "", compAddress: cp.address || "", compPhone: cp.phone || "" })} style={{ background: "transparent", border: "1px solid #0d9488", color: "#0d9488", borderRadius: 7, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontWeight: 700 }}>✏️ Edit</button>}
                                </div>
                            );
                        })()}
                        <div style={{ display: "flex", gap: 9, flexWrap: "wrap", marginBottom: 18 }}>
                            {[["Purchases (Net)", fc(totalPurchases), "#6366f1,#8b5cf6"], ["Purch. Returns", fc(purchaseReturnsAmt), "#f59e0b,#b45309"], ["Sales (Net)", fc(totalSales), "#0ea5e9,#0284c7"], ["Sales Returns", fc(salesReturnsAmt), "#ef4444,#b91c1c"], ["Gross P&L", fabs(grossProfit) + (grossProfit >= 0 ? "▲" : "▼"), grossProfit >= 0 ? "#22c55e,#16a34a" : "#ef4444,#dc2626"], ["COGS", fc(fifoCOGS), "#f59e0b,#d97706"], ["Closing Stock", fc(fifoClosing), "#8b5cf6,#7c3aed"], ["Cash", fc(cashBal), cashBal >= 0 ? "#0891b2,#0ea5e9" : "#b45309,#d97706"], ["Creditors", fc(totalCreditors), "#f59e0b,#d97706"], ["Debtors", fc(totalDebtors), "#8b5cf6,#7c3aed"], ["Depreciation", fc(totalDepreciation), "#64748b,#475569"], ["Net P&L", fabs(netPL) + (netPL >= 0 ? "▲" : "▼"), netPL >= 0 ? "#16a34a,#15803d" : "#dc2626,#b91c1c"]].map(([l, v, g]) => (
                                <div key={l} style={CARD(g)}><div style={{ fontSize: 9, opacity: .85 }}>{l}</div><div style={{ fontSize: 13, fontWeight: 900 }}>{v}</div></div>
                            ))}
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>

                    {tab === "Inventory" && (() => {

                        const getFilteredBatches = (batches) => {
                            return batches.filter(b => {
                                if (invFilter.godown !== "All" && b.godown !== invFilter.godown) return false;
                                if (invFilter.dateFrom && b.date < invFilter.dateFrom) return false;
                                if (invFilter.dateTo && b.date > invFilter.dateTo) return false;
                                if (invFilter.search && !(b.batchNo || "").toLowerCase().includes(invFilter.search.toLowerCase())) return false;

                                    const st = b.remQty === 0 ? "Exhausted" : b.remQty === b.origQty ? "Untouched" : "Partial";
                                    if (invFilter.status !== st) return false;
                                }
                                return true;
                            });
                        };

                        /* ── Compute filtered totals across all FIFO groups ── */
                        const filteredGroups = Object.keys(fifo).filter(k => {
                            const [bt, cat] = k.split("_");
                            if (!fifo[k].inQty) return false;
                            if (invFilter.bt !== "All" && bt !== invFilter.bt) return false;
                            if (invFilter.cat !== "All" && cat !== invFilter.cat) return false;
                            return true;

                            const [bt, cat] = k.split("_"), f = fifo[k];
                            const fb = getFilteredBatches(f.batches);
                            const filteredInQty = fb.reduce((a, b) => a + b.origQty, 0);
                            const filteredOutQty = fb.reduce((a, b) => a + (b.origQty - b.remQty), 0);
                            const filteredClosing = fb.reduce((a, b) => a + b.remQty * b.rate, 0);
                            const filteredCogs = fb.reduce((a, b) => a + (b.origQty - b.remQty) * b.rate, 0);
                            const filteredPurchased = fb.reduce((a, b) => a + b.origQty * b.rate, 0);
                            return { key: k, bt, cat, f, fb, filteredInQty, filteredOutQty, filteredClosing, filteredCogs, filteredPurchased };
                        });

                        const fTotalSold = filteredGroups.reduce((a, g) => a + g.filteredCogs, 0);

                        const fTotalClosing = filteredGroups.reduce((a, g) => a + g.filteredClosing, 0);

                        const hasActiveFilter = invFilter.bt !== "All" || invFilter.cat !== "All" || invFilter.godown !== "All" || invFilter.dateFrom || invFilter.dateTo || invFilter.status !== "All" || invFilter.search;

                                {[["Purchased", fc(fTotalPurchased), "#6366f1,#8b5cf6"], ["COGS", fc(fTotalCOGS), "#f59e0b,#d97706"], ["Closing Value", fc(fTotalClosing), "#8b5cf6,#7c3aed"], ["Balance", fTotalUnits + " units", "#0ea5e9,#0284c7"]].map(([l, v, g]) => (
                                    <div key={l} style={CARD(g)}><div style={{ fontSize: 9 }}>{l}{hasActiveFilter ? " (filtered)" : ""}</div><div style={{ fontSize: 13, fontWeight: 900 }}>{v}</div></div>

                            </div>

                            <div style={{ background: C.mid, borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid " + C.border }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                                    <div style={{ fontSize: 11, fontWeight: 700, color: C.muted }}>🔍 FILTERS</div>
                                    {hasActiveFilter && <button onClick={() => setInvFilter({ bt: "All", cat: "All", godown: "All", dateFrom: "", dateTo: "", status: "All", search: "" })} style={{ ...BTNP("#ef4444"), padding: "4px 12px", fontSize: 10 }}>✕ Clear All</button>}

                                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                                    {/* Dropdowns */}
                                    {[["bt", "Bottle Type", ["All", ...BOTTLE_TYPES]], ["cat", "Category", ["All", "normal", "customized"]], ["godown", "Godown", ["All", ...GODOWNS]], ["status", "Status", ["All", "Untouched", "Partial", "Exhausted"]]].map(([k, label, opts]) => (

                                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>

                                        <input type="date" style={{ ...INP, width: "auto", marginBottom: 0, minWidth: 120, border: invFilter.dateFrom ? "1.5px solid #818cf8" : "1.5px solid " + C.border }} value={invFilter.dateFrom} max="2099-12-31" onChange={e => setInvFilter(f => ({ ...f, dateFrom: e.target.value }))} />

                                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>

                                        <div style={{ display: "flex", gap: 8 }}>
                                            {[["Bal", (filteredInQty - filteredOutQty) + " units", C.text], ["Value", fc(filteredClosing), C.violet], ["COGS", fc(filteredCogs), C.amber]].map(([l, v, c]) => (

                                    </div>
                                    <table style={TBL}><thead><tr>{["Batch", "Date", "Godown", "Orig", "Rate", "Issued", "Rem", "Rem Val", "Status"].map(h => <th key={h} style={THS}>{h}</th>)}</tr></thead>

                                        </select>
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                                        <label style={{ fontSize: 9, color: C.muted, fontWeight: 600, textTransform: "uppercase" }}>Sort By</label>
                                        <select style={{ ...INP, width: "auto", marginBottom: 0, minWidth: 130 }} value={clSort} onChange={e => { setClSort(e.target.value); setClSortDir(1); }}>
                                            {[["name", "Name"], ["tAmt", "Revenue"], ["tQty", "Total Qty"], ["avgO", "Avg Order"], ["lastDate", "Last Order"]].map(([v, l]) => <option key={v} value={v}>{l}</option>)}

                    {tab === "Balance Sheet" && <div>

                        </div>
                        <div style={{ background: "#0a1628", borderRadius: 10, padding: "10px 14px", marginBottom: 12, border: "1px solid #334155", fontSize: 10, color: "#64748b" }}>
                            <strong style={{ color: "#94a3b8" }}>ℹ️ Auto-populated items (read-only):</strong> Cash Balance, Closing Stock (FIFO), Trade Debtors, Accum. Depreciation, Trade Creditors, Net Profit/Loss — these are derived from other modules and <em>cannot be entered here</em>. Use <strong style={{ color: "#94a3b8" }}>+ Manual Entry</strong> for items like Fixed Assets, Share Capital, Long-term Loans, etc. Balance Sheet entries do <em>not</em> affect P&amp;L.
                        </div>
                        {(() => {
                            // Detect creditors with non-zero opening balance (creates liability without matching asset)
                            const credsWithOpening = creds.filter(c => Number(c.amount || 0) > 0);
                            // Detect dangling cash entries — linkedId points to a party that no longer exists
                            const allPartyIds = new Set([...creds.map(c => c.id), ...debs.map(d => d.id)]);
                            const danglingCash = cash.filter(e => e.linkedId && !allPartyIds.has(e.linkedId));
                            return (<>
                                {Math.abs(bsDiff) > 0.01
                                    ? <div style={{ background: "#450a0a", borderRadius: 10, padding: 12, marginBottom: 12, border: "1.5px solid #ef4444" }}>
                                        <div style={{ fontWeight: 800, color: C.red, fontSize: 12 }}>⚠️ Balance Sheet Mismatch — Difference: {fabs(bsDiff)}</div>
