        * {

            filter: invert(1);

        /* ─── PRINT: Show only the invoice, hide the entire app shell ─── */
        @media print {
            body {
                background: white !important;
                color: black !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            /* Hide everything on the page */
            body > * {
                display: none !important;
            }
            /* Then un-hide only the root where React renders */
            body > #root {
                display: block !important;
            }
            /* Inside root, hide everything */
            #root > * {
                display: none !important;
            }
            /* Show the print wrapper that contains #print-area */
            #root > div {
                display: block !important;
                background: white !important;
            }
            /* Hide app header, tabs, sidebar, modal overlay, banners */
            #app-header,
            #app-tabs,
            #no-print-header,
            #no-print-banner,
            #no-print-actions,
            [id^="no-print"] {
                display: none !important;
            }
            /* Hide everything inside the app except the print area wrapper */
            #app-body > *:not(#print-area-wrapper) {
                display: none !important;
            }
            /* Make the print area fill the whole page */
            #print-area-wrapper {
                display: block !important;
                position: static !important;
                margin: 0 !important;
                padding: 0 !important;
                background: white !important;
            }
            #print-area {
                display: block !important;
                position: static !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 20px 30px !important;
                box-shadow: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                border-radius: 0 !important;
            }
            #print-area * {
                color: black !important;
                border-color: #000 !important;
                background: white !important;
                box-shadow: none !important;
            }
            #print-area table th {
                background-color: #f1f5f9 !important;
                color: black !important;
                border: 1px solid #000 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            #print-area table td {
                border: 1px solid #000 !important;
                color: black !important;
            }
        }
    </style>
</head>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        // ─── Constants ────────────────────────────────────────
        const BOTTLE_TYPES = ["200ml", "500ml", "1L"];
        const GODOWNS = ["Hazra", "Dunlop", "Bhawanipur", "Alipore", "Gariahat"];
        const TABS = ["Dashboard", "Inventory", "Stock In", "Stock Out", "GST Invoice", "Debtors", "Creditors", "Clients", "Cash Book", "Trading A/C", "P&L Account", "Balance Sheet", "Trial Balance", "Cash Flow", "Journal", "Audit Trail", "Depreciation", "Charts"];
        const CLIENT_TYPES = ["Retailer", "Distributor"];
        const CASH_IN_TYPES = ["Sales Receipt", "Debtor Payment", "Capital Introduced", "Loan Received", "Purchase Return Receipt", "Other Income Receipt"];
        const CASH_OUT_TYPES = ["Expense Payment", "Creditor Payment", "Stock Purchase Payment", "Loan Repayment", "Interest on Loan Repayment", "Sales Return Refund", "GST Tax Payment", "Other Payment"];
        const PL_CATS = { income: ["Other Income", "Finance Income"], expenses: ["Employee Benefit Expense", "Finance Costs", "Other Expenses", "Admin Expenses", "Bad Debts"] };
        const SCHEDULE3 = {
            assets: { "Non-Current Assets": ["Fixed Assets", "Capital Work in Progress", "Long Term Investments", "Deferred Tax Assets"], "Current Assets": ["Inventories", "Trade Receivables", "Cash and Cash Equivalents", "Short Term Loans", "Other Current Assets"] },
            liabilities: { "Equity and Reserves": ["Share Capital", "Retained Earnings / Net Profit", "Other Reserves"], "Non-Current Liabilities": ["Long Term Borrowings", "Deferred Tax Liabilities", "Other Long Term Liabilities"], "Current Liabilities": ["Trade Payables", "Short Term Borrowings", "Other Current Liabilities", "Provisions"] }
        };
        const DEPR_METHODS = ["Straight Line (SLM)", "Written Down Value (WDV)"];
        const DEPR_PERIODS = ["Monthly", "Half-Yearly", "Yearly"];
        const C = { dark: "#0f172a", mid: "#1e293b", border: "#334155", text: "#e2e8f0", muted: "#64748b", purple: "#a855f7", green: "#22c55e", red: "#ef4444", blue: "#38bdf8", amber: "#f59e0b", violet: "#8b5cf6", teal: "#14b8a6" };
        const INIT = { stockIn: [], stockOut: [], gstInvoices: [], creditors: [], debtors: [], clients: [], plEntries: [], balanceSheet: { assets: {}, liabilities: {} }, cashEntries: [], tradingEntries: [], depreciationAssets: [], openingStock: {}, auditLog: [], settings: { adminPin: "0000", companyProfile: { name: "YORS WATER", gstin: "19AAACY1234A1Z1", stateCode: "19", address: "12, Water Supply Rd, Kolkata, West Bengal", phone: "9876543210" } } };
        const INP = { width: "100%", padding: "8px 11px", borderRadius: 7, border: "1.5px solid #334155", background: "#1e293b", color: "#e2e8f0", fontSize: 13, marginBottom: 9, boxSizing: "border-box" };
        const BTNP = (bg) => ({ background: bg || "linear-gradient(90deg,#6366f1,#8b5cf6)", color: "#fff", border: "none", borderRadius: 7, padding: "8px 18px", cursor: "pointer", fontWeight: 700, fontSize: 12 });
        const BTND = { background: "#ef4444", color: "#fff", border: "none", borderRadius: 5, padding: "3px 9px", cursor: "pointer", fontWeight: 600, fontSize: 11 };
        const TBL = { width: "100%", borderCollapse: "collapse", fontSize: 12 };
        const THS = { background: "#1e293b", color: "#94a3b8", padding: "8px 9px", textAlign: "left", borderBottom: "1px solid #334155", whiteSpace: "nowrap", fontSize: 11 };
        const TDS = { padding: "7px 9px", borderBottom: "1px solid #1e293b", color: "#e2e8f0", verticalAlign: "middle" };
        const CARD = (c) => ({ background: "linear-gradient(135deg," + c + ")", borderRadius: 12, padding: "13px 15px", color: "#fff", flex: 1, minWidth: 115, boxShadow: "0 4px 18px rgba(0,0,0,0.18)" });

        // ─── Helpers ──────────────────────────────────────────
        const gid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
        const fc = n => "₹" + Number(n || 0).toLocaleString("en-IN", { minimumFractionDigits: 2 });
        const fabs = n => fc(Math.abs(n));
        const today = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); };

        function computeFIFO(stockIn, stockOut) {
            const results = {};
            BOTTLE_TYPES.forEach(bt => {
                ["normal", "customized"].forEach(cat => {
                    const key = bt + "_" + cat;
                    const batches = stockIn.filter(x => x.bottleType === bt && x.category === cat && !x.isReturn).sort((a, b) => new Date(a.date) - new Date(b.date)).map(x => ({ ...x, origQty: Number(x.qty), remQty: Number(x.qty), rate: Number(x.ratePerUnit), batchNo: x.batchNo, godown: x.godown }));
                    const returns = stockIn.filter(x => x.bottleType === bt && x.category === cat && x.isReturn);
                    returns.forEach(r => {
                        let b = batches.find(x => x.batchNo === r.batchNo && x.godown === r.godown);
                        if (!b) {
                            b = batches.find(x => x.godown === r.godown && x.remQty >= Number(r.qty));
                            if (!b) {
                                b = batches.find(x => x.godown === r.godown && x.remQty > 0);
                                if (!b) {
                                    b = batches.find(x => x.godown === r.godown);
                                }
                            }
                        }
                        if (b) {
                            b.origQty -= Number(r.qty);
                            b.remQty -= Number(r.qty);
                        }
                    });
                    const outs = stockOut.filter(x => x.bottleType === bt && x.category === cat && !x.isReturn).sort((a, b) => new Date(a.date) - new Date(b.date));
                    const salesReturns = stockOut.filter(x => x.bottleType === bt && x.category === cat && x.isReturn);
                    let cogs = 0;
                    outs.forEach(out => { let needed = Number(out.qty); for (let i = 0; i < batches.length && needed > 0; i++) { if (batches[i].godown !== out.godown) continue; const take = Math.min(batches[i].remQty, needed); if (take > 0) { cogs += take * batches[i].rate; batches[i].remQty -= take; needed -= take; } } });
                    salesReturns.forEach(sr => { batches.push({ origQty: Number(sr.qty), remQty: Number(sr.qty), rate: Number(sr.ratePerUnit), godown: sr.godown, batchNo: "SR" }); });
                    const inQty = batches.reduce((a, b) => a + b.origQty, 0), outQty = outs.reduce((a, b) => a + Number(b.qty), 0);
                    let closingValue = 0; batches.forEach(b => { closingValue += b.remQty * b.rate; });
                    results[key] = { batches, cogs, closingValue, inQty, outQty, balQty: inQty - outQty };
                });
            });
            return results;
        }

        function calcDepreciation(asset) {
            const cost = Number(asset.cost || 0), rate = Number(asset.depRate || 0) / 100;
            const startDate = new Date(asset.startDate || today()), now = new Date();
            let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
            if (mo < 0) mo = 0;
            let totalDepr = 0;
            if (asset.method === "Straight Line (SLM)") { const annual = cost * rate, md = annual / 12; if (asset.period === "Monthly") totalDepr = md * Math.max(1, Math.min(mo, 1)); else if (asset.period === "Half-Yearly") totalDepr = md * Math.max(1, Math.min(mo, 6)); else totalDepr = md * Math.max(1, Math.min(mo, 12)); }
            else { totalDepr = cost - cost * Math.pow(1 - rate, Math.max(mo / 12, 0)); }
            return { totalDepr: Math.min(Math.max(totalDepr, 0), cost), wdv: Math.max(0, cost - Math.min(Math.max(totalDepr, 0), cost)) };
        }

        // ─── Components ───────────────────────────────────────
        function Badge({ label, color }) { return <span style={{ background: color + "25", color, borderRadius: 5, padding: "2px 7px", fontSize: 10, fontWeight: 700, whiteSpace: "nowrap" }}>{label}</span>; }
        function DateInput({ value, onChange }) { return <input type="date" style={INP} value={value || ""} max="2099-12-31" onChange={e => onChange(e.target.value)} />; }

        function MiniChart({ data, color, height = 60 }) {
            if (!data || data.length < 2) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 10 }}>Not enough data</div>;
            const vals = data.map(d => d.v), max = Math.max(...vals, 0.01), min = Math.min(...vals), range = max - min || 1, w = 280, pad = 4;
            const pts = data.map((d, i) => `${pad + (i / (data.length - 1)) * (w - pad * 2)},${height - pad - ((d.v - min) / range) * (height - pad * 2)}`);
            const gId = "g" + color.replace("#", "");
            return (<div><svg width="100%" viewBox={`0 0 ${w} ${height}`} style={{ display: "block" }}>
                <defs><linearGradient id={gId} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3" /><stop offset="100%" stopColor={color} stopOpacity="0" /></linearGradient></defs>
                <polygon points={`${pad},${height} ${pts.join(" ")} ${w - pad},${height}`} fill={`url(#${gId})`} />
                <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="2" />
                {data.map((d, i) => { const x = pad + (i / (data.length - 1)) * (w - pad * 2), y = height - pad - ((d.v - min) / range) * (height - pad * 2); return <circle key={i} cx={x} cy={y} r="3" fill={color} />; })}
            </svg>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#64748b", marginTop: 2 }}><span>{data[0].l}</span><span style={{ color, fontWeight: 700 }}>{fc(data[data.length - 1].v)}</span><span>{data[data.length - 1].l}</span></div></div>);
        }

        function BarChart({ data, color, height = 160 }) {
            if (!data || data.length === 0) return <div style={{ height, display: "flex", alignItems: "center", justifyContent: "center", color: "#64748b", fontSize: 11 }}>No data yet</div>;
            const vals = data.map(d => d.v), max = Math.max(...vals, 1);
            const w = 400, pad = 30, barGap = 4, bw = Math.min(36, (w - pad * 2 - barGap * data.length) / data.length);
            const chartH = height - 30;
            return (<svg width="100%" viewBox={`0 0 ${w} ${height}`} style={{ display: "block" }}>
                {/* Grid lines */}
                {[0, 0.25, 0.5, 0.75, 1].map((f, i) => {
                    const y = pad / 2 + (1 - f) * (chartH - pad); return <g key={i}><line x1={pad} y1={y} x2={w - 10} y2={y} stroke="#1e293b" strokeWidth="1" /><text x={pad - 4} y={y + 3} fill="#64748b" fontSize="8" textAnchor="end">{Math.round(max * f / 1000)}k</text></g>;
                })}
                {/* Bars */}
                {data.map((d, i) => {
                    const x = pad + i * (bw + barGap) + barGap, bh = (d.v / max) * (chartH - pad), y = pad / 2 + (chartH - pad) - bh;
                    return <g key={i}>
                        <defs><linearGradient id={`bar${i}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.95" /><stop offset="100%" stopColor={color} stopOpacity="0.5" /></linearGradient></defs>
                        <rect x={x} y={y} width={bw} height={bh} rx={3} fill={`url(#bar${i})`} />
                        <text x={x + bw / 2} y={y - 4} fill={color} fontSize="7" fontWeight="700" textAnchor="middle">{d.v >= 1000 ? Math.round(d.v / 1000) + "k" : d.v}</text>
                        <text x={x + bw / 2} y={height - 4} fill="#94a3b8" fontSize="7" textAnchor="middle">{d.l}</text>
                    </g>;
                })}
            </svg>);
        }

        function SettlePanel({ form, setForm, creds, debs }) {
            const mode = form._settleContext; if (!mode) return null;
            const isIn = ["sale", "trading_cr", "bs_liability_reduce", "pl_income"].includes(mode);
            const canCreditor = ["purchase", "trading_dr", "bs_asset_increase", "pl_expense", "bs_liability_reduce"].includes(mode);
            const canDebtor = ["sale", "trading_cr", "pl_income", "pl_expense"].includes(mode);
            const canNone = ["bs_asset_increase", "bs_liability_reduce", "trading_dr", "trading_cr", "pl_expense", "pl_income"].includes(mode);
            const options = ["cash", canCreditor && "creditor", canDebtor && "debtor", canNone && "none"].filter(Boolean);
            const mColors = { cash: C.green, creditor: C.amber, debtor: C.violet, none: C.muted };
            const mLabels = { cash: isIn ? "💵 Cash In" : "💵 Cash Out", creditor: "🏦 Creditor", debtor: "📋 Debtor", none: "📝 Journal Only" };
            return (<div style={{ background: "#0a0f1e", borderRadius: 8, padding: 12, marginBottom: 9, border: "1px solid #334155" }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, marginBottom: 7 }}>💳 Settlement Mode</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap" }}>
                    {options.map(opt => <button key={opt} onClick={() => setForm(f => ({ ...f, settleMode: opt, linkedPartyId: "", newPartyName: "", newPartyCredit: "" }))} style={{ flex: 1, minWidth: 70, padding: "7px 4px", border: "2px solid " + (form.settleMode === opt ? mColors[opt] : C.border), borderRadius: 7, background: form.settleMode === opt ? mColors[opt] + "18" : C.mid, color: form.settleMode === opt ? mColors[opt] : C.muted, fontWeight: 700, fontSize: 11, cursor: "pointer" }}>{mLabels[opt]}</button>)}
                </div>
                {(form.settleMode === "creditor" || form.settleMode === "debtor") && (<div>
                    <select style={INP} value={form.linkedPartyId || ""} onChange={e => setForm(f => ({ ...f, linkedPartyId: e.target.value, newPartyName: "", newPartyCredit: "" }))}>
                        <option value="">{form.settleMode === "creditor" ? "Select Creditor" : "Select Debtor"}</option>
                        {(form.settleMode === "creditor" ? creds : debs).map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                        <option value="__new__">+ Create New</option>
                    </select>
                    {form.linkedPartyId === "__new__" && <div>
                        <input style={INP} placeholder="Name *" value={form.newPartyName || ""} onChange={e => setForm(f => ({ ...f, newPartyName: e.target.value }))} />
                        <input type="number" style={INP} placeholder="Credit Period (days) *" value={form.newPartyCredit || ""} onChange={e => setForm(f => ({ ...f, newPartyCredit: e.target.value }))} />
                    </div>}
                </div>)}
            </div>);
        }

        // ─── Auth Screen ──────────────────────────────────────
        function AuthScreen() {
            const [mode, setMode] = useState("login");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [confirm, setConfirm] = useState("");
            const [error, setError] = useState("");
            const [info, setInfo] = useState("");
            const [loading, setLoading] = useState(false);
            const INP2 = { ...INP, marginBottom: 10, background: "#0f172a" };
            const BTN = (bg) => ({ ...BTNP(bg), width: "100%", padding: 12, fontSize: 14, marginBottom: 8 });

            const handle = async () => {
                setError(""); setInfo(""); setLoading(true);
                try {
                    if (mode === "login") { await auth.signInWithEmailAndPassword(email, password); }
                    else if (mode === "register") {
                        if (password !== confirm) { setError("Passwords do not match"); setLoading(false); return; }
                        if (password.length < 6) { setError("Password must be at least 6 characters"); setLoading(false); return; }
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else { await auth.sendPasswordResetEmail(email); setInfo("Reset email sent! Check your inbox."); }
                } catch (e) { setError(e.message.replace("Firebase: ", "").replace(/\(auth\/.*\)/, "").trim()); }
                setLoading(false);
            };

            return (<div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0f172a 60%,#1e1b4b)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <div style={{ background: "#1e293b", borderRadius: 20, padding: 36, width: 360, border: "1.5px solid #334155", boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}>
                    <div style={{ textAlign: "center", marginBottom: 28 }}>
                        <div style={{ fontSize: 40, marginBottom: 6 }}>💧</div>
                        <div style={{ fontSize: 22, fontWeight: 900, color: "#fff" }}>YORS WATER</div>
                        <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>Accounting Suite</div>
                    </div>
                    {error && <div style={{ background: "#450a0a", border: "1px solid #ef4444", borderRadius: 8, padding: "9px 13px", marginBottom: 12, color: "#fca5a5", fontSize: 12 }}>{error}</div>}
                    {info && <div style={{ background: "#052e16", border: "1px solid #22c55e", borderRadius: 8, padding: "9px 13px", marginBottom: 12, color: "#86efac", fontSize: 12 }}>{info}</div>}
                    <input style={INP2} type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />
                    {mode !== "reset" && <input style={INP2} type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />}
                    {mode === "register" && <input style={INP2} type="password" placeholder="Confirm password" value={confirm} onChange={e => setConfirm(e.target.value)} onKeyDown={e => e.key === "Enter" && handle()} />}
                    <button style={BTN()} onClick={handle} disabled={loading}>{loading ? "Please wait…" : mode === "login" ? "Sign In" : mode === "register" ? "Create Account" : "Send Reset Link"}</button>
                    <div style={{ textAlign: "center", fontSize: 12, color: "#64748b", display: "flex", flexDirection: "column", gap: 6, marginTop: 4 }}>
                        {mode === "login" && <><span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("register")}>Don't have an account? Register</span><span style={{ color: "#64748b", cursor: "pointer" }} onClick={() => setMode("reset")}>Forgot password?</span></>}
                        {mode === "register" && <span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("login")}>Already have an account? Sign In</span>}
                        {mode === "reset" && <span style={{ color: "#a855f7", cursor: "pointer" }} onClick={() => setMode("login")}>← Back to Sign In</span>}
                    </div>
                </div>
            </div>);
        }

        // ─── Firestore Hook ───────────────────────────────────
        function useFirestore(uid) {
            const [state, setState] = useState(INIT);
            const [loading, setLoading] = useState(true);
            const [saving, setSaving] = useState(false);
            const timer = useRef(null);

            useEffect(() => {
                if (!uid) return;
                setLoading(true);
                db.collection("companies").doc(uid).get()
                    .then(snap => { if (snap.exists) setState({ ...INIT, ...snap.data() }); else setState(INIT); })
                    .catch(console.error).finally(() => setLoading(false));
            }, [uid]);

            useEffect(() => {
                if (!uid || loading) return;
                setSaving(true);
                clearTimeout(timer.current);
                timer.current = setTimeout(() => {
                    db.collection("companies").doc(uid).set(state, { merge: true })
                        .catch(console.error).finally(() => setSaving(false));
                }, 1000);
                return () => clearTimeout(timer.current);
            }, [state, uid, loading]);

            return { state, setState, loading, saving };
        }

        // ─── Main App ─────────────────────────────────────────
        function App() {

            if (!user) return <AuthScreen />;
            return <AccountingApp user={user} />;
        }

const [filterBottleType, setFilterBottleType] = useState("");
const [filterReturn, setFilterReturn] = useState(null); // true, false, or null for all
const [invFilter, setInvFilter] = useState({ bt: "All", cat: "All", godown: "All", dateFrom: "", dateTo: "", status: "All", search: "" });

            const sortArrow = (col) => clSort === col ? (clSortDir === 1 ? " ▲" : " ▼") : "";

            const si = state.stockIn || [], so = state.stockOut || [], creds = state.creditors || [], debs = state.debtors || [];
            const cash = state.cashEntries || [], ple = state.plEntries || [], te = state.tradingEntries || [], da = state.depreciationAssets || [];
            const clients = state.clients || [];
            const fifo = useMemo(() => computeFIFO(si, so), [si, so]);

            const totalPurchases = si.reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)) * (b.isReturn ? -1 : 1), 0);
            const totalSales = so.reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)) * (b.isReturn ? -1 : 1), 0);
            const totalGstOutput = so.reduce((a, b) => a + Number(b.gstAmount || 0) * (b.isReturn ? -1 : 1), 0);
            const totalGstInput = si.reduce((a, b) => a + Number(b.gstAmount || 0) * (b.isReturn ? -1 : 1), 0);
            const totalGstPaidToGovt = cash.filter(e => e.payType === "GST Tax Payment").reduce((a, b) => a + Number(b.amount), 0);
            const totalGstPayable = totalGstOutput - totalGstInput - totalGstPaidToGovt;
            const grossPurchases = si.filter(x => !x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const purchaseReturnsAmt = si.filter(x => x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const grossSales = so.filter(x => !x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const salesReturnsAmt = so.filter(x => x.isReturn).reduce((a, b) => a + Number(b.totalAmount - (b.gstAmount || 0)), 0);
            const fifoCOGS = Object.values(fifo).reduce((a, b) => a + b.cogs, 0);
            const fifoClosing = Object.values(fifo).reduce((a, b) => a + b.closingValue, 0);
            const openingStockAmt = Number(state.openingStock?.amount || 0);
            const tradingDr = totalPurchases + openingStockAmt + te.filter(e => e.side === "dr").reduce((a, b) => a + Number(b.amount), 0);
            const tradingCr = totalSales + fifoClosing + te.filter(e => e.side === "cr").reduce((a, b) => a + Number(b.amount), 0);
            const grossProfit = tradingCr - tradingDr;
            const cashIn = cash.filter(e => e.dir === "in").reduce((a, b) => a + Number(b.amount), 0);
            const cashOut = cash.filter(e => e.dir === "out").reduce((a, b) => a + Number(b.amount), 0);
            const cashBal = cashIn - cashOut;
            const manualExpense = ple.filter(e => e.side === "expense").reduce((a, b) => a + Number(b.amount), 0);
            const manualIncome = ple.filter(e => e.side === "income").reduce((a, b) => a + Number(b.amount), 0);
            const totalDepreciation = da.reduce((a, b) => a + calcDepreciation(b).totalDepr, 0);
            const deprWDVTotal = da.reduce((a, b) => a + calcDepreciation(b).wdv, 0);
            const deprCostTotal = da.reduce((a, b) => a + Number(b.cost), 0);
            const calcInterestForEntry = (e) => {
                if (!e.interestRate || !e.amount) return { monthly: 0, total: 0, months: 0 };
                const principal = Number(e.amount);
                const rate = Number(e.interestRate) / 100;
                const startDate = new Date(e.date || today());
                const now = new Date();
                let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
                if (mo < 0) mo = 0;
                const monthly = (principal * rate) / 12;
                const total = monthly * mo;
                return { monthly, total, months: mo };
            };
            const totalLoanInterest = Object.values(state.balanceSheet?.liabilities || {})
                .filter(e => e.subCategory === "Long Term Borrowings" && e.interestRate)
                .reduce((sum, e) => sum + calcInterestForEntry(e).total, 0);
            const loanInterestPaid = (loanId) => {
                return cash.filter(e => e.dir === "out" && e.payType === "Interest on Loan Repayment" && e.linkedId === loanId)
                           .reduce((sum, e) => sum + Number(e.amount || 0), 0);
            };
            const loanInterestOutstanding = (loan) => {
                const accrued = calcInterestForEntry(loan).total;
                const paid = loanInterestPaid(loan.id);
                return Math.max(0, accrued - paid);
            };
            const totalInterestPaid = cash
                .filter(e => e.dir === "out" && e.payType === "Interest on Loan Repayment")
                .reduce((sum, e) => sum + Number(e.amount || 0), 0);
            const outstandingInterestLiab = Math.max(0, totalLoanInterest - totalInterestPaid);
            const loanPrincipalPaid = (loanId) => {
                return cash.filter(e => e.dir === "out" && e.payType === "Loan Repayment" && e.linkedId === loanId)
                           .reduce((sum, e) => sum + Number(e.amount || 0), 0);
            };
            const loanPrincipalOutstanding = (loan) => {
                const original = Number(loan.amount || 0);
                const paid = loanPrincipalPaid(loan.id);
                return Math.max(0, original - paid);
            };
            // P&L is derived ONLY from Trading Account (gross profit) + manual P&L entries + depreciation + loan interest.
            // Cash Book is a receipts/payments register — it does NOT feed P&L to avoid double entry.
            const plIncome = (grossProfit > 0 ? grossProfit : 0) + manualIncome;
            const plExpense = manualExpense + totalDepreciation + totalLoanInterest + (grossProfit < 0 ? Math.abs(grossProfit) : 0);
            const netPL = plIncome - plExpense;

            const creditorFromStock = id => si.filter(x => x.settleMode === "creditor" && x.linkedPartyId === id).reduce((a, b) => a + Number(b.totalAmount) * (b.isReturn ? -1 : 1), 0);
            const creditorFromOther = id => {
                let sum = 0;
                te.forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) {
                        if (x.side === "dr") sum += Number(x.amount || 0);
                        else if (x.side === "cr") sum -= Number(x.amount || 0);
                    }
                });
                ple.forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) {
                        if (x.side === "expense") sum += Number(x.amount || 0);
                        else if (x.side === "income") sum -= Number(x.amount || 0);
                    }
                });
                Object.values(state.balanceSheet?.assets || {}).forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) sum += Number(x.amount || 0);
                });
                Object.values(state.balanceSheet?.liabilities || {}).forEach(x => {
                    if (x.settleMode === "creditor" && x.linkedPartyId === id) sum += Number(x.amount || 0);
                });
                return sum;
            };
            const creditorCashPaid = id => cash.filter(e => e.dir === "out" && e.linkedId === id).reduce((a, b) => a + Number(b.amount), 0);
            const creditorBal = c => Math.max(0, Number(c.amount) + creditorFromStock(c.id) + creditorFromOther(c.id) - creditorCashPaid(c.id));
            const debtorFromStock = id => so.filter(x => x.settleMode === "debtor" && x.linkedPartyId === id).reduce((a, b) => a + Number(b.totalAmount) * (b.isReturn ? -1 : 1), 0);
            const debtorFromOther = id => {
                let sum = 0;
                te.forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) {
                        if (x.side === "cr") sum += Number(x.amount || 0);
                        else if (x.side === "dr") sum -= Number(x.amount || 0);
                    }
                });
                ple.forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) {
                        if (x.side === "income") sum += Number(x.amount || 0);
                        else if (x.side === "expense") sum -= Number(x.amount || 0);
                    }
                });
                Object.values(state.balanceSheet?.assets || {}).forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) sum += Number(x.amount || 0);
                });
                Object.values(state.balanceSheet?.liabilities || {}).forEach(x => {
                    if (x.settleMode === "debtor" && x.linkedPartyId === id) sum -= Number(x.amount || 0);
                });
                return sum;
            };
            const debtorCashRcvd = id => cash.filter(e => e.dir === "in" && e.linkedId === id).reduce((a, b) => a + Number(b.amount), 0);
            const debtorBal = d => Math.max(0, Number(d.amount) + debtorFromStock(d.id) + debtorFromOther(d.id) - debtorCashRcvd(d.id));
            const totalCreditors = creds.reduce((a, b) => a + creditorBal(b), 0);
            const totalDebtors = debs.reduce((a, b) => a + debtorBal(b), 0);
            // Balance Sheet manual entries: exclude Fixed Assets that have depreciation linked
            // (their WDV is shown via the auto depreciation line to avoid double-counting).
            const bsManualAssetsRaw = Object.values(state.balanceSheet?.assets || {});
            const bsManualLiabRaw = Object.values(state.balanceSheet?.liabilities || {}).map(e => {
                if (e.subCategory === "Long Term Borrowings") {
                    return { ...e, amount: loanPrincipalOutstanding(e) };
                }
                return e;
            });
            // IDs of BS entries that sourced cash (to exclude from P&L cash flows)
            const bsEntryIds = new Set([...bsManualAssetsRaw, ...bsManualLiabRaw].map(e => e.id));
            const bsManualAssets = bsManualAssetsRaw.reduce((a, b) => a + Number(b.amount), 0);
            const bsManualLiab = bsManualLiabRaw.reduce((a, b) => a + Number(b.amount), 0);
            // Auto assets: cash balance + closing stock + debtors - accumulated depreciation
            // Cash balance is from cash book (receipts & payments), kept separate from BS manual entries.
            const bsAutoAssets = cashBal + (fifoClosing > 0 ? fifoClosing : 0) + (totalDebtors > 0 ? totalDebtors : 0) - totalDepreciation;
            // Auto liabilities: creditors + net P&L (net profit is carried to retained earnings / equity)
            const bsAutoLiab = (totalCreditors > 0 ? totalCreditors : 0) + netPL;
            const bsTotalAssets = bsManualAssets + bsAutoAssets, bsTotalLiab = bsManualLiab + bsAutoLiab, bsDiff = bsTotalAssets - bsTotalLiab;

            const upd = fn => setState(p => fn(p));
            const toggleChk = (key, id) => upd(p => ({ ...p, [key]: p[key].map(e => e.id === id ? { ...e, checked: !e.checked, manualCheck: true } : e) }));
            const openM = (t, preset) => { setModal(t); setForm({ date: today(), ...(preset || {}) }); };
            const closeM = () => { setModal(null); setForm({}); };

            const [isAdmin, setIsAdmin] = React.useState(false);
            const toggleAdmin = () => {
                if (isAdmin) { setIsAdmin(false); return; }
                const pin = window.prompt("Enter Admin PIN (Default: 0000):");
                if (pin === (state.settings?.adminPin || "0000")) {
                    setIsAdmin(true);
                } else if (pin !== null) {
                    alert("Incorrect PIN");
                }
            };

            const withLog = (p, action, module, entryId, desc) => {
                const log = p.auditLog || [];
                return { ...p, auditLog: [{ id: gid(), ts: new Date().toISOString(), action, module, entryId, desc, user: user.email }, ...log].slice(0, 200) };
            };

            // ── Auto-settle: tick checkbox when balance reaches zero, untick when it rises again ──
            useEffect(() => {
                let changed = false;
                const nextCreds = (state.creditors || []).map(c => {
                    const bal = creditorBal(c);
                    const totalDue = Number(c.amount) + creditorFromStock(c.id) + creditorFromOther(c.id);
                    const shouldSettle = bal === 0 && totalDue > 0;
                    // Only auto-manage if not manually toggled
                    if (!c.manualCheck) {
                        if (shouldSettle !== !!c.checked) { changed = true; return { ...c, checked: shouldSettle, autoSettled: shouldSettle }; }
                    }
                    return { ...c, autoSettled: shouldSettle && !!c.checked };
                });
                const nextDebs = (state.debtors || []).map(d => {
                    const bal = debtorBal(d);
                    const totalDue = Number(d.amount) + debtorFromStock(d.id) + debtorFromOther(d.id);
                    const shouldSettle = bal === 0 && totalDue > 0;
                    if (!d.manualCheck) {
                        if (shouldSettle !== !!d.checked) { changed = true; return { ...d, checked: shouldSettle, autoSettled: shouldSettle }; }
                    }
                    return { ...d, autoSettled: shouldSettle && !!d.checked };
                });
                if (changed) upd(p => ({ ...p, creditors: nextCreds, debtors: nextDebs }));
            }, [cashBal, totalCreditors, totalDebtors, si.length, so.length, cash.length, ple.length, te.length]);
            const buildTSD = (entries, amtField) => { const m = {}; entries.forEach(e => { const d = new Date(e.date), k = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0"); m[k] = (m[k] || 0) + Number(e[amtField] || 0); }); return Object.entries(m).sort((a, b) => a[0].localeCompare(b[0])).map(([l, v]) => ({ l, v })); };

            const resolveSettle = (frm, amount, date, description, entryId, direction) => {
                const { settleMode, linkedPartyId, newPartyName, newPartyCredit } = frm;
                let partyId = null, partyName = "", createdCreditorId = null, createdDebtorId = null;
                const cashEffects = [];
                if (settleMode === "cash") { partyName = "Cash"; cashEffects.push({ id: gid(), dir: direction, payType: direction === "in" ? "Other Income Receipt" : "Expense Payment", description, amount, date, sourceId: entryId, linkedId: null }); }
                else if (settleMode === "creditor") { if (linkedPartyId === "__new__") { createdCreditorId = gid(); partyId = createdCreditorId; partyName = newPartyName || "New Creditor"; } else { partyId = linkedPartyId; partyName = creds.find(c => c.id === linkedPartyId)?.name || ""; } }
                else if (settleMode === "debtor") { if (linkedPartyId === "__new__") { createdDebtorId = gid(); partyId = createdDebtorId; partyName = newPartyName || "New Debtor"; } else { partyId = linkedPartyId; partyName = debs.find(d => d.id === linkedPartyId)?.name || ""; } }
                return { partyId, partyName, createdCreditorId, createdDebtorId, cashEffects };
            };

            const cascadeDelete = (key, id) => {
                if (!isAdmin) { alert("Locked 🔒: Switch to Admin Mode to delete entries."); return; }
                setState(p => {
                    const entry = (p[key] || []).find(e => e.id === id); if (!entry) return p;
                    let np = { ...p, [key]: (p[key] || []).filter(e => e.id !== id) };
                    np.cashEntries = (np.cashEntries || []).filter(e => e.sourceId !== id);
                    if (key === "gstInvoices") {
                        np.stockOut = (np.stockOut || []).filter(x => x.gstInvoiceId !== id);
                    }
                    if (entry.createdCreditorId) np.creditors = (np.creditors || []).filter(c => c.id !== entry.createdCreditorId);
                    if (entry.createdDebtorId) np.debtors = (np.debtors || []).filter(d => d.id !== entry.createdDebtorId);
                    if (key === "creditors") np.cashEntries = (np.cashEntries || []).filter(e => !(e.dir === "out" && e.linkedId === id));
                    if (key === "debtors") np.cashEntries = (np.cashEntries || []).filter(e => !(e.dir === "in" && e.linkedId === id));
                    if (key === "depreciationAssets" && entry.bsAssetId) {
                        const na = { ...np.balanceSheet.assets };
                        if (na[entry.bsAssetId]) {
                            na[entry.bsAssetId] = {
                                ...na[entry.bsAssetId],
                                linkedDeprId: null,
                                autoFromDepr: false
                            };
                        }
                        np.balanceSheet = { ...np.balanceSheet, assets: na };
                    }
                    np = withLog(np, "DELETE", key, id, `Deleted entry from ${key}`);
                    return np;
                });
            };

            const delBS = (side, id) => {
                if (!isAdmin) { alert("Locked 🔒: Switch to Admin Mode to delete entries."); return; }
                setState(p => {
                    const n = { ...p.balanceSheet[side] };
                    const entry = n[id];
                    delete n[id];
                    let np = { ...p, balanceSheet: { ...p.balanceSheet, [side]: n } };
                    if (entry) {
                        np.cashEntries = (np.cashEntries || []).filter(e => e.sourceId !== id);
                        if (entry.createdCreditorId) {
                            np.creditors = (np.creditors || []).filter(c => c.id !== entry.createdCreditorId);
                            np.cashEntries = (np.cashEntries || []).filter(e => !(e.dir === "out" && e.linkedId === entry.createdCreditorId));
                        }
                        if (entry.createdDebtorId) {
                            np.debtors = (np.debtors || []).filter(d => d.id !== entry.createdDebtorId);
                            np.cashEntries = (np.cashEntries || []).filter(e => !(e.dir === "in" && e.linkedId === entry.createdDebtorId));
                        }
                        if (entry.linkedDeprId) {
                            np.depreciationAssets = (np.depreciationAssets || []).filter(a => a.id !== entry.linkedDeprId);
                        }
                        np.depreciationAssets = (np.depreciationAssets || []).filter(a => a.bsAssetId !== id);
                    }
                    np = withLog(np, "DELETE", "balanceSheet." + side, id, `Deleted Balance Sheet entry`);
                    return np;
                });
            };

            const applyStockIn = () => {
                const { date, godown, bottleType, category, batchNo, qty, ratePerUnit, isReturn } = form;
                
                const hasGst = form.enableGst === "yes";
                const gstRate = hasGst ? Number(form.gstRate || 18) : 0;
                const hsnCode = hasGst ? form.hsnCode || "2201" : "";
                const supplierGstin = hasGst ? form.supplierGstin || "" : "";
                const supplierStateCode = hasGst ? form.supplierStateCode || "" : "";

                const qtyVal = Number(qty);
                const rateVal = Number(ratePerUnit);
                const taxable = qtyVal * rateVal;
                const gstAmount = taxable * (gstRate / 100);
                const total = taxable + gstAmount;

                if (isReturn === "true") {
                    if (!date || !godown || !bottleType || !category || !batchNo || !qty || !ratePerUnit) { alert("Fill all fields"); return; }
                    if (qtyVal <= 0 || rateVal <= 0) { alert("Qty and Rate must be > 0"); return; }
                    if (!form.returnSettleMode) { alert("Select a return settlement mode"); return; }
                    if (form.returnSettleMode === "creditor" && !form.returnCreditorId) { alert("Select a creditor for the return"); return; }
                    const id = gid();
                    const cred = form.returnCreditorId ? (state.creditors || []).find(c => c.id === form.returnCreditorId) : null;
                    const settleMode = form.returnSettleMode;
                    const linkedPartyId = settleMode === "creditor" && cred ? cred.id : null;
                    const linkedPartyName = settleMode === "creditor" && cred ? cred.name : "";
                    upd(p => {
                        let np = { ...p, stockIn: [...p.stockIn, { id, date, godown, bottleType, category, batchNo, qty: qtyVal, ratePerUnit: rateVal, totalAmount: total, gstAmount, gstRate, hsnCode, supplierGstin, supplierStateCode, settleMode, linkedPartyId, linkedPartyName, isReturn: true }] };
                        if (settleMode === "cash") {
                            np.cashEntries = [...np.cashEntries, { id: gid(), dir: "in", payType: "Purchase Return Receipt", description: `Purchase Return Receipt: ${bottleType} (${category}) — Batch ${batchNo}${cred ? " | Creditor: " + cred.name : ""}`, amount: total, date, sourceId: id, linkedId: null }];
                        }
                        np = withLog(np, "CREATE", "stockIn", id, `Added Purchase Return of ${qty} ${bottleType}`);
                        return np;
                    });
                    closeM();
                    return;
                }
                if (!date || !godown || !bottleType || !category || !batchNo || !qty || !ratePerUnit || !form.settleMode) { alert("Fill all fields & select payment mode"); return; }
                if (qtyVal <= 0 || rateVal <= 0) { alert("Qty and Rate must be > 0"); return; }
                const id = gid();
                const direction = "out";
                const res = resolveSettle(form, total, date, "Stock In: " + bottleType + " Batch " + batchNo, id, direction);
                
                const isDup = (state.stockIn || []).some(e => e.date === date && e.totalAmount === total && e.linkedPartyId === res.partyId && !e.isReturn);
                if (isDup && !window.confirm("Possible duplicate entry detected (same amount and party on this date). Save anyway?")) return;

                upd(p => {

                            const tens = ["", "", "Twenty", "Thirty", "Forty", "Fifty", "Sixty", "Seventy", "Eighty", "Ninety"];
                            
                            const num = Math.floor(amount);
                            if (num === 0) return "Zero Rupees";
                            
                            function helper(n) {
                                if (n < 20) return units[n];
                                if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? " " + units[n % 10] : "");
                                if (n < 1000) return units[Math.floor(n / 100)] + " Hundred" + (n % 100 ? " and " + helper(n % 100) : "");

                            }

                            const lakh = Math.floor(temp / 100000);
                            temp %= 100000;
                            const thousand = Math.floor(temp / 1000);
                            temp %= 1000;

                                                        <th style={{ border: "1px solid #000", padding: 4, textAlign: "right" }}>SGST Rate</th>

                                                        <>

                                                            <th style={{ border: "1px solid #000", padding: 4, textAlign: "right" }}>IGST Amt</th>
                                                        </>

                                                        existing.taxable += item.taxableValue;

                                                        existing.sgst += sgst;
                                                        existing.igst += igst;

                                                        acc.push({

                                        <div style={{ background: C.dark, padding: 10, borderRadius: 10 }}>

                                            <div style={{ fontSize: 13, fontWeight: 900, color: C.green }}>{fc(totalGstInput)}</div>
                                        </div>
                                        <div style={{ background: C.dark, padding: 10, borderRadius: 10 }}>
                                            <div style={{ fontSize: 8, color: C.muted }}>GST Paid (C)</div>
                                            <div style={{ fontSize: 13, fontWeight: 900, color: C.blue }}>{fc(totalGstPaidToGovt)}</div>
                                        </div>
                                        <div style={{ background: totalGstPayable > 0 ? "#2d1a10" : "#102d1a", padding: 10, borderRadius: 10, border: "1px solid " + (totalGstPayable > 0 ? C.amber : C.green) }}>
                                            <div style={{ fontSize: 8, color: C.muted }}>Net Payable (A-B-C)</div>
                                            <div style={{ fontSize: 13, fontWeight: 900, color: totalGstPayable > 0 ? C.amber : C.green }}>{fc(totalGstPayable)}</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div style={{ background: C.mid, borderRadius: 12, overflowX: "auto", border: "1px solid " + C.border }}>
                                <table style={TBL}>
                                    <thead>
                                        <tr>
                                            {["Invoice No", "Date", "Client Name", "Taxable Value", "CGST", "SGST", "IGST", "Grand Total", "Settle Mode", "Actions"].map(h => <th key={h} style={THS}>{h}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {invoices.length === 0 ? (
                                            <tr><td colSpan={10} style={{ ...TDS, textAlign: "center", color: C.muted, padding: 32 }}>No GST Invoices issued yet. Click "+ Issue GST Invoice" to begin.</td></tr>
                                        ) : (
                                            invoices.map(inv => (
                                                <tr key={inv.id}>
                                                    <td style={{ ...TDS, fontWeight: 700, color: C.teal }}>{inv.invoiceNo}</td>
                                                    <td style={TDS}>{inv.date}</td>
                                                    <td style={{ ...TDS, fontWeight: 700 }}>{inv.clientName}</td>
                                                    <td style={TDS}>{fc(inv.taxableTotal)}</td>
                                                    <td style={{ ...TDS, color: C.amber }}>{inv.cgstTotal > 0 ? fc(inv.cgstTotal) : "—"}</td>
                                                    <td style={{ ...TDS, color: C.amber }}>{inv.sgstTotal > 0 ? fc(inv.sgstTotal) : "—"}</td>
                                                    <td style={{ ...TDS, color: C.red }}>{inv.igstTotal > 0 ? fc(inv.igstTotal) : "—"}</td>
                                                    <td style={{ ...TDS, fontWeight: 800, color: C.green }}>{fc(inv.grandTotal)}</td>
                                                    <td style={TDS}>
                                                        <Badge label={inv.settleMode === "cash" ? "Cash" : "Debtor"} color={inv.settleMode === "cash" ? C.green : C.violet} />
                                                    </td>
                                                    <td style={TDS}>
                                                        <div style={{ display: "flex", gap: 6 }}>
                                                            <button style={{ ...BTNP(), padding: "3px 8px", fontSize: 10 }} onClick={() => setSelectedGstInvoiceId(inv.id)}>👁️ View / Print</button>
                                                            <button style={BTND} onClick={() => cascadeDelete("gstInvoices", inv.id)}>Del</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))
                                        )}
                                    </tbody>
                                </table>
                            </div>

                            {/* ─── GST REGISTER ─── */}
                            <div style={{ marginTop: 24 }}>
                                <div style={{ fontSize: 14, fontWeight: 800, color: C.amber, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}>
                                    <span>📒</span> GST Register (Input vs Output Set-off)
                                </div>

                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>

                                    {/* OUTPUT GST — Sales / Stock Out */}
                                    <div style={{ background: C.mid, borderRadius: 12, border: "1px solid " + C.border, overflow: "hidden" }}>
                                        <div style={{ padding: "10px 14px", background: "linear-gradient(90deg,#2d1919,#1a0a0a)", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                            <div style={{ fontWeight: 800, fontSize: 12, color: C.red }}>📤 Output GST (Tax on Sales)</div>
                                            <div style={{ fontSize: 11, color: C.muted }}>{so.filter(x => (x.gstAmount || 0) > 0 && !x.isReturn).length} entries</div>
                                        </div>
                                        <div style={{ overflowX: "auto", maxHeight: 280, overflowY: "auto" }}>
                                            <table style={TBL}>
                                                <thead>
                                                    <tr>
                                                        {["Date", "Bill No", "Party", "Taxable (₹)", "GST (₹)", "Rate"].map(h => <th key={h} style={{ ...THS, fontSize: 9 }}>{h}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {so.filter(x => (x.gstAmount || 0) > 0).length === 0
                                                        ? <tr><td colSpan={6} style={{ ...TDS, textAlign: "center", color: C.muted, fontSize: 11 }}>No GST-tagged sales yet</td></tr>
                                                        : so.filter(x => (x.gstAmount || 0) > 0).map((x, i) => {
                                                            const taxable = (x.totalAmount || 0) - (x.gstAmount || 0);
                                                            return (
                                                                <tr key={x.id || i} style={{ opacity: x.isReturn ? 0.6 : 1 }}>
                                                                    <td style={{ ...TDS, fontSize: 10 }}>{x.date}</td>
                                                                    <td style={{ ...TDS, fontSize: 10, color: C.teal }}>{x.billNo || x.gstInvoiceId ? (x.billNo || "INV") : "—"}</td>
                                                                    <td style={{ ...TDS, fontSize: 10 }}>{x.linkedPartyName || x.clientName || "—"}{x.isReturn ? <span style={{ color: C.amber, fontSize: 9, marginLeft: 4 }}>(Return)</span> : ""}</td>
                                                                    <td style={{ ...TDS, textAlign: "right", fontSize: 10 }}>{fc(taxable)}</td>
                                                                    <td style={{ ...TDS, textAlign: "right", fontWeight: 700, fontSize: 10, color: x.isReturn ? C.green : C.red }}>{x.isReturn ? "-" : ""}{fc(x.gstAmount || 0)}</td>
                                                                    <td style={{ ...TDS, textAlign: "center", fontSize: 10, color: C.muted }}>{x.gstRate ? x.gstRate + "%" : "—"}</td>
                                                                </tr>
                                                            );
                                                        })
                                                    }
                                                </tbody>
                                                {so.filter(x => (x.gstAmount || 0) > 0).length > 0 && (
                                                    <tfoot>
                                                        <tr style={{ background: "#2d1919" }}>
                                                            <td colSpan={3} style={{ ...TDS, fontWeight: 800, fontSize: 10 }}>Total Output GST</td>
                                                            <td style={{ ...TDS, textAlign: "right", fontWeight: 800, fontSize: 10 }}>{fc(so.filter(x => (x.gstAmount || 0) > 0).reduce((a, b) => a + ((b.totalAmount || 0) - (b.gstAmount || 0)), 0))}</td>
                                                            <td style={{ ...TDS, textAlign: "right", fontWeight: 900, fontSize: 11, color: C.red }}>{fc(totalGstOutput)}</td>
                                                            <td style={TDS}></td>
                                                        </tr>
                                                    </tfoot>
                                                )}
                                            </table>
                                        </div>
                                    </div>

                                    {/* INPUT GST — Purchases / Stock In (ITC) */}
                                    <div style={{ background: C.mid, borderRadius: 12, border: "1px solid " + C.border, overflow: "hidden" }}>
                                        <div style={{ padding: "10px 14px", background: "linear-gradient(90deg,#102d1a,#0a1e10)", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                            <div style={{ fontWeight: 800, fontSize: 12, color: C.green }}>📥 Input GST / ITC (Tax on Purchases)</div>
                                            <div style={{ fontSize: 11, color: C.muted }}>{si.filter(x => (x.gstAmount || 0) > 0 && !x.isReturn).length} entries</div>
                                        </div>
                                        <div style={{ overflowX: "auto", maxHeight: 280, overflowY: "auto" }}>
                                            <table style={TBL}>
                                                <thead>
                                                    <tr>
                                                        {["Date", "Batch No", "Supplier", "Taxable (₹)", "ITC (₹)", "Rate"].map(h => <th key={h} style={{ ...THS, fontSize: 9 }}>{h}</th>)}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {si.filter(x => (x.gstAmount || 0) > 0).length === 0
                                                        ? <tr><td colSpan={6} style={{ ...TDS, textAlign: "center", color: C.muted, fontSize: 11 }}>No GST-tagged purchases yet</td></tr>
                                                        : si.filter(x => (x.gstAmount || 0) > 0).map((x, i) => {
                                                            const taxable = (x.totalAmount || 0) - (x.gstAmount || 0);
                                                            return (
                                                                <tr key={x.id || i} style={{ opacity: x.isReturn ? 0.6 : 1 }}>
                                                                    <td style={{ ...TDS, fontSize: 10 }}>{x.date}</td>
                                                                    <td style={{ ...TDS, fontSize: 10, color: C.blue }}>{x.batchNo || "—"}</td>
                                                                    <td style={{ ...TDS, fontSize: 10 }}>{x.linkedPartyName || "—"}{x.isReturn ? <span style={{ color: C.amber, fontSize: 9, marginLeft: 4 }}>(Return)</span> : ""}</td>
                                                                    <td style={{ ...TDS, textAlign: "right", fontSize: 10 }}>{fc(taxable)}</td>
                                                                    <td style={{ ...TDS, textAlign: "right", fontWeight: 700, fontSize: 10, color: x.isReturn ? C.red : C.green }}>{x.isReturn ? "-" : ""}{fc(x.gstAmount || 0)}</td>
                                                                    <td style={{ ...TDS, textAlign: "center", fontSize: 10, color: C.muted }}>{x.gstRate ? x.gstRate + "%" : "—"}</td>
                                                                </tr>
                                                            );
                                                        })
                                                    }
                                                </tbody>
                                                {si.filter(x => (x.gstAmount || 0) > 0).length > 0 && (
                                                    <tfoot>
                                                        <tr style={{ background: "#102d1a" }}>
                                                            <td colSpan={3} style={{ ...TDS, fontWeight: 800, fontSize: 10 }}>Total Input GST (ITC)</td>
                                                            <td style={{ ...TDS, textAlign: "right", fontWeight: 800, fontSize: 10 }}>{fc(si.filter(x => (x.gstAmount || 0) > 0).reduce((a, b) => a + ((b.totalAmount || 0) - (b.gstAmount || 0)), 0))}</td>
                                                            <td style={{ ...TDS, textAlign: "right", fontWeight: 900, fontSize: 11, color: C.green }}>{fc(totalGstInput)}</td>
                                                            <td style={TDS}></td>
                                                        </tr>
                                                    </tfoot>
                                                )}
                                            </table>
                                        </div>
                                    </div>
                                </div>

                                {/* GST Payments Made */}
                                {(() => {
                                    const gstPmts = cash.filter(e => e.payType === "GST Tax Payment");
                                    if (gstPmts.length === 0) return null;
                                    return (
                                        <div style={{ background: C.mid, borderRadius: 12, border: "1px solid " + C.border, overflow: "hidden", marginBottom: 14 }}>
                                            <div style={{ padding: "10px 14px", background: "linear-gradient(90deg,#0c1a2d,#071020)", borderBottom: "1px solid " + C.border, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                <div style={{ fontWeight: 800, fontSize: 12, color: C.blue }}>💳 GST Paid to Government</div>
                                                <div style={{ fontSize: 11, color: C.muted }}>{gstPmts.length} payment{gstPmts.length > 1 ? "s" : ""}</div>
                                            </div>
                                            <div style={{ overflowX: "auto" }}>
                                                <table style={TBL}>
                                                    <thead>
                                                        <tr>
                                                            {["Date", "Description", "Amount Paid (₹)"].map(h => <th key={h} style={{ ...THS, fontSize: 9 }}>{h}</th>)}
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {gstPmts.map((e, i) => (
                                                            <tr key={e.id || i}>
                                                                <td style={{ ...TDS, fontSize: 10 }}>{e.date}</td>
                                                                <td style={{ ...TDS, fontSize: 10 }}>{e.description || "GST Tax Payment"}</td>
                                                                <td style={{ ...TDS, textAlign: "right", fontWeight: 700, color: C.blue }}>{fc(e.amount)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                    <tfoot>
                                                        <tr style={{ background: "#0c1a2d" }}>
                                                            <td colSpan={2} style={{ ...TDS, fontWeight: 800, fontSize: 10 }}>Total Paid to Government</td>
                                                            <td style={{ ...TDS, textAlign: "right", fontWeight: 900, fontSize: 11, color: C.blue }}>{fc(totalGstPaidToGovt)}</td>
                                                        </tr>
                                                    </tfoot>
                                                </table>
                                            </div>
                                        </div>
                                    );
                                })()}

                                {/* ─── SET-OFF STATEMENT ─── */}
                                <div style={{ background: "linear-gradient(135deg,#0f172a,#1e1b4b)", borderRadius: 14, border: "2px solid " + C.border, padding: 20 }}>
                                    <div style={{ fontWeight: 900, fontSize: 13, color: C.text, marginBottom: 16, borderBottom: "1px solid #334155", paddingBottom: 8 }}>
                                        🧮 GST Set-Off Statement
                                    </div>
                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
                                        <div style={{ background: "#1a0a0a", borderRadius: 10, padding: 14, border: "1px solid #7f1d1d" }}>
                                            <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>➕ Output Tax Liability</div>
                                            <div style={{ fontSize: 16, fontWeight: 900, color: C.red }}>{fc(totalGstOutput)}</div>
                                            <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 4 }}>GST collected on all sales</div>
                                        </div>
                                        <div style={{ background: "#102d1a", borderRadius: 10, padding: 14, border: "1px solid #14532d" }}>
                                            <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>➖ Input Tax Credit (ITC)</div>
                                            <div style={{ fontSize: 16, fontWeight: 900, color: C.green }}>{fc(totalGstInput)}</div>
                                            <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 4 }}>GST paid on all purchases</div>
                                        </div>
                                        <div style={{ background: totalGstOutput - totalGstInput > 0 ? "#1c1108" : "#081c11", borderRadius: 10, padding: 14, border: "1px solid " + (totalGstOutput - totalGstInput > 0 ? "#92400e" : "#14532d") }}>
                                            <div style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>= Net Tax After Set-off</div>
                                            <div style={{ fontSize: 16, fontWeight: 900, color: totalGstOutput - totalGstInput > 0 ? C.amber : C.green }}>{fc(Math.abs(totalGstOutput - totalGstInput))}</div>
                                            <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 4 }}>{totalGstOutput - totalGstInput > 0 ? "Liability after ITC set-off" : "ITC excess (carry forward)"}</div>
                                        </div>
                                    </div>

                                    {/* Step-by-step set-off table */}
                                    <div style={{ background: "#0a0f1e", borderRadius: 10, padding: 14, border: "1px solid #1e293b", marginBottom: 14 }}>
                                        <div style={{ fontSize: 10, fontWeight: 800, color: "#94a3b8", marginBottom: 10 }}>Step-by-step ITC Set-off (as per GST rules)</div>
                                        {[
                                            { label: "Output GST Liability", value: totalGstOutput, color: C.red, indent: false, bold: true },
                                            { label: "Less: Input Tax Credit (ITC) Available", value: -Math.min(totalGstInput, totalGstOutput), color: C.green, indent: true, bold: false },
                                            { label: "Net GST Payable (Before Payment)", value: Math.max(0, totalGstOutput - totalGstInput), color: C.amber, indent: false, bold: true },
                                            { label: "Less: GST Already Paid to Govt (Cash)", value: -Math.min(totalGstPaidToGovt, Math.max(0, totalGstOutput - totalGstInput)), color: C.blue, indent: true, bold: false },
                                            { label: "Net GST Balance Payable", value: totalGstPayable, color: totalGstPayable > 0 ? C.red : C.green, indent: false, bold: true, highlight: true },
                                        ].map((row, i) => (
                                            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: row.highlight ? "8px 10px" : "5px 0", borderRadius: row.highlight ? 8 : 0, background: row.highlight ? (totalGstPayable > 0 ? "#2d1a10" : "#0d2818") : "transparent", marginBottom: row.highlight ? 0 : 2, border: row.highlight ? ("1px solid " + (totalGstPayable > 0 ? C.amber : C.green)) : "none" }}>
                                                <span style={{ fontSize: 11, color: row.color, fontWeight: row.bold ? 800 : 400, paddingLeft: row.indent ? 16 : 0 }}>{row.indent ? "(" : ""}{row.label}{row.indent ? ")" : ""}</span>
                                                <span style={{ fontSize: row.highlight ? 14 : 11, fontWeight: row.bold ? 900 : 600, color: row.color }}>
                                                    {row.indent && row.value < 0 ? "- " : ""}{fc(Math.abs(row.value))}
                                                </span>
                                            </div>
                                        ))}
                                    </div>

                                    {/* ITC Excess carry forward or Payment due notice */}
                                    {totalGstInput > totalGstOutput && (
                                        <div style={{ background: "#042f2e", borderRadius: 8, padding: "10px 14px", border: "1px solid " + C.teal, fontSize: 11, color: C.teal }}>
                                            ✅ ITC Excess: You have <strong>{fc(totalGstInput - totalGstOutput)}</strong> of excess Input Tax Credit available for carry forward to the next period.
                                        </div>
                                    )}
                                    {totalGstPayable > 0 && (
                                        <div style={{ background: "#2d1a10", borderRadius: 8, padding: "10px 14px", border: "1px solid " + C.amber, fontSize: 11, color: C.amber }}>
                                            ⚠️ GST Payable: <strong>{fc(totalGstPayable)}</strong> is due to the government. Record this via <strong>Cash Book → Cash Out → GST Tax Payment</strong> when paid.
                                        </div>
                                    )}
                                    {totalGstPayable <= 0 && totalGstOutput > 0 && (
                                        <div style={{ background: "#042f2e", borderRadius: 8, padding: "10px 14px", border: "1px solid " + C.green, fontSize: 11, color: C.green }}>
                                            ✅ GST Fully Settled: All output GST has been covered by ITC and/or payments. {totalGstPayable < 0 ? `Excess credit of ${fc(Math.abs(totalGstPayable))} available.` : ""}
                                        </div>
                                    )}
                                </div>
                            </div>

                        </div>);
                    })()}


                    {tab === "P&L Account" && <div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                            <div style={{ fontSize: 16, fontWeight: 800, color: "#10b981" }}>📈 Profit & Loss Account</div>
                            {isAdmin && <button style={BTNP()} onClick={() => openM("pl")}>+ Add Entry</button>}
                        </div>
                        <div style={{ background: "#0a1628", borderRadius: 10, padding: "8px 14px", marginBottom: 12, border: "1px solid #334155", fontSize: 10, color: "#64748b" }}>
                            ℹ️ <strong style={{ color: "#94a3b8" }}>Accounting Note:</strong> P&amp;L is derived from Trading Account (Gross Profit/Loss) + manual P&amp;L entries + Depreciation only. Cash Book entries do <em>not</em> feed into P&amp;L to prevent double-entry.
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                            <div style={{ background: C.mid, borderRadius: 12, padding: 16 }}>
                                <div style={{ fontWeight: 800, color: C.red, fontSize: 12, marginBottom: 6, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Dr — Expenses</div>
                                {grossProfit < 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, marginBottom: 4 }}><span>Gross Loss b/d</span><span style={{ fontWeight: 700 }}>{fabs(grossProfit)}</span></div>}
                                {totalDepreciation > 0 && <div style={{ marginBottom: 6 }}><div style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, marginBottom: 2 }}>Depreciation (auto)</div>{da.map(a => { const d = calcDepreciation(a); return d.totalDepr > 0 ? <div key={a.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 8, color: C.amber, marginBottom: 2 }}><span>{a.name}</span><span>{fc(d.totalDepr)}</span></div> : null; })}</div>}
                                {totalLoanInterest > 0 && (
                                    <div style={{ marginBottom: 6 }}>
                                        <div style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, marginBottom: 2 }}>Finance Costs (auto-accrued)</div>
                                        {Object.values(state.balanceSheet?.liabilities || {})
                                            .filter(e => e.subCategory === "Long Term Borrowings" && e.interestRate)
                                            .map(e => {
                                                const i = calcInterestForEntry(e);
                                                return i.total > 0 ? (
                                                    <div key={e.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 8, color: C.amber, marginBottom: 2 }}>
                                                        <span>Interest on {e.description} ({e.interestRate}% p.a.)</span>
                                                        <span>{fc(i.total)}</span>
                                                    </div>
                                                ) : null;
                                            })
                                        }
                                    </div>
                                )}
                                {PL_CATS.expenses.map(cat => { const ents = ple.filter(e => e.side === "expense" && e.category === cat); return ents.length ? <div key={cat} style={{ marginBottom: 6 }}><div style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, marginBottom: 2 }}>{cat}</div>{ents.map(e => <div key={e.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 8, alignItems: "center", marginBottom: 2 }}><span>{e.description}</span><span style={{ display: "flex", gap: 5 }}>{fc(e.amount)}<button style={BTND} onClick={() => cascadeDelete("plEntries", e.id)}>✕</button></span></div>)}</div> : null; })}
                                {plExpense === 0 && <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: "8px 0" }}>No expenses recorded</div>}
                                <div style={{ borderTop: "2px solid #334155", paddingTop: 6, fontWeight: 900, color: C.red, textAlign: "right" }}>Total Dr: {fc(plExpense)}</div>
                                {netPL >= 0 && <div style={{ color: C.green, fontWeight: 800, textAlign: "right", marginTop: 4, fontSize: 11 }}>Net Profit c/d: {fc(netPL)}</div>}
                            </div>
                            <div style={{ background: C.mid, borderRadius: 12, padding: 16 }}>
                                <div style={{ fontWeight: 800, color: C.green, fontSize: 12, marginBottom: 6, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Cr — Income</div>
                                {grossProfit >= 0 && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, marginBottom: 4 }}><span>Gross Profit b/d</span><span style={{ fontWeight: 700 }}>{fc(grossProfit)}</span></div>}
                                {PL_CATS.income.map(cat => { const ents = ple.filter(e => e.side === "income" && e.category === cat); return ents.length ? <div key={cat} style={{ marginBottom: 6 }}><div style={{ color: "#94a3b8", fontSize: 10, fontWeight: 700, marginBottom: 2 }}>{cat}</div>{ents.map(e => <div key={e.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 8, alignItems: "center", marginBottom: 2 }}><span>{e.description}</span><span style={{ display: "flex", gap: 5 }}>{fc(e.amount)}<button style={BTND} onClick={() => cascadeDelete("plEntries", e.id)}>✕</button></span></div>)}</div> : null; })}
                                {plIncome === 0 && <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: "8px 0" }}>No income recorded</div>}
                                <div style={{ borderTop: "2px solid #334155", paddingTop: 6, fontWeight: 900, color: C.green, textAlign: "right" }}>Total Cr: {fc(plIncome)}</div>
                                {netPL < 0 && <div style={{ color: C.red, fontWeight: 800, textAlign: "right", marginTop: 4, fontSize: 11 }}>Net Loss c/d: {fabs(netPL)}</div>}
                            </div>
