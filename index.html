                                            Assets do not equal Liabilities + Equity. Most common causes:<br />
                                            <strong>1. Missing Opening Capital / Bank Balance</strong>: If a Creditor has a pre-existing opening balance (money owed before you started using this system), or if you had cash/assets at the start, you must add a matching <em>Share Capital</em> or <em>Opening Bank Balance</em> entry under <strong>Liabilities &amp; Equity → Equity</strong> via <strong>+ Manual Entry</strong>. This is the most frequent reason for a mismatch.<br />
                                            <strong>2. Unbalanced "Journal Only" Entries</strong>: Manual entries in Trading/P&amp;L/BS using "📝 Journal Only" without a matching opposite entry.<br />
                                            <strong>3. Raw Material Pool</strong>: Past Stock In payments via Raw Material Pool may have double-counted GST ITC.<br />
                                            <strong>4. Deleted Creditor/Debtor with remaining cash entries</strong>: If you deleted a party after recording cash transactions against them, orphaned cash entries remain.
                                        </div>
                                      </div>
                                    : <div style={{ background: "#052e16", borderRadius: 8, padding: "8px 14px", marginBottom: 10, color: "#86efac", fontWeight: 700, textAlign: "center", fontSize: 12 }}>✅ Balance Sheet BALANCED — Assets = Liabilities + Equity</div>}
                                {credsWithOpening.length > 0 && (
                                    <div style={{ background: "#1c1000", border: "1px solid #b45309", borderRadius: 8, padding: "10px 14px", marginBottom: 10, fontSize: 10, color: "#fcd34d", lineHeight: "1.6" }}>
                                        <strong style={{ color: "#fbbf24" }}>💡 Creditor Opening Balance Advisory</strong><br />
                                        The following creditor(s) have a non-zero <strong>opening balance</strong> (money owed before this system started):
                                        {credsWithOpening.map(c => <span key={c.id} style={{ display: "block", paddingLeft: 8, color: "#fde68a" }}>• {c.name}: {fc(Number(c.amount))}</span>)}
                                        <span style={{ color: "#fed7aa", display: "block", marginTop: 4 }}>These create automatic <em>Liabilities</em> without a matching <em>Asset</em>. To balance the sheet, go to <strong>+ Manual Entry</strong> → Liabilities &amp; Equity → Equity → add <em>"Opening Capital / Proprietor's Capital"</em> for the same total amount ({fc(credsWithOpening.reduce((s, c) => s + Number(c.amount), 0))}).</span>
                                    </div>
                                )}
                                {danglingCash.length > 0 && (
                                    <div style={{ background: "#1a0f00", border: "1px solid #ef4444", borderRadius: 8, padding: "10px 14px", marginBottom: 10, fontSize: 10, color: "#fca5a5", lineHeight: "1.6" }}>
                                        <strong style={{ color: "#f87171" }}>⚠️ Orphaned Cash Entries Detected</strong><br />
                                        {danglingCash.length} cash book entry/entries reference a Creditor or Debtor that has been deleted. This distorts the Cash Balance on the Balance Sheet.<br />
                                        <span style={{ color: "#fda4af", display: "block", marginTop: 4 }}>Entries: {danglingCash.map(e => `"${e.description}" (${fc(e.amount)}, ${e.date})`).join(" | ")}</span>
                                        <span style={{ color: "#fda4af", display: "block", marginTop: 4 }}>Fix: Go to <strong>Cash Book</strong> tab and delete these entries, or re-add the missing Creditor/Debtor in their respective tabs.</span>
                                    </div>
                                )}
                            </>);
                        })()}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                            {["liabilities", "assets"].map(side => {

                                const autoItems = [];
                                if (side === "assets") {

                                    if (totalDepreciation > 0) autoItems.push({ sub: "Fixed Assets", label: "Less: Accum. Depr", val: -totalDepreciation, c: C.red });

                                    if (gstItcReceivable > 0) autoItems.push({ sub: "Other Current Assets", label: "GST Input Tax Credit (ITC Receivable)", val: gstItcReceivable, c: C.teal });

                                    if (totalCreditors > 0) autoItems.push({ sub: "Trade Payables", label: "Trade Creditors", val: totalCreditors, c: C.amber });

                                    // GST payable only shown as liability when positive (output > input)
                                    if (totalGstPayable > 0) autoItems.push({ sub: "Other Current Liabilities", label: "GST Duties & Taxes (Payable)", val: totalGstPayable, c: C.amber });
                                    autoItems.push({ sub: "Retained Earnings / Net Profit", label: netPL >= 0 ? "Net Profit (auto)" : "Net Loss (auto)", val: netPL, c: netPL >= 0 ? C.green : C.red });
                                }
                                const groupTotals = {};
                                Object.entries(SCHEDULE3[side]).forEach(([grp, subs]) => {

                                                return (<div key={sub} style={{ marginBottom: 5 }}>

                                                    {subE.map(e => {
                                                        if (e.subCategory === "Long Term Borrowings") {
                                                            const repaid = loanPrincipalPaid(e.id);

                                                            return (
                                                                <div key={e.id} style={{ marginBottom: 6, paddingLeft: 12, width: "100%" }}>
                                                                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.text, alignItems: "center" }}>
                                                                        <span>{e.description}{e.interestRate ? ` (${e.interestRate}% p.a.)` : ""}</span>
                                                                        <span style={{ display: "flex", gap: 5 }}>{fc(original)}{!e.autoFromDepr && <button style={BTND} onClick={() => delBS(side, e.id)}>✕</button>}</span>

                                                                        </div>
                                                                    )}
                                                                    {repaid > 0 && (
                                                                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.blue, paddingLeft: 8, marginTop: 1, fontWeight: 700 }}>
                                                                            <span>Net Loan Outstanding</span>
                                                                            <span>{fc(e.amount)}</span>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        }
                                                        return (
                                                            <div key={e.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.text, alignItems: "center", paddingLeft: 12, marginBottom: 2 }}>
                                                                <span>{e.description}</span>
                                                                <span style={{ display: "flex", gap: 5 }}>{fc(e.amount)}{!e.autoFromDepr && <button style={BTND} onClick={() => delBS(side, e.id)}>✕</button>}</span>
                                                            </div>
                                                        );
                                                    })}
                                                    {autoSub.map((a, i) => <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 12, color: a.c }}><span>{a.label} <span style={{ color: C.muted, fontSize: 9 }}>(auto)</span></span><span style={{ fontWeight: 700 }}>{fc(a.val)}</span></div>)}
                                                    {subTotal !== 0 && <div style={{ textAlign: "right", fontSize: 11, color, fontWeight: 700, paddingRight: 4, marginTop: 3 }}>Sub-total: {fc(subTotal)}</div>}
                                                </div>);
                                            })}
                                            {groupTotals[grp] !== 0 && <div style={{ textAlign: "right", fontWeight: 800, color, fontSize: 11, marginTop: 4, borderTop: "1px dashed #334155", paddingTop: 4 }}>Group Total: {fc(groupTotals[grp])}</div>}
                                        </div>
                                    ))}
                                    <div style={{ borderTop: "2px solid #334155", paddingTop: 8, fontWeight: 900, color, textAlign: "right", fontSize: 14 }}>TOTAL: {fc(grand)}</div>
                                </div>);
                            })}
                        </div>
                        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>

                    {tab === "Depreciation" && <div>

                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                            {[{ title: "📥 Purchases", data: buildTSD(si, "totalAmount"), color: C.violet }, { title: "📤 Sales", data: buildTSD(so, "totalAmount"), color: C.teal }, { title: "💵 Cash In", data: buildTSD(cash.filter(e => e.dir === "in"), "amount"), color: C.green }, { title: "💸 Cash Out", data: buildTSD(cash.filter(e => e.dir === "out"), "amount"), color: C.red }].map(({ title, data, color }) => (
                                <div key={title} style={{ background: C.mid, borderRadius: 14, padding: 16, border: "1px solid #334155" }}>
                                    <div style={{ fontSize: 12, fontWeight: 800, color, marginBottom: 10 }}>{title}</div>
                                    <MiniChart data={data} color={color} height={90} />
                                    {data.length === 0 && <div style={{ textAlign: "center", color: C.muted, fontSize: 11, padding: 20 }}>Add entries to see trend</div>}
                                </div>
                            ))}
                        </div>
                    </div>}

                    {tab === "Trial Balance" && (() => {
                        const rows = [
                            { name: "Opening Stock", dr: state.openingStock?.amount || 0, cr: 0 },
                            { name: "Purchases", dr: si.filter(x => !x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0), cr: 0 },
                            { name: "Purchase Returns", dr: 0, cr: si.filter(x => x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0) },
                            { name: "Sales", dr: 0, cr: so.filter(x => !x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0) },
                            { name: "Sales Returns", dr: so.filter(x => x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0), cr: 0 },
                            { name: "Trading Dr (Direct Exp)", dr: te.filter(x => x.side === "dr" && x.sourceType !== "rawMaterial").reduce((s, e) => s + e.amount, 0), cr: 0 },
                            { name: "Raw Material Costs", dr: rawMaterialCosts, cr: 0 },
                            { name: "Trading Cr (Direct Inc)", dr: 0, cr: te.filter(x => x.side === "cr").reduce((s, e) => s + e.amount, 0) },
                            // P&L Expenses/Income: use base amount (excl. GST); GST is captured in ITC/Payable rows below
                            { name: "P&L Expenses", dr: ple.filter(x => x.side === "expense").reduce((s, e) => s + Number(e.amount), 0), cr: 0 },
                            { name: "P&L Income", dr: 0, cr: ple.filter(x => x.side === "income").reduce((s, e) => s + Number(e.amount), 0) },
                            { name: "Depreciation (Expense)", dr: totalDepreciation, cr: 0 },
                            { name: "Trade Debtors", dr: totalDebtors, cr: 0 },
                            { name: "Trade Creditors", dr: 0, cr: totalCreditors },
                            { name: "Cash Balance", dr: cashBal >= 0 ? cashBal : 0, cr: cashBal < 0 ? Math.abs(cashBal) : 0 },
                            { name: "Manual BS Assets", dr: Object.values(state.balanceSheet?.assets || {}).reduce((s, e) => s + Number(e.amount), 0), cr: 0 },
                            { name: "Manual BS Liab & Equity", dr: 0, cr: bsManualLiabRaw.reduce((s, e) => s + Number(e.amount), 0) },
                            { name: "Loan Interest (Expense)", dr: totalLoanInterest, cr: 0 },
                            { name: "Interest Outstanding on Loans", dr: 0, cr: outstandingInterestLiab },
                            // GST ITC Receivable when Input > Output; GST Payable when Output > Input
                            { name: "GST ITC Receivable (Asset)", dr: gstItcReceivable > 0 ? gstItcReceivable : 0, cr: 0 },
                            { name: "GST Duties & Taxes (Payable)", dr: 0, cr: totalGstPayable > 0 ? totalGstPayable : 0 },
                            // Note: Net Profit/Loss is NOT included here — this is a pre-closing Trial Balance.
                            // Revenue and expense accounts are listed individually; including the derived
                            // Net P&L would double-count those balances.
                        ];
                        const totalDr = rows.reduce((acc, r) => acc + r.dr, 0);
                        const totalCr = rows.reduce((acc, r) => acc + r.cr, 0);
                        const diff = Math.abs(totalDr - totalCr);
                        const balanced = diff < 0.01;

                        return <div>
                            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.teal }}>⚖️ Trial Balance</div>
                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155" }}>
                                <table style={TBL}>
                                    <thead><tr><th style={THS}>Account</th><th style={{ ...THS, textAlign: "right" }}>Debit (Dr)</th><th style={{ ...THS, textAlign: "right" }}>Credit (Cr)</th></tr></thead>
                                    <tbody>
                                        {rows.map(r => (
                                            <tr key={r.name}>
                                                <td style={TDS}>{r.name}</td>
                                                <td style={{ ...TDS, textAlign: "right" }}>{r.dr > 0 ? fc(r.dr) : "—"}</td>
                                                <td style={{ ...TDS, textAlign: "right" }}>{r.cr > 0 ? fc(r.cr) : "—"}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot>
                                        <tr style={{ borderTop: "2px solid #334155", fontWeight: 800 }}>
                                            <td style={{ ...TDS, fontWeight: "bold" }}>Total</td>
                                            <td style={{ ...TDS, textAlign: "right", fontWeight: "bold", color: balanced ? C.green : C.red }}>{fc(totalDr)}</td>
                                            <td style={{ ...TDS, textAlign: "right", fontWeight: "bold", color: balanced ? C.green : C.red }}>{fc(totalCr)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                                {!balanced && <div style={{ color: C.red, fontSize: 11, fontWeight: 700, marginTop: 8, textAlign: "center" }}>⚠️ Trial Balance Mismatch! Difference: {fc(diff)}</div>}
                                {balanced && <div style={{ color: C.green, fontSize: 11, fontWeight: 700, marginTop: 8, textAlign: "center" }}>✅ Trial Balance Balanced</div>}
                                <div style={{ marginTop: 12, fontSize: 10, color: C.muted, textAlign: "center" }}>Note: This is a pre-closing Trial Balance (closing stock is not included; opening stock is).</div>
                            </div>
                        </div>;
                    })()}

                    {tab === "Cash Flow" && (() => {
                        const sums = {};
                        [...CASH_IN_TYPES, ...CASH_OUT_TYPES].forEach(t => sums[t] = 0);
                        // Exclude pending entries — cash hasn't actually moved yet
                        cash.filter(e => !e.isPending).forEach(e => { sums[e.payType] = (sums[e.payType] || 0) + e.amount; });
                        const operatingIn = sums["Sales Receipt"] + sums["Debtor Payment"] + sums["Other Income Receipt"];
                        const operatingOut = sums["Expense Payment"] + sums["Creditor Payment"] + sums["Stock Purchase Payment"] + sums["Sales Return Refund"] + (sums["Raw Material Payment"] || 0);
                        const investingIn = sums["Purchase Return Receipt"]; // Return of capital/stock
                        const investingOut = sums["Other Payment"] + (sums["Asset Down Payment"] || 0); // Usually fixed assets
                        const financingIn = sums["Capital Introduced"] + sums["Loan Received"];
                        const financingOut = sums["Loan Repayment"] + (sums["Interest on Loan Repayment"] || 0);
                        const opNet = operatingIn - operatingOut;
                        const invNet = investingIn - investingOut;
                        const finNet = financingIn - financingOut;

                        return <div>
                            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.blue }}>🌊 Cash Flow Statement (Direct Method)</div>

                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155", marginBottom: 16 }}>
                                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 10, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Operating Activities</div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Receipts from Customers (Sales & Debtors)</span><span>{fc(sums["Sales Receipt"] + sums["Debtor Payment"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Other Income Receipts</span><span>{fc(sums["Other Income Receipt"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Payments to Suppliers (Purchases, Creditors & Raw Materials)</span><span>{fc(sums["Stock Purchase Payment"] + sums["Creditor Payment"] + (sums["Raw Material Payment"] || 0))}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Operating Expense Payments</span><span>{fc(sums["Expense Payment"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Sales Return Refunds</span><span>{fc(sums["Sales Return Refund"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, color: opNet >= 0 ? C.green : C.red, marginTop: 6, paddingTop: 4, borderTop: "1px dashed #334155" }}><span>Net Cash from Operating Activities</span><span>{fc(opNet)}</span></div>
                            </div>

                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155", marginBottom: 16 }}>
                                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 10, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Investing Activities</div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Purchase Return Receipts (Refunds)</span><span>{fc(sums["Purchase Return Receipt"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Other Payments (Fixed Assets, etc.)</span><span>{fc(sums["Other Payment"] + (sums["Asset Down Payment"] || 0))}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, color: invNet >= 0 ? C.green : C.red, marginTop: 6, paddingTop: 4, borderTop: "1px dashed #334155" }}><span>Net Cash from Investing Activities</span><span>{fc(invNet)}</span></div>
                            </div>

                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155", marginBottom: 16 }}>
                                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 10, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Financing Activities</div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Capital Introduced</span><span>{fc(sums["Capital Introduced"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Loan Received</span><span>{fc(sums["Loan Received"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Loan Repayment</span><span>{fc(sums["Loan Repayment"])}</span></div>
                                {sums["Interest on Loan Repayment"] > 0 && (
                                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Interest on Loan Repayment</span><span>{fc(sums["Interest on Loan Repayment"])}</span></div>
                                )}
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, color: finNet >= 0 ? C.green : C.red, marginTop: 6, paddingTop: 4, borderTop: "1px dashed #334155" }}><span>Net Cash from Financing Activities</span><span>{fc(finNet)}</span></div>
                            </div>

                            <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                                <div style={CARD(cashBal >= 0 ? "#16a34a,#15803d" : "#dc2626,#b91c1c")}><div style={{ fontSize: 10 }}>Net Increase / (Decrease) in Cash</div><div style={{ fontSize: 16, fontWeight: 900 }}>{fc(opNet + invNet + finNet)}</div></div>
                                <div style={CARD("#0ea5e9,#0284c7")}><div style={{ fontSize: 10 }}>Closing Cash Balance</div><div style={{ fontSize: 16, fontWeight: 900 }}>{fc(cashBal)}</div></div>
                            </div>
                        </div>;
                    })()}

                    {tab === "Journal" && (() => {
                        let j = [];
                        si.forEach(e => j.push({ date: e.date, type: "Stock In", desc: `Batch ${e.batchNo} (${e.bottleType})`, id: e.id, amt: e.totalAmount, dir: "dr" }));
                        so.forEach(e => j.push({ date: e.date, type: "Stock Out", desc: `${e.qty} ${e.bottleType}`, id: e.id, amt: e.totalAmount, dir: "cr" }));
                        cash.forEach(e => {
                            j.push({ date: e.date, type: "Cash", desc: e.description, id: e.id, amt: e.amount, dir: e.dir });
                            if (e.dir === "out" && e.payType === "Loan Repayment" && e.linkedId) {
                                const loan = Object.values(state.balanceSheet?.liabilities || {}).find(x => x.id === e.linkedId);
                                j.push({
                                    date: e.date,
                                    type: "Balance Sheet",
                                    desc: `Debit: Principal Repayment of ${loan ? loan.description : "Loan"}`,
                                    id: e.id + "_repay_dr",
                                    amt: e.amount,
                                    dir: "dr"
                                });
                            }
                            if (e.dir === "out" && e.payType === "Interest on Loan Repayment" && e.linkedId) {
                                const loan = Object.values(state.balanceSheet?.liabilities || {}).find(x => x.id === e.linkedId);
                                j.push({
                                    date: e.date,
                                    type: "Balance Sheet",
                                    desc: `Debit: Interest Paid on ${loan ? loan.description : "Loan"}`,
                                    id: e.id + "_intpaid_dr",
                                    amt: e.amount,
                                    dir: "dr"
                                });
                            }
                        });
                        te.forEach(e => j.push({ date: e.date, type: "Trading", desc: e.description, id: e.id, amt: e.amount, dir: e.side }));
                        ple.forEach(e => j.push({ date: e.date, type: "P&L", desc: e.description, id: e.id, amt: e.amount, dir: e.side }));
                        Object.values(state.balanceSheet?.liabilities || {})
                            .filter(e => e.subCategory === "Long Term Borrowings" && e.interestRate)
                            .forEach(e => {
                                const principal = Number(e.amount);
                                const rate = Number(e.interestRate) / 100;
                                const startDate = new Date(e.date);
                                const now = new Date();
                                let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
                                if (mo < 0) mo = 0;
                                const monthlyAmt = (principal * rate) / 12;
                                for (let m = 1; m <= mo; m++) {
                                    const interestDate = new Date(startDate.getTime());
                                    interestDate.setMonth(startDate.getMonth() + m);
                                    const dateStr = interestDate.toISOString().slice(0, 10);
                                    j.push({
                                        date: dateStr,
                                        type: "P&L",
                                        desc: `Auto Interest Accrual: ${e.description} (${e.interestRate}% p.a.)`,
                                        id: e.id + `_int_${m}_dr`,
                                        amt: monthlyAmt,
                                        dir: "dr"
                                    });
                                    j.push({
                                        date: dateStr,
                                        type: "Balance Sheet",
                                        desc: `Auto Interest Outstanding: ${e.description} (${e.interestRate}% p.a.)`,
                                        id: e.id + `_int_${m}_cr`,
                                        amt: monthlyAmt,
                                        dir: "cr"
                                    });
                                }
                            });
                        j.sort((a, b) => new Date(b.date) - new Date(a.date));

                        return <div>
                            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.purple }}>📖 Journal / General Ledger</div>
                            <div style={{ background: C.mid, borderRadius: 12, overflowX: "auto", border: "1px solid #334155" }}>
                                <table style={TBL}>
                                    <thead><tr><th style={THS}>Date</th><th style={THS}>Module</th><th style={THS}>Description</th><th style={THS}>Effect (Dr / Cr)</th><th style={{ ...THS, textAlign: "right" }}>Amount</th></tr></thead>
                                    <tbody>
                                        {j.map((e, i) => <tr key={i}>
                                            <td style={TDS}>{e.date}</td>
                                            <td style={TDS}><Badge label={e.type} color={C.violet} /></td>
                                            <td style={{ ...TDS, fontSize: 11 }}>{e.desc}</td>
                                            <td style={{ ...TDS, color: C.muted, fontSize: 10 }}>{e.dir === "in" || e.dir === "dr" || e.dir === "expense" ? "Debit / In" : "Credit / Out"}</td>
                                            <td style={{ ...TDS, textAlign: "right", fontWeight: 700 }}>{fc(e.amt)}</td>
                                        </tr>)}
                                    </tbody>
                                </table>
                            </div>
                        </div>;
                    })()}

                    {tab === "Audit Trail" && <div>
                        <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: "#94a3b8" }}>📋 Audit Trail</div>
                        <div style={{ background: C.mid, borderRadius: 12, overflow: "hidden", border: "1px solid #334155" }}>
                            {(state.auditLog || []).length === 0
                                ? <div style={{ fontSize: 12, color: C.muted, textAlign: "center", padding: 32 }}>No activity recorded yet.</div>
                                : <table style={TBL}>
                                    <thead><tr>
                                        <th style={THS}>#</th>
                                        <th style={THS}>Action</th>
                                        <th style={THS}>Module</th>
                                        <th style={THS}>Description</th>
                                        <th style={THS}>User</th>
                                        <th style={THS}>Date & Time</th>
                                    </tr></thead>
                                    <tbody>
                                        {(state.auditLog || []).map((l, i) => (
                                            <tr key={l.id}>
                                                <td style={{ ...TDS, color: C.muted, fontSize: 10 }}>{(state.auditLog || []).length - i}</td>
                                                <td style={TDS}>
                                                    <span style={{ background: l.action === "DELETE" ? "#ef444420" : l.action === "UPDATE" ? "#f59e0b20" : "#22c55e20", color: l.action === "DELETE" ? C.red : l.action === "UPDATE" ? C.amber : C.green, fontWeight: 800, fontSize: 10, padding: "2px 8px", borderRadius: 5, border: "1px solid currentColor" }}>{l.action}</span>
                                                </td>
                                                <td style={{ ...TDS, color: C.blue, fontSize: 11 }}>{l.module}</td>
                                                <td style={{ ...TDS, fontSize: 11 }}>{l.desc}</td>
                                                <td style={{ ...TDS, color: C.muted, fontSize: 10 }}>{l.user || "—"}</td>
                                                <td style={{ ...TDS, color: C.muted, fontSize: 10, whiteSpace: "nowrap" }}>{new Date(l.ts).toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            }
                        </div>
                        <div style={{ marginTop: 8, fontSize: 10, color: C.muted, textAlign: "center" }}>Showing all {(state.auditLog || []).length} audit events (latest first)</div>
                    </div>}

                </div>

                {/* Modals */}
                {modal && <div onClick={closeM} style={{ position: "fixed", inset: 0, background: "#000000c0", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200 }}>
                    <div onClick={e => e.stopPropagation()} style={{ background: C.dark, border: "1.5px solid #334155", borderRadius: 16, padding: 22, minWidth: 360, maxWidth: 490, width: "92vw", maxHeight: "90vh", overflowY: "auto" }}>

                        {modal === "settings" && <div>
                            <div style={{ fontWeight: 800, fontSize: 15, color: C.teal, marginBottom: 12 }}>⚙️ Admin & Company Settings</div>
                            <label style={{ fontSize: 11, color: C.muted, fontWeight: 700, display: "block", marginBottom: 3 }}>Admin PIN *</label>
                            <input type="password" style={INP} placeholder="New Admin PIN" value={form.adminPin || ""} onChange={e => setForm(f => ({ ...f, adminPin: e.target.value }))} />

                            <div style={{ borderTop: "1px solid #334155", margin: "12px 0", paddingTop: 10 }}>
                                <div style={{ fontWeight: 800, fontSize: 12, color: C.blue, marginBottom: 8 }}>🏢 Company Profile (GST)</div>
                                <label style={{ fontSize: 11, color: C.muted, fontWeight: 700, display: "block", marginBottom: 3 }}>Company Name *</label>
                                <input style={INP} placeholder="e.g. YORS WATER" value={form.compName || ""} onChange={e => setForm(f => ({ ...f, compName: e.target.value }))} />
                                <label style={{ fontSize: 11, color: C.muted, fontWeight: 700, display: "block", marginBottom: 3 }}>GSTIN *</label>
                                <input style={INP} placeholder="e.g. 19AAACY1234A1Z1" value={form.compGstin || ""} onChange={e => setForm(f => ({ ...f, compGstin: e.target.value.toUpperCase() }))} />
                                <label style={{ fontSize: 11, color: C.muted, fontWeight: 700, display: "block", marginBottom: 3 }}>State Code *</label>
                                <input style={INP} placeholder="e.g. 19 (West Bengal)" value={form.compStateCode || ""} onChange={e => setForm(f => ({ ...f, compStateCode: e.target.value }))} />
                                <label style={{ fontSize: 11, color: C.muted, fontWeight: 700, display: "block", marginBottom: 3 }}>Address</label>
                                <input style={INP} placeholder="Address" value={form.compAddress || ""} onChange={e => setForm(f => ({ ...f, compAddress: e.target.value }))} />
                                <label style={{ fontSize: 11, color: C.muted, fontWeight: 700, display: "block", marginBottom: 3 }}>Phone</label>
                                <input style={INP} placeholder="Phone" value={form.compPhone || ""} onChange={e => setForm(f => ({ ...f, compPhone: e.target.value }))} />
                            </div>

                            <button style={{ ...BTNP(), width: "100%" }} onClick={() => {
                                if (!form.adminPin) { alert("Admin PIN is required"); return; }
                                if (!form.compName || !form.compGstin || !form.compStateCode) { alert("Company Name, GSTIN, and State Code are required"); return; }
                                upd(p => ({
                                    ...p,
                                    settings: {
                                        ...p.settings,
                                        adminPin: form.adminPin,
                                        companyProfile: {
                                            name: form.compName,
                                            gstin: form.compGstin,
                                            stateCode: form.compStateCode,
                                            address: form.compAddress || "",
                                            phone: form.compPhone || ""
                                        }
                                    }
                                }));
                                alert("Settings saved successfully");
                                closeM();
                            }}>Save Settings</button>
                        </div>}

                        {modal === "openingStock" && <div><div style={{ fontWeight: 800, fontSize: 15, color: C.teal, marginBottom: 12 }}>📦 Set Opening Stock</div><DateInput value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} /><input type="number" style={INP} placeholder="Amount (₹)" value={form.amount || ""} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} /><button style={{ ...BTNP(), width: "100%" }} onClick={applyOpeningStock}>Save</button></div>}

                        {modal === "rawMaterial" && <div>
                            <div style={{ fontWeight: 800, fontSize: 15, color: C.teal, marginBottom: 12 }}>🏭 Raw Material Payment</div>
                            <DateInput value={form.date} onChange={v => setForm(f => ({ ...f, date: v }))} />
                            <select style={INP} value={form.rawMatType || ""} onChange={e => setForm(f => ({ ...f, rawMatType: e.target.value, description: e.target.value ? "Raw Material: " + e.target.value : "" }))}>
                                <option value="">Select Material Type *</option>
                                {RAW_MAT_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                            </select>
                            <input style={INP} placeholder="Description" value={form.description || ""} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} />
                            <input type="number" style={INP} placeholder="Amount (Base, ex-GST) ₹ *" value={form.amount || ""} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
                            <div style={{ background: "#0a0f1e", borderRadius: 8, padding: 12, marginBottom: 9, border: "1px solid " + C.border }}>

                                    onClick={() => {
                                        if (!form.amount || Number(form.amount) <= 0) { alert("Please enter a valid loan amount."); return; }
                                        if (!form.interestRate || Number(form.interestRate) < 0) { alert("Please enter a valid interest rate."); return; }
                                        if (!form.date) { alert("Please enter a loan start date."); return; }
                                        setForm(f => ({ ...f, isLoan: true }));
                                        setLoanPopup(false);
                                    }}
                                >
                                    ✓ Confirm Loan
                                </button>
                                <button
                                    style={{ ...BTNP("transparent"), border: "1px solid #475569", color: "#94a3b8", flex: 1 }}
                                    onClick={() => {
                                        setForm(f => ({ ...f, subCategory: "", isLoan: false, interestRate: "" }));
                                        setLoanPopup(false);
                                    }}
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>);
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
