                                            <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: 10, padding: "8px 14px", textAlign: "center" }}><div style={{ fontSize: 8, color: C.muted }}>Customized</div><div style={{ fontSize: 16, fontWeight: 900, color: C.amber }}>{allOrders.filter(e => e.category === "customized").length}</div></div>
                                        </div>
                                    </div>
                                </div>

                                {/* Category Toggle */}
                                <div style={{ display: "flex", gap: 6, marginBottom: 16, background: C.mid, borderRadius: 10, padding: 6, border: "1px solid " + C.border }}>
                                    {["all","normal","customized"].map(cat => (
                                        <button key={cat} onClick={() => setClDetailCat(cat)} style={{ flex: 1, padding: "8px 4px", border: "none", borderRadius: 7, background: clDetailCat === cat ? catColors[cat] + "22" : "transparent", color: clDetailCat === cat ? catColors[cat] : C.muted, fontWeight: clDetailCat === cat ? 800 : 500, fontSize: 11, cursor: "pointer", outline: clDetailCat === cat ? "2px solid " + catColors[cat] : "none" }}>
                                            {catLabel[cat]}
                                        </button>
                                    ))}
                                </div>

                                {/* Summary Cards */}
                                <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
                                    {[["Orders", clOrders.length, "#6366f1,#8b5cf6"], ["Total Qty", totalQty, "#0ea5e9,#0284c7"], ["Revenue", fc(totalAmt), "#8b5cf6,#7c3aed"], ["Avg Order", fc(avgOrder), "#14b8a6,#0d9488"], ["Outstanding", fc(outstandingBal), outstandingBal > 0 ? "#f59e0b,#d97706" : "#22c55e,#16a34a"], ["Last Order", clOrders.length > 0 ? clOrders[0].date : "—", "#7c3aed,#6d28d9"]].map(([l, v, g]) => (
                                        <div key={l} style={CARD(g)}><div style={{ fontSize: 9 }}>{l}</div><div style={{ fontSize: 12, fontWeight: 900 }}>{v}</div></div>
                                    ))}
                                </div>

                                {/* Charts */}
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
                                    <div style={{ background: C.mid, borderRadius: 14, padding: 16, border: "1px solid " + C.border }}>
                                        <div style={{ fontSize: 12, fontWeight: 800, color: catColors[clDetailCat], marginBottom: 10 }}>📊 Monthly Revenue — {catLabel[clDetailCat]}</div>
                                        <BarChart data={monthAmtData} color={catColors[clDetailCat]} height={170} />
                                        {monthAmtData.length >= 2 && (() => { const last = monthAmtData[monthAmtData.length-1].v, prev = monthAmtData[monthAmtData.length-2].v, change = prev > 0 ? ((last - prev) / prev * 100).toFixed(1) : 0; return <div style={{ marginTop: 8, fontSize: 11, color: change >= 0 ? C.green : C.red, fontWeight: 700 }}>{change >= 0 ? "▲" : "▼"} {Math.abs(change)}% vs prev month</div>; })()}
                                    </div>
                                    <div style={{ background: C.mid, borderRadius: 14, padding: 16, border: "1px solid " + C.border }}>
                                        <div style={{ fontSize: 12, fontWeight: 800, color: catColors[clDetailCat], marginBottom: 10 }}>📈 Monthly Qty — {catLabel[clDetailCat]}</div>
                                        <BarChart data={monthQtyData} color={catColors[clDetailCat]} height={170} />
                                    </div>
                                </div>

                                {/* Product Breakdown */}
                                <div style={{ background: C.mid, borderRadius: 14, padding: 16, marginBottom: 16, border: "1px solid " + C.border }}>
                                    <div style={{ fontSize: 12, fontWeight: 800, color: C.blue, marginBottom: 10 }}>🧴 Product Breakdown — {catLabel[clDetailCat]}</div>
                                    {Object.keys(productMap).length === 0 ? <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: 16 }}>No orders in this view</div> : (
                                        <table style={TBL}><thead><tr>{["Bottle Type","Orders","Total Qty","Avg Rate","Total Amount","% Share"].map(h => <th key={h} style={THS}>{h}</th>)}</tr></thead>
                                            <tbody>{Object.entries(productMap).map(([bt, d]) => {
                                                const avgRate = d.rates.reduce((a,b) => a+b, 0) / d.rates.length, pct = totalAmt > 0 ? (d.amt / totalAmt * 100).toFixed(1) : 0;
                                                return <tr key={bt}><td style={TDS}><Badge label={bt} color="#6366f1" /></td><td style={TDS}>{d.count}</td><td style={{ ...TDS, fontWeight: 700 }}>{d.qty}</td><td style={TDS}>{fc(avgRate)}</td><td style={{ ...TDS, fontWeight: 700, color: C.violet }}>{fc(d.amt)}</td><td style={TDS}><span style={{ color: catColors[clDetailCat], fontWeight: 700 }}>{pct}%</span></td></tr>;
                                            })}</tbody>
                                        </table>
                                    )}
                                </div>

                                {/* Sales History (Normal) */}
                                <div style={{ background: C.mid, borderRadius: 14, padding: 16, marginBottom: 16, border: "1px solid " + C.border }}>
                                    <div style={{ fontSize: 12, fontWeight: 800, color: C.red, marginBottom: 10 }}>📦 Sales History — {catLabel[clDetailCat]} ({clSalesOrders.length})</div>
                                    {clSalesOrders.length === 0 ? <div style={{ color: C.muted, fontSize: 11, textAlign: "center", padding: 16 }}>No sales entries in this view</div> : (
                                        <div style={{ overflowX: "auto" }}><table style={TBL}><thead><tr>{["Date","Bill No","Godown","Bottle","Cat","Qty","Rate","Total","Mode","Status"].map(h => <th key={h} style={THS}>{h}</th>)}</tr></thead>
                                            <tbody>{clSalesOrders.map(e => {
                                                const billCash = e.billNo ? relatedCash.filter(c => c.billNo === e.billNo).reduce((a,b) => a + Number(b.amount), 0) : 0;
                                                const billReturns = e.billNo ? clSalesReturns.filter(o => o.billNo === e.billNo).reduce((a,b) => a + Number(b.totalAmount), 0) : 0;
                                                const billTotal = e.billNo ? clSalesOrders.filter(o => o.billNo === e.billNo).reduce((a,b) => a + Number(b.totalAmount), 0) : Number(e.totalAmount);
                                                const billPending = billTotal - billReturns - billCash;
                                                const isPaid = e.settleMode === "cash" || (e.settleMode === "debtor" && e.billNo && billPending <= 0);
                                                return <tr key={e.id}><td style={TDS}>{e.date}</td><td style={{ ...TDS, fontWeight: 700, color: C.teal }}>{e.billNo || "—"}</td><td style={TDS}><Badge label={e.godown} color="#7c3aed" /></td><td style={TDS}><Badge label={e.bottleType} color="#6366f1" /></td><td style={TDS}><Badge label={e.category} color={e.category === "normal" ? C.teal : C.amber} /></td><td style={{ ...TDS, fontWeight: 700 }}>{e.qty}</td><td style={TDS}>{fc(e.ratePerUnit)}</td><td style={{ ...TDS, fontWeight: 700, color: C.red }}>{fc(e.totalAmount)}</td><td style={TDS}><Badge label={e.settleMode === "cash" ? "Cash" : e.settleMode === "debtor" ? "Debtor" : "Journal"} color={e.settleMode === "cash" ? C.green : C.violet} /></td><td style={TDS}>{isPaid ? <Badge label="Paid" color={C.green} /> : <span style={{ color: C.amber, fontSize: 10, fontWeight: 700 }}>{e.billNo ? "Due: " + fc(billPending) : "Pending"}</span>}</td></tr>;
                                            })}</tbody>
                                        </table></div>
                                    )}
                                </div>

                                {/* Sales Returns */}
                                {clSalesReturns.length > 0 && <div style={{ background: C.mid, borderRadius: 14, padding: 16, marginBottom: 16, border: "2px solid " + C.amber }}>
                                    <div style={{ fontSize: 12, fontWeight: 800, color: C.amber, marginBottom: 10 }}>↩️ Sales Returns ({clSalesReturns.length})</div>
                                    <div style={{ overflowX: "auto" }}><table style={TBL}><thead><tr>{["Date","Bill No","Godown","Bottle","Cat","Qty","Rate","Return Amt"].map(h => <th key={h} style={THS}>{h}</th>)}</tr></thead>
                                        <tbody>{clSalesReturns.map(e => <tr key={e.id}><td style={TDS}>{e.date}</td><td style={{ ...TDS, fontWeight: 700, color: C.teal }}>{e.billNo || "—"}</td><td style={TDS}><Badge label={e.godown} color="#7c3aed" /></td><td style={TDS}><Badge label={e.bottleType} color="#6366f1" /></td><td style={TDS}><Badge label={e.category} color={e.category === "normal" ? C.teal : C.amber} /></td><td style={{ ...TDS, fontWeight: 700 }}>{e.qty}</td><td style={TDS}>{fc(e.ratePerUnit)}</td><td style={{ ...TDS, fontWeight: 700, color: C.amber }}>{fc(e.totalAmount)}</td></tr>)}
                                        </tbody></table>
                                    </div>
                                    <div style={{ marginTop: 8, textAlign: "right", fontSize: 11, fontWeight: 700, color: C.amber }}>Total Returned: {fc(clSalesReturns.reduce((a,b) => a + Number(b.totalAmount), 0))}</div>
                                </div>}

                                {relatedCash.length > 0 && <div style={{ background: C.mid, borderRadius: 14, padding: 16, border: "1px solid " + C.border }}>
                                    <div style={{ fontSize: 12, fontWeight: 800, color: C.green, marginBottom: 10 }}>💵 Payments Received ({relatedCash.length})</div>
                                    <table style={TBL}><thead><tr>{["Date","Bill No","Description","Amount"].map(h => <th key={h} style={THS}>{h}</th>)}</tr></thead>
                                        <tbody>{relatedCash.map(e => <tr key={e.id}><td style={TDS}>{e.date}</td><td style={{ ...TDS, fontWeight: 700, color: C.teal }}>{e.billNo || "—"}</td><td style={TDS}>{e.description}</td><td style={{ ...TDS, fontWeight: 700, color: C.green }}>{fc(e.amount)}</td></tr>)}</tbody>
                                    </table>
                                </div>}
                            </div>;
                        }

                        /* ── List View ── */
                        /* Per-category enrichment */
                        const enrichedClients = clients.map(cl => {
                            const allO = so.filter(e => e.clientId === cl.id && !e.isReturn && (clGodownF === "All" || e.godown === clGodownF));
                            const catO = clCatView === "all" ? allO : allO.filter(e => e.category === clCatView);
                            const tQty = catO.reduce((a,b) => a + Number(b.qty), 0);
                            const tAmt = catO.reduce((a,b) => a + Number(b.totalAmount), 0);
                            const avgO = catO.length > 0 ? tAmt / catO.length : 0;
                            const lastDate = catO.length > 0 ? catO.sort((a,b) => new Date(b.date) - new Date(a.date))[0].date : "";
                            return { ...cl, allO, catO, tQty, tAmt, avgO, lastDate };
                        });

                        const totalClientRevenue = enrichedClients.reduce((a,c) => a + c.tAmt, 0);
                        const retailerCount = clients.filter(c => c.type === "Retailer").length;
                        const distributorCount = clients.filter(c => c.type === "Distributor").length;
                        const normalRevenue = so.filter(e => e.clientId && e.category === "normal" && !e.isReturn).reduce((a,b) => a + Number(b.totalAmount), 0);
                        const customRevenue = so.filter(e => e.clientId && e.category === "customized" && !e.isReturn).reduce((a,b) => a + Number(b.totalAmount), 0);

                        const filtered = enrichedClients.filter(cl => {
                            if (clTypeF !== "All" && cl.type !== clTypeF) return false;
                            if (clSearch && !cl.name.toLowerCase().includes(clSearch.toLowerCase()) && !(cl.phone || "").includes(clSearch)) return false;
                            
                            const hasCustomized = cl.allO.some(o => o.category === "customized");
                            const hasNormal = cl.allO.some(o => o.category === "normal");
                            
                            if (clCatView === "customized" && !hasCustomized) return false;
                            if (clCatView === "normal" && !hasNormal && cl.allO.length > 0) return false;
                            if (clGodownF !== "All" && cl.allO.length === 0) return false;
                            
                            return true;
                        }).sort((a, b) => {
                            let av = a[clSort], bv = b[clSort];
                            if (clSort === "lastDate") { av = av || ""; bv = bv || ""; }
                            if (clSort === "tAmt" || clSort === "tQty" || clSort === "avgO") return (bv - av) * clSortDir;
                            return String(av).localeCompare(String(bv)) * clSortDir;
                        });

                        const hasFilter = clTypeF !== "All" || clSearch || clGodownF !== "All";
                        const viewColor = clCatView === "normal" ? C.teal : clCatView === "customized" ? C.amber : C.purple;

                        return <div>
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                                <div style={{ fontSize: 16, fontWeight: 800, color: C.teal }}>👥 Clients</div>
                                {isAdmin && <button style={BTNP()} onClick={() => openM("addClient")}>+ Add Client</button>}
                            </div>

                            {/* Normal / Customized main toggle */}
                            <div style={{ display: "flex", gap: 0, marginBottom: 16, background: C.mid, borderRadius: 12, padding: 5, border: "1px solid " + C.border }}>
                                {[["normal","🏷 Normal Clients", C.teal], ["customized","✨ Customized Clients", C.amber]].map(([v, l, col]) => (
                                    <button key={v} onClick={() => setClCatView(v)} style={{ flex: 1, padding: "10px 8px", border: "none", borderRadius: 8, background: clCatView === v ? col + "22" : "transparent", color: clCatView === v ? col : C.muted, fontWeight: clCatView === v ? 800 : 500, fontSize: 12, cursor: "pointer", outline: clCatView === v ? "2px solid " + col : "none", transition: "all .15s" }}>
                                        {l}
                                        <div style={{ fontSize: 9, opacity: 0.8, marginTop: 2 }}>{v === "normal" ? fc(normalRevenue) + " revenue" : fc(customRevenue) + " revenue"}</div>
                                    </button>
                                ))}
                            </div>

                            {/* Summary Cards */}
                            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 }}>
                                {[["Total Clients", clients.length, "#6366f1,#8b5cf6"], ["Retailers", retailerCount, "#14b8a6,#0d9488"], ["Distributors", distributorCount, "#f59e0b,#d97706"], [clCatView === "normal" ? "Normal Revenue" : "Custom Revenue", fc(totalClientRevenue), clCatView === "normal" ? "#14b8a6,#0d9488" : "#f59e0b,#d97706"]].map(([l, v, g]) => (
                                    <div key={l} style={CARD(g)}><div style={{ fontSize: 9 }}>{l}</div><div style={{ fontSize: 13, fontWeight: 900 }}>{v}</div></div>
                                ))}
                            </div>

                            {/* Filter Bar */}
                            <div style={{ background: C.mid, borderRadius: 12, padding: 14, marginBottom: 14, border: "1px solid " + C.border }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                                    <div style={{ fontSize: 11, fontWeight: 700, color: C.muted }}>🔍 FILTERS</div>
                                    {hasFilter && <button onClick={() => { setClSearch(""); setClTypeF("All"); setClGodownF("All"); }} style={{ ...BTNP("#ef4444"), padding: "4px 12px", fontSize: 10 }}>✕ Clear</button>}
                                </div>
                                <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 3, flex: 1, minWidth: 160 }}>
                                        <label style={{ fontSize: 9, color: C.muted, fontWeight: 600, textTransform: "uppercase" }}>Search Name / Phone</label>
                                        <input type="text" placeholder="Search…" style={{ ...INP, marginBottom: 0, border: clSearch ? "1.5px solid " + viewColor : "1.5px solid " + C.border }} value={clSearch} onChange={e => setClSearch(e.target.value)} />
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                                        <label style={{ fontSize: 9, color: C.muted, fontWeight: 600, textTransform: "uppercase" }}>Type</label>
                                        <select style={{ ...INP, width: "auto", marginBottom: 0, minWidth: 120, border: clTypeF !== "All" ? "1.5px solid " + viewColor : "1.5px solid " + C.border }} value={clTypeF} onChange={e => setClTypeF(e.target.value)}>
                                            {["All","Retailer","Distributor"].map(o => <option key={o}>{o}</option>)}
                                        </select>
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                                        <label style={{ fontSize: 9, color: C.muted, fontWeight: 600, textTransform: "uppercase" }}>Godown</label>
                                        <select style={{ ...INP, width: "auto", marginBottom: 0, minWidth: 120, border: clGodownF !== "All" ? "1.5px solid " + viewColor : "1.5px solid " + C.border }} value={clGodownF} onChange={e => setClGodownF(e.target.value)}>
                                            <option value="All">All Godowns</option>
                                            {GODOWNS.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                    </div>
                                    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                                        <label style={{ fontSize: 9, color: C.muted, fontWeight: 600, textTransform: "uppercase" }}>Sort By</label>
                                        <select style={{ ...INP, width: "auto", marginBottom: 0, minWidth: 130 }} value={clSort} onChange={e => { setClSort(e.target.value); setClSortDir(1); }}>
                                            {[["name","Name"],["tAmt","Revenue"],["tQty","Total Qty"],["avgO","Avg Order"],["lastDate","Last Order"]].map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                                        </select>
                                    </div>
                                    <button onClick={() => setClSortDir(d => d * -1)} style={{ ...BTNP(C.mid), border: "1px solid " + C.border, color: C.muted, padding: "8px 14px", fontSize: 12 }}>{clSortDir === 1 ? "▲ Asc" : "▼ Desc"}</button>
                                </div>
                                {hasFilter && <div style={{ marginTop: 8, fontSize: 10, color: viewColor }}>📋 Showing {filtered.length} of {clients.length} client(s)</div>}
                            </div>

                            {clients.length === 0 ? <div style={{ background: C.mid, borderRadius: 12, padding: 32, textAlign: "center", color: C.muted }}>
                                <div style={{ fontSize: 28, marginBottom: 8 }}>👥</div>
                                <div style={{ fontSize: 13, fontWeight: 600 }}>No clients yet</div>
                                <div style={{ fontSize: 11, marginTop: 4 }}>Link a client when adding Stock Out, or add one manually</div>
                            </div> : filtered.length === 0 ? <div style={{ background: C.mid, borderRadius: 12, padding: 32, textAlign: "center", color: C.muted }}>
                                <div style={{ fontSize: 24, marginBottom: 8 }}>🔍</div>
                                <div style={{ fontSize: 13, fontWeight: 600 }}>No clients match your filters</div>
                                <div style={{ fontSize: 11, marginTop: 4, cursor: "pointer", color: viewColor }} onClick={() => { setClSearch(""); setClTypeF("All"); setClGodownF("All"); }}>Clear filters</div>
                            </div> : (
                                <div style={{ background: C.mid, borderRadius: 12, overflowX: "auto", border: "1px solid " + C.border }}>
                                    <table style={TBL}><thead><tr>
                                        {[["name","Name"],["type","Type"],["date","Since"],["phone","Phone"],["catO.length","Orders"],["tQty","Qty"],["tAmt","Revenue"],["avgO","Avg Order"],["lastDate","Last Order"],[null,"Actions"]].map(([col, h]) => (
                                            <th key={h} style={{ ...THS, cursor: col ? "pointer" : "default", userSelect: "none", color: clSort === col ? viewColor : "#94a3b8" }} onClick={() => col && toggleSort(col)}>{h}{col ? sortArrow(col) : ""}</th>
                                        ))}
                                    </tr></thead>
                                        <tbody>{filtered.map(cl => (
                                            <tr key={cl.id} style={{ cursor: "pointer" }} onClick={() => { setClDetailCat(clCatView); setSelectedClient(cl.id); }}>
                                                <td style={{ ...TDS, fontWeight: 700, color: "#818cf8" }}>{cl.name}</td>
                                                <td style={TDS}><Badge label={cl.type} color={cl.type === "Retailer" ? C.teal : C.amber} /></td>
                                                <td style={TDS}>{cl.date}</td>
                                                <td style={TDS}>{cl.phone || "—"}</td>
                                                <td style={{ ...TDS, fontWeight: 700 }}>{cl.catO.length}<span style={{ color: C.muted, fontSize: 9, marginLeft: 3 }}>/{cl.allO.length}</span></td>
                                                <td style={TDS}>{cl.tQty}</td>
                                                <td style={{ ...TDS, fontWeight: 700, color: viewColor }}>{fc(cl.tAmt)}</td>
                                                <td style={TDS}>{fc(cl.avgO)}</td>
                                                <td style={TDS}>{cl.lastDate || "—"}</td>
                                                <td style={TDS}><button style={BTND} onClick={ev => { ev.stopPropagation(); cascadeDelete("clients", cl.id); }}>Del</button></td>
                                            </tr>
                                        ))}</tbody>
                                    </table>
                                </div>
                            )}
                        </div>;
                    })()}


                    {tab === "Balance Sheet" && <div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                            <div style={{ fontSize: 16, fontWeight: 800, color: C.blue }}>🏛️ Balance Sheet</div>
                            {isAdmin && <button style={BTNP()} onClick={() => openM("bs")}>+ Manual Entry</button>}
                        </div>
                        <div style={{ background: "#0a1628", borderRadius: 10, padding: "10px 14px", marginBottom: 12, border: "1px solid #334155", fontSize: 10, color: "#64748b" }}>
                            <strong style={{ color: "#94a3b8" }}>ℹ️ Auto-populated items (read-only):</strong> Cash Balance, Closing Stock (FIFO), Trade Debtors, Accum. Depreciation, Trade Creditors, Net Profit/Loss — these are derived from other modules and <em>cannot be entered here</em>. Use <strong style={{ color: "#94a3b8" }}>+ Manual Entry</strong> for items like Fixed Assets, Share Capital, Long-term Loans, etc. Balance Sheet entries do <em>not</em> affect P&amp;L.
                        </div>
                        {Math.abs(bsDiff) > 0.01
                            ? <div style={{ background: "#450a0a", borderRadius: 10, padding: 12, marginBottom: 12, border: "1.5px solid #ef4444" }}><div style={{ fontWeight: 800, color: C.red, fontSize: 12 }}>⚠️ Balance Sheet Mismatch — Difference: {fabs(bsDiff)}</div><div style={{ fontSize: 10, color: "#fca5a5", marginTop: 4 }}>Assets do not equal Liabilities + Equity. Common fix: Add Share Capital or Proprietor's Capital under Liabilities → Equity and Reserves. The difference usually represents capital not yet recorded.</div></div>
                            : <div style={{ background: "#052e16", borderRadius: 8, padding: "8px 14px", marginBottom: 10, color: "#86efac", fontWeight: 700, textAlign: "center", fontSize: 12 }}>✅ Balance Sheet BALANCED — Assets = Liabilities + Equity</div>}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                            {["liabilities", "assets"].map(side => {
                                const color = side === "assets" ? C.blue : C.amber;
                                const entries = side === "assets" ? Object.values(state.balanceSheet?.assets || {}) : bsManualLiabRaw;
                                const autoItems = [];
                                if (side === "assets") {
                                    if (cashBal !== 0) autoItems.push({ sub: "Cash and Cash Equivalents", label: "Cash Balance", val: cashBal, c: C.green });
                                    if (fifoClosing > 0) autoItems.push({ sub: "Inventories", label: "Closing Stock (FIFO)", val: fifoClosing, c: C.violet });
                                    if (totalDebtors > 0) autoItems.push({ sub: "Trade Receivables", label: "Trade Debtors", val: totalDebtors, c: C.violet });
                                    if (totalDepreciation > 0) autoItems.push({ sub: "Fixed Assets", label: "Less: Accum. Depr", val: -totalDepreciation, c: C.red });
                                } else {
                                    if (totalCreditors > 0) autoItems.push({ sub: "Trade Payables", label: "Trade Creditors", val: totalCreditors, c: C.amber });

                                }
                                const groupTotals = {};
                                Object.entries(SCHEDULE3[side]).forEach(([grp, subs]) => {
                                    let t = entries.filter(e => e.category === grp).reduce((a, b) => a + Number(b.amount), 0);

                                return (<div key={side} style={{ background: C.mid, borderRadius: 12, padding: 16 }}>

                                                             const repaid = loanPrincipalPaid(e.id);
                                                             const original = Number(e.amount) + repaid;
                                                             return (

                                                                     <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.text, alignItems: "center" }}>
                                                                         <span>{e.description}{e.interestRate ? ` (${e.interestRate}% p.a.)` : ""}</span>
                                                                         <span style={{ display: "flex", gap: 5 }}>{fc(original)}{!e.autoFromDepr && <button style={BTND} onClick={() => delBS(side, e.id)}>✕</button>}</span>

                                                                             <span>Less: Repaid Principal</span>
                                                                             <span>-{fc(repaid)}</span>
                                                                         </div>
                                                                     )}
                                                                     {repaid > 0 && (
                                                                         <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.blue, paddingLeft: 8, marginTop: 1, fontWeight: 700 }}>
                                                                             <span>Net Loan Outstanding</span>
                                                                             <span>{fc(e.amount)}</span>
                                                                         </div>
                                                                     )}
                                                                 </div>
                                                             );
                                                         }
                                                         return (
                                                             <div key={e.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.text, alignItems: "center", paddingLeft: 12, marginBottom: 2 }}>
                                                                 <span>{e.description}</span>
                                                                 <span style={{ display: "flex", gap: 5 }}>{fc(e.amount)}{!e.autoFromDepr && <button style={BTND} onClick={() => delBS(side, e.id)}>✕</button>}</span>
                                                             </div>
                                                         );
                                                     })}
                                                    {autoSub.map((a, i) => <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 11, paddingLeft: 12, color: a.c }}><span>{a.label} <span style={{ color: C.muted, fontSize: 9 }}>(auto)</span></span><span style={{ fontWeight: 700 }}>{fc(a.val)}</span></div>)}
                                                    {subTotal !== 0 && <div style={{ textAlign: "right", fontSize: 11, color, fontWeight: 700, paddingRight: 4, marginTop: 3 }}>Sub-total: {fc(subTotal)}</div>}
                                                </div>);
                                            })}
                                            {groupTotals[grp] !== 0 && <div style={{ textAlign: "right", fontWeight: 800, color, fontSize: 11, marginTop: 4, borderTop: "1px dashed #334155", paddingTop: 4 }}>Group Total: {fc(groupTotals[grp])}</div>}
                                        </div>
                                    ))}
                                    <div style={{ borderTop: "2px solid #334155", paddingTop: 8, fontWeight: 900, color, textAlign: "right", fontSize: 14 }}>TOTAL: {fc(grand)}</div>
                                </div>);
                            })}
                        </div>
                        <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                            {[["Total Assets", fc(bsTotalAssets), "#6366f1,#8b5cf6"], ["Total Liab + Equity", fc(bsTotalLiab), "#f59e0b,#d97706"], ["Difference", fabs(bsDiff), Math.abs(bsDiff) < 0.01 ? "#16a34a,#15803d" : "#dc2626,#b91c1c"]].map(([l, v, g]) => (
                                <div key={l} style={CARD(g)}><div style={{ fontSize: 9 }}>{l}</div><div style={{ fontSize: 14, fontWeight: 900 }}>{v}</div></div>
                            ))}
                        </div>
                    </div>}

                    {tab === "Depreciation" && <div>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                            <div style={{ fontSize: 16, fontWeight: 800, color: C.amber }}>📉 Depreciation Register</div>

                            {[["Gross Cost", fc(deprCostTotal), "#f59e0b,#d97706"], ["Accum. Depr", fc(totalDepreciation), "#ef4444,#dc2626"], ["Net WDV", fc(deprWDVTotal), "#22c55e,#16a34a"]].map(([l, v, g]) => (

                            </table></div>
                        )}
                    </div>}

                    {tab === "Charts" && <div>
                        <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 16, color: C.purple }}>📊 Charts</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                            {[{ title: "📥 Purchases", data: buildTSD(si, "totalAmount"), color: C.violet }, { title: "📤 Sales", data: buildTSD(so, "totalAmount"), color: C.teal }, { title: "💵 Cash In", data: buildTSD(cash.filter(e => e.dir === "in"), "amount"), color: C.green }, { title: "💸 Cash Out", data: buildTSD(cash.filter(e => e.dir === "out"), "amount"), color: C.red }].map(({ title, data, color }) => (
                                <div key={title} style={{ background: C.mid, borderRadius: 14, padding: 16, border: "1px solid #334155" }}>
                                    <div style={{ fontSize: 12, fontWeight: 800, color, marginBottom: 10 }}>{title}</div>
                                    <MiniChart data={data} color={color} height={90} />

                                </div>
                            ))}
                        </div>
                    </div>}

                    {tab === "Trial Balance" && (() => {
                        const rows = [
                            { name: "Opening Stock", dr: state.openingStock?.amount || 0, cr: 0 },
                            { name: "Purchases", dr: si.filter(x => !x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0), cr: 0 },
                            { name: "Purchase Returns", dr: 0, cr: si.filter(x => x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0) },
                            { name: "Sales", dr: 0, cr: so.filter(x => !x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0) },
                            { name: "Sales Returns", dr: so.filter(x => x.isReturn).reduce((s, e) => s + (e.totalAmount - (e.gstAmount || 0)), 0), cr: 0 },
                            { name: "Trading Dr (Direct Exp)", dr: te.filter(x => x.side === "dr").reduce((s, e) => s + e.amount, 0), cr: 0 },
                            { name: "Trading Cr (Direct Inc)", dr: 0, cr: te.filter(x => x.side === "cr").reduce((s, e) => s + e.amount, 0) },
                            { name: "P&L Expenses", dr: ple.filter(x => x.side === "expense").reduce((s, e) => s + e.amount, 0), cr: 0 },
                            { name: "P&L Income", dr: 0, cr: ple.filter(x => x.side === "income").reduce((s, e) => s + e.amount, 0) },
                            { name: "Depreciation (Expense)", dr: totalDepreciation, cr: 0 },
                            { name: "Trade Debtors", dr: totalDebtors, cr: 0 },
                            { name: "Trade Creditors", dr: 0, cr: totalCreditors },
                            { name: "Cash Balance", dr: cashBal >= 0 ? cashBal : 0, cr: cashBal < 0 ? Math.abs(cashBal) : 0 },
                            { name: "Manual BS Assets", dr: Object.values(state.balanceSheet?.assets || {}).reduce((s, e) => s + Number(e.amount), 0), cr: 0 },
                            { name: "Manual BS Liab & Equity", dr: 0, cr: bsManualLiabRaw.reduce((s, e) => s + Number(e.amount), 0) },
                            { name: "Loan Interest (Expense)", dr: totalLoanInterest, cr: 0 },
                            { name: "Interest Outstanding on Loans", dr: 0, cr: outstandingInterestLiab },
                            { name: "GST Duties & Taxes (Payable)", dr: totalGstPayable < 0 ? Math.abs(totalGstPayable) : 0, cr: totalGstPayable >= 0 ? totalGstPayable : 0 }
                        ];
                        const totalDr = rows.reduce((acc, r) => acc + r.dr, 0);
                        const totalCr = rows.reduce((acc, r) => acc + r.cr, 0);
                        const diff = Math.abs(totalDr - totalCr);
                        const balanced = diff < 0.01;

                        return <div>
                            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.teal }}>⚖️ Trial Balance</div>
                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155" }}>
                                <table style={TBL}>
                                    <thead><tr><th style={THS}>Account</th><th style={{...THS, textAlign: "right"}}>Debit (Dr)</th><th style={{...THS, textAlign: "right"}}>Credit (Cr)</th></tr></thead>
                                    <tbody>
                                        {rows.map(r => (
                                            <tr key={r.name}>
                                                <td style={TDS}>{r.name}</td>
                                                <td style={{...TDS, textAlign:"right"}}>{r.dr > 0 ? fc(r.dr) : "—"}</td>
                                                <td style={{...TDS, textAlign:"right"}}>{r.cr > 0 ? fc(r.cr) : "—"}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot>
                                        <tr style={{ borderTop: "2px solid #334155", fontWeight: 800 }}>
                                            <td style={{ ...TDS, fontWeight: "bold" }}>Total</td>
                                            <td style={{ ...TDS, textAlign: "right", fontWeight: "bold", color: balanced ? C.green : C.red }}>{fc(totalDr)}</td>
                                            <td style={{ ...TDS, textAlign: "right", fontWeight: "bold", color: balanced ? C.green : C.red }}>{fc(totalCr)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                                {!balanced && <div style={{ color: C.red, fontSize: 11, fontWeight: 700, marginTop: 8, textAlign: "center" }}>⚠️ Trial Balance Mismatch! Difference: {fc(diff)}</div>}
                                {balanced && <div style={{ color: C.green, fontSize: 11, fontWeight: 700, marginTop: 8, textAlign: "center" }}>✅ Trial Balance Balanced</div>}
                                <div style={{ marginTop: 12, fontSize: 10, color: C.muted, textAlign: "center" }}>Note: This is a pre-closing Trial Balance (closing stock is not included; opening stock is).</div>
                            </div>
                        </div>;
                    })()}

                    {tab === "Cash Flow" && (() => {
                        const sums = {};
                        [...CASH_IN_TYPES, ...CASH_OUT_TYPES].forEach(t => sums[t] = 0);
                        cash.forEach(e => { sums[e.payType] = (sums[e.payType] || 0) + e.amount; });
                        const operatingIn = sums["Sales Receipt"] + sums["Debtor Payment"] + sums["Other Income Receipt"];
                        const operatingOut = sums["Expense Payment"] + sums["Creditor Payment"] + sums["Stock Purchase Payment"] + sums["Sales Return Refund"];
                        const investingIn = sums["Purchase Return Receipt"]; // Return of capital/stock
                        const investingOut = sums["Other Payment"]; // Usually fixed assets
                        const financingIn = sums["Capital Introduced"] + sums["Loan Received"];
                        const financingOut = sums["Loan Repayment"] + (sums["Interest on Loan Repayment"] || 0);
                        const opNet = operatingIn - operatingOut;
                        const invNet = investingIn - investingOut;
                        const finNet = financingIn - financingOut;
                        
                        return <div>
                            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.blue }}>🌊 Cash Flow Statement (Direct Method)</div>
                            
                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155", marginBottom: 16 }}>
                                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 10, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Operating Activities</div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Receipts from Customers (Sales & Debtors)</span><span>{fc(sums["Sales Receipt"] + sums["Debtor Payment"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Other Income Receipts</span><span>{fc(sums["Other Income Receipt"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Payments to Suppliers (Purchases & Creditors)</span><span>{fc(sums["Stock Purchase Payment"] + sums["Creditor Payment"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Operating Expense Payments</span><span>{fc(sums["Expense Payment"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Sales Return Refunds</span><span>{fc(sums["Sales Return Refund"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, color: opNet >= 0 ? C.green : C.red, marginTop: 6, paddingTop: 4, borderTop: "1px dashed #334155" }}><span>Net Cash from Operating Activities</span><span>{fc(opNet)}</span></div>
                            </div>

                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155", marginBottom: 16 }}>
                                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 10, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Investing Activities</div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Purchase Return Receipts (Refunds)</span><span>{fc(sums["Purchase Return Receipt"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Other Payments (Fixed Assets, etc.)</span><span>{fc(sums["Other Payment"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, color: invNet >= 0 ? C.green : C.red, marginTop: 6, paddingTop: 4, borderTop: "1px dashed #334155" }}><span>Net Cash from Investing Activities</span><span>{fc(invNet)}</span></div>
                            </div>

                            <div style={{ background: C.mid, borderRadius: 12, padding: 16, border: "1px solid #334155", marginBottom: 16 }}>
                                <div style={{ fontSize: 13, fontWeight: 800, color: C.text, marginBottom: 10, borderBottom: "1px solid #334155", paddingBottom: 4 }}>Financing Activities</div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Capital Introduced</span><span>{fc(sums["Capital Introduced"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.green, padding: "2px 0" }}><span>+ Loan Received</span><span>{fc(sums["Loan Received"])}</span></div>
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Loan Repayment</span><span>{fc(sums["Loan Repayment"])}</span></div>
                                {sums["Interest on Loan Repayment"] > 0 && (
                                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.red, padding: "2px 0" }}><span>- Interest on Loan Repayment</span><span>{fc(sums["Interest on Loan Repayment"])}</span></div>
                                )}
                                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, fontWeight: 700, color: finNet >= 0 ? C.green : C.red, marginTop: 6, paddingTop: 4, borderTop: "1px dashed #334155" }}><span>Net Cash from Financing Activities</span><span>{fc(finNet)}</span></div>
                            </div>

                            <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                                <div style={CARD(cashBal >= 0 ? "#16a34a,#15803d" : "#dc2626,#b91c1c")}><div style={{ fontSize: 10 }}>Net Increase / (Decrease) in Cash</div><div style={{ fontSize: 16, fontWeight: 900 }}>{fc(opNet + invNet + finNet)}</div></div>
                                <div style={CARD("#0ea5e9,#0284c7")}><div style={{ fontSize: 10 }}>Closing Cash Balance</div><div style={{ fontSize: 16, fontWeight: 900 }}>{fc(cashBal)}</div></div>
                            </div>
                        </div>;
                    })()}

                    {tab === "Journal" && (() => {
                        let j = [];
                        si.forEach(e => j.push({ date: e.date, type: "Stock In", desc: `Batch ${e.batchNo} (${e.bottleType})`, id: e.id, amt: e.totalAmount, dir: "dr" }));
                        so.forEach(e => j.push({ date: e.date, type: "Stock Out", desc: `${e.qty} ${e.bottleType}`, id: e.id, amt: e.totalAmount, dir: "cr" }));
                        cash.forEach(e => {
                            j.push({ date: e.date, type: "Cash", desc: e.description, id: e.id, amt: e.amount, dir: e.dir });
                            if (e.dir === "out" && e.payType === "Loan Repayment" && e.linkedId) {
                                const loan = Object.values(state.balanceSheet?.liabilities || {}).find(x => x.id === e.linkedId);
                                j.push({
                                    date: e.date,
                                    type: "Balance Sheet",
                                    desc: `Debit: Principal Repayment of ${loan ? loan.description : "Loan"}`,
                                    id: e.id + "_repay_dr",
                                    amt: e.amount,
                                    dir: "dr"
                                });
                            }
                            if (e.dir === "out" && e.payType === "Interest on Loan Repayment" && e.linkedId) {
                                const loan = Object.values(state.balanceSheet?.liabilities || {}).find(x => x.id === e.linkedId);
                                j.push({
                                    date: e.date,
                                    type: "Balance Sheet",
                                    desc: `Debit: Interest Paid on ${loan ? loan.description : "Loan"}`,
                                    id: e.id + "_intpaid_dr",
                                    amt: e.amount,
                                    dir: "dr"
                                });
                            }
                        });
                        te.forEach(e => j.push({ date: e.date, type: "Trading", desc: e.description, id: e.id, amt: e.amount, dir: e.side }));
                        ple.forEach(e => j.push({ date: e.date, type: "P&L", desc: e.description, id: e.id, amt: e.amount, dir: e.side }));
                        Object.values(state.balanceSheet?.liabilities || {})
                            .filter(e => e.subCategory === "Long Term Borrowings" && e.interestRate)
                            .forEach(e => {
                                const principal = Number(e.amount);
                                const rate = Number(e.interestRate) / 100;
                                const startDate = new Date(e.date);
                                const now = new Date();
                                let mo = (now.getFullYear() - startDate.getFullYear()) * 12 + (now.getMonth() - startDate.getMonth());
                                if (mo < 0) mo = 0;
                                const monthlyAmt = (principal * rate) / 12;
                                for (let m = 1; m <= mo; m++) {
                                    const interestDate = new Date(startDate.getTime());
                                    interestDate.setMonth(startDate.getMonth() + m);
                                    const dateStr = interestDate.toISOString().slice(0, 10);
                                    j.push({
                                        date: dateStr,
                                        type: "P&L",
                                        desc: `Auto Interest Accrual: ${e.description} (${e.interestRate}% p.a.)`,
                                        id: e.id + `_int_${m}_dr`,
                                        amt: monthlyAmt,
                                        dir: "dr"
                                    });
                                    j.push({
                                        date: dateStr,
                                        type: "Balance Sheet",
                                        desc: `Auto Interest Outstanding: ${e.description} (${e.interestRate}% p.a.)`,
                                        id: e.id + `_int_${m}_cr`,
                                        amt: monthlyAmt,
                                        dir: "cr"
                                    });
                                }
                            });
                        j.sort((a,b) => new Date(b.date) - new Date(a.date));
                        
                        return <div>
                            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 14, color: C.purple }}>📖 Journal / General Ledger</div>
                            <div style={{ background: C.mid, borderRadius: 12, overflowX: "auto", border: "1px solid #334155" }}>
                                <table style={TBL}>
                                    <thead><tr><th style={THS}>Date</th><th style={THS}>Module</th><th style={THS}>Description</th><th style={THS}>Effect (Dr / Cr)</th><th style={{...THS, textAlign:"right"}}>Amount</th></tr></thead>
                                    <tbody>
                                        {j.map((e, i) => <tr key={i}>
                                            <td style={TDS}>{e.date}</td>
                                            <td style={TDS}><Badge label={e.type} color={C.violet} /></td>
                                            <td style={{...TDS, fontSize: 11}}>{e.desc}</td>
                                            <td style={{...TDS, color: C.muted, fontSize: 10}}>{e.dir === "in" || e.dir === "dr" || e.dir === "expense" ? "Debit / In" : "Credit / Out"}</td>
                                            <td style={{...TDS, textAlign:"right", fontWeight:700}}>{fc(e.amt)}</td>
                                        </tr>)}
                                    </tbody>
                                </table>
                            </div>
                        </div>;

                                🏦 Configure Loan Details
                            </div>
                            <div style={{ fontSize: 11, color: C.muted, marginBottom: 12 }}>
                                Please specify the loan details. Interest expense will be calculated monthly from the start date.
                            </div>
                            
                            <label style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, display: "block", marginBottom: 4 }}>Loan Amount (₹) *</label>
                            <input 
                                type="number" 
                                style={INP} 
                                placeholder="Principal Amount" 
                                value={form.amount || ""} 
                                onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} 
                            />
                            
                            <label style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, display: "block", marginBottom: 4 }}>Interest Rate (% per annum) *</label>
                            <input 
                                type="number" 
                                step="0.01" 
                                style={INP} 
                                placeholder="e.g. 10.5" 
                                value={form.interestRate || ""} 
                                onChange={e => setForm(f => ({ ...f, interestRate: e.target.value }))} 
                            />
                            
                            <label style={{ fontSize: 11, color: "#94a3b8", fontWeight: 700, display: "block", marginBottom: 4 }}>Loan Start Date *</label>
                            <DateInput 
                                value={form.date} 
                                onChange={v => setForm(f => ({ ...f, date: v }))} 
                            />

                            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                                <button 
                                    style={{ ...BTNP(), flex: 1 }} 
                                    onClick={() => {
                                        if (!form.amount || Number(form.amount) <= 0) { alert("Please enter a valid loan amount."); return; }
                                        if (!form.interestRate || Number(form.interestRate) < 0) { alert("Please enter a valid interest rate."); return; }
                                        if (!form.date) { alert("Please enter a loan start date."); return; }
                                        setForm(f => ({ ...f, isLoan: true }));
                                        setLoanPopup(false);
                                    }}
                                >
                                    Confirm Loan
                                </button>
                                <button 
                                    style={{ ...BTNP("transparent"), border: "1px solid #475569", color: "#94a3b8", flex: 1 }} 
                                    onClick={() => {
                                        setForm(f => ({ ...f, subCategory: "", isLoan: false, interestRate: "" }));
                                        setLoanPopup(false);
                                    }}
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    </div>
                )}
            </div>);
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
</body>

</html>
